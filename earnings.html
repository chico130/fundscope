<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnings — FundScope</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="/fundscope/manifest.json">
  <meta name="theme-color" content="#01696f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FundScope">
  <link rel="apple-touch-icon" href="/fundscope/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --color-gold:#c47d1a;--color-gold-bg:#fdf3e0;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --color-gold:#e8af34;--color-gold-bg:#2d2208;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);display:flex;flex-direction:column;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}

    /* ── Header ── */
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-text);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .header-actions{display:flex;align-items:center;gap:var(--space-1);}
    .nav-link{font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);font-weight:500;}
    .nav-link:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .nav-link.active{color:var(--color-primary);background:var(--color-primary-highlight);font-weight:600;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}

    /* ── Mobile nav ── */
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:color-mix(in oklch,var(--color-bg) 95%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--color-divider);padding:var(--space-2) var(--space-4);padding-bottom:max(var(--space-2),env(safe-area-inset-bottom));}
    .mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-lg);color:var(--color-text-faint);font-size:10px;font-weight:600;transition:color var(--transition),background var(--transition);min-width:52px;}
    .mobile-nav-item.active{color:var(--color-primary);}
    .mobile-nav-item svg{width:20px;height:20px;}

    /* ── Page layout ── */
    .page{max-width:1200px;margin:0 auto;padding:var(--space-10) var(--space-6) var(--space-16);width:100%;flex:1;}

    /* ── Hero strip ── */
    .hero-strip{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4);margin-bottom:var(--space-8);}
    .hero-eyebrow{font-size:var(--text-xs);color:var(--color-primary);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:var(--space-2);}
    .hero-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;letter-spacing:-.02em;line-height:1.15;margin-bottom:var(--space-3);}
    .hero-meta-row{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;}
    .updated-label{font-size:var(--text-xs);color:var(--color-text-faint);}

    /* ── Refresh control ── */
    .refresh-ctrl{display:flex;align-items:center;gap:var(--space-3);flex-shrink:0;}
    .refresh-countdown{font-size:var(--text-xs);color:var(--color-text-faint);font-variant-numeric:tabular-nums;}
    .btn-refresh{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);font-weight:600;color:var(--color-primary);padding:var(--space-2) var(--space-3);border-radius:var(--radius-full);border:1px solid color-mix(in oklch,var(--color-primary) 30%,transparent);background:var(--color-primary-highlight);transition:all var(--transition);}
    .btn-refresh:hover{background:color-mix(in oklch,var(--color-primary) 15%,transparent);}
    .btn-refresh svg{transition:transform .6s ease;}
    .btn-refresh.spinning svg{transform:rotate(360deg);}

    /* ── KPI grid ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-8);}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);transition:box-shadow var(--transition),border-color var(--transition);}
    .kpi-card:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary);}
    .kpi-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-3);}
    .kpi-val{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em;line-height:1.1;margin-bottom:4px;}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-variant-numeric:tabular-nums;}
    .kpi-icon{width:32px;height:32px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);}
    .kpi-icon.total{background:var(--color-primary-highlight);color:var(--color-primary);}
    .kpi-icon.upcoming{background:var(--color-gold-bg);color:var(--color-gold);}
    .kpi-icon.positive{background:var(--color-success-bg);color:var(--color-success);}
    .kpi-icon.sent{background:var(--color-gold-bg);color:var(--color-gold);}
    .kpi-up{color:var(--color-success);}
    .kpi-down{color:var(--color-notification);}

    /* ── Controls row ── */
    .controls-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-5);}
    .filters{display:flex;gap:var(--space-2);flex-wrap:wrap;}
    .filter-btn{font-size:var(--text-xs);font-weight:600;padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);transition:all var(--transition);cursor:pointer;}
    .filter-btn:hover{border-color:var(--color-primary);color:var(--color-primary);}
    .filter-btn.active{background:var(--color-primary);border-color:var(--color-primary);color:#fff;}
    .legend{display:flex;gap:var(--space-4);flex-wrap:wrap;font-size:var(--text-xs);color:var(--color-text-muted);}
    .legend-item{display:flex;align-items:center;gap:var(--space-2);}
    .legend-dot{width:10px;height:10px;border-radius:var(--radius-sm);flex-shrink:0;}
    .legend-dot.watchlist{background:#fef08a;}
    .legend-dot.portfolio{background:#fca5a5;}
    [data-theme="dark"] .legend-dot.watchlist{background:#854d0e;}
    [data-theme="dark"] .legend-dot.portfolio{background:#7f1d1d;}

    /* ── Error banner ── */
    .error-banner{background:var(--color-notification-bg);border:1px solid color-mix(in oklch,var(--color-notification) 30%,transparent);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-xs);color:var(--color-notification);display:none;margin-bottom:var(--space-6);}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-divider) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-kpi{height:100px;border-radius:var(--radius-xl);}
    .skel-row{height:52px;border-radius:var(--radius-md);margin-bottom:var(--space-2);}

    /* ── Table ── */
    .table-wrap{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden;}
    .table-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:var(--text-sm);}
    thead tr{background:var(--color-surface-offset);}
    th{padding:var(--space-3) var(--space-4);text-align:left;font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-faint);white-space:nowrap;border-bottom:1px solid var(--color-divider);}
    td{padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider);vertical-align:middle;white-space:nowrap;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr{transition:background var(--transition);}
    tbody tr:not(.row-watchlist):not(.row-portfolio):hover{background:var(--color-surface-2);}
    .row-watchlist{background:#fefce8;}
    .row-portfolio{background:#fff1f2;}
    [data-theme="dark"] .row-watchlist{background:#2d2500;}
    [data-theme="dark"] .row-portfolio{background:#2d0f0f;}
    .row-watchlist:hover{background:#fef9c3 !important;}
    .row-portfolio:hover{background:#ffe4e6 !important;}
    [data-theme="dark"] .row-watchlist:hover{background:#3d3100 !important;}
    [data-theme="dark"] .row-portfolio:hover{background:#3d1515 !important;}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--radius-sm);letter-spacing:.04em;}
    .badge-bmo{background:#dcfce7;color:#14532d;}
    .badge-amc{background:#fff7ed;color:#9a3412;}
    .badge-nd{background:var(--color-surface-offset);color:var(--color-text-faint);}
    [data-theme="dark"] .badge-bmo{background:#14532d;color:#86efac;}
    [data-theme="dark"] .badge-amc{background:#431407;color:#fdba74;}
    .badge-beat{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);background:var(--color-success-bg);color:var(--color-success);}
    .badge-miss{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--radius-full);background:var(--color-notification-bg);color:var(--color-notification);}

    /* ── Days pill ── */
    .days-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:var(--radius-full);margin-left:var(--space-2);}
    .days-urgent{background:var(--color-notification-bg);color:var(--color-notification);}
    .days-soon{background:#fef9c3;color:#713f12;}
    .days-later{background:var(--color-surface-offset);color:var(--color-text-faint);}
    [data-theme="dark"] .days-soon{background:#2d2500;color:#fbbf24;}

    /* ── Ticker cell ── */
    .ticker-sym{font-weight:700;letter-spacing:.03em;color:var(--color-text);}
    .ticker-name{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;}

    /* ── Numbers ── */
    .num{font-variant-numeric:tabular-nums;}
    .num-muted{color:var(--color-text-muted);font-size:var(--text-xs);}
    .num-pos{color:var(--color-success);font-variant-numeric:tabular-nums;}
    .num-neg{color:var(--color-notification);font-variant-numeric:tabular-nums;}

    /* ── Empty state ── */
    .empty-state{text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
    .empty-state-icon{font-size:2.5rem;margin-bottom:var(--space-4);}
    .empty-state h2{font-family:var(--font-display);font-size:var(--text-lg);margin-bottom:var(--space-2);color:var(--color-text);}

    /* ── Footer ── */
    .footer{text-align:center;padding:var(--space-6);font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);margin-top:auto;}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}

    /* ── Responsive ── */
    @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){
      .header-actions .nav-link{display:none;}
      .mobile-nav{display:block;}
      .page{padding:var(--space-8) var(--space-4) calc(var(--space-16) + 60px);}
      .hero-strip{margin-bottom:var(--space-6);}
      .controls-row{flex-direction:column;align-items:flex-start;}
    }
    @media(max-width:480px){
      .header{padding:var(--space-3) var(--space-4);}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .ticker-name{display:none;}
    }
  </style>
</head>

    </div>

    <!-- Controls: filters + legend -->
    <div class="controls-row">
      <div class="filters">
        <button class="filter-btn active" data-filter="todos">Todos</button>
        <button class="filter-btn" data-filter="esta-semana">Esta semana</button>
        <button class="filter-btn" data-filter="proxima-semana">Próxima semana</button>
      </div>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot watchlist"></div>
          <span>Watchlist</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot portfolio"></div>
          <span>Posição aberta</span>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div id="tableWrap">
      <div class="table-wrap">
        <div style="padding:var(--space-4)">
          <div class="skeleton skel-row"></div>
          <div class="skeleton skel-row"></div>
          <div class="skeleton skel-row"></div>
          <div class="skeleton skel-row"></div>
          <div class="skeleton skel-row"></div>
          <div class="skeleton skel-row"></div>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">
    FundScope &mdash; dados via <a href="https://github.com/chico130/fundscope">yfinance</a> · Atualizado 1&times;/dia (07:00)
  </footer>

  <script>
    // ── Theme ──────────────────────────────────────────────────────────
    const html = document.documentElement;
    const THEME_KEY = 'fs_theme';

    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem(THEME_KEY, t);
      const icon = document.getElementById('themeIcon');
      if (icon) icon.innerHTML = t === 'dark'
        ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }

    const savedTheme = localStorage.getItem(THEME_KEY)
      || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(savedTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    const mobileToggle = document.getElementById('themeToggleMobile');
    if (mobileToggle) mobileToggle.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── Helpers ────────────────────────────────────────────────────────
    const DAYS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const MONTHS_PT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const norm = s => String(s || '').split('.')[0].split('_')[0].toUpperCase();

    function fmtDate(s) {
      const d = new Date(s + 'T00:00:00');
      return DAYS_PT[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_PT[d.getMonth()];
    }

    function daysUntil(s) {
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(s + 'T00:00:00'); d.setHours(0,0,0,0);
      return Math.round((d - today) / 86400000);
    }

    function daysPill(days) {
      if (days < 0) return '';
      if (days === 0) return '<span class="days-pill days-urgent">hoje</span>';
      if (days === 1) return '<span class="days-pill days-urgent">amanhã</span>';
      if (days <= 5)  return '<span class="days-pill days-soon">em ' + days + 'd</span>';
      return '<span class="days-pill days-later">em ' + days + 'd</span>';
    }

    function fmtEps(v) {
      if (v === null || v === undefined) return '<span class="num-muted">—</span>';
      const s = (v < 0 ? '-$' : '$') + Math.abs(v).toFixed(2);
      return '<span class="num ' + (v >= 0 ? 'num-pos' : 'num-neg') + '">' + s + '</span>';
    }

    function fmtRevenue(v) {
      if (v === null || v === undefined) return '<span class="num-muted">—</span>';
      const abs = Math.abs(v);
      let s;
      if (abs >= 1e12)      s = '$' + (v / 1e12).toFixed(1) + 'T';
      else if (abs >= 1e9)  s = '$' + (v / 1e9).toFixed(1) + 'B';
      else if (abs >= 1e6)  s = '$' + (v / 1e6).toFixed(0) + 'M';
      else                  s = '$' + v.toLocaleString('pt');
      return '<span class="num">' + s + '</span>';
    }

    function fmtSurprise(v) {
      if (v === null || v === undefined) return '<span class="num-muted">—</span>';
      const pct  = (v * 100).toFixed(1);
      const sign = v > 0 ? '+' : '';
      if (v >= 0.03)  return '<span class="badge-beat">▲ ' + sign + pct + '%</span>';
      if (v <= -0.03) return '<span class="badge-miss">▼ ' + pct + '%</span>';
      return '<span class="num ' + (v >= 0 ? 'num-pos' : 'num-neg') + '">' + sign + pct + '%</span>';
    }

    function badgeHora(h) {
      if (h === 'BMO') return '<span class="badge badge-bmo">BMO</span>';
      if (h === 'AMC') return '<span class="badge badge-amc">AMC</span>';
      return '<span class="badge badge-nd">N/D</span>';
    }

    function getWeekBounds(offset) {
      const now = new Date();
      const dow = now.getDay();
      const monday = new Date(now);
      monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + offset * 7);
      monday.setHours(0,0,0,0);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23,59,59,999);
      return { start: monday, end: sunday };
    }

    function inWeek(dateStr, offset) {
      const { start, end } = getWeekBounds(offset);
      const d = new Date(dateStr + 'T00:00:00');
      return d >= start && d <= end;
    }

    // ── State ──────────────────────────────────────────────────────────
    let allEarnings      = [];
    let portfolioTickers = new Set();
    let watchlistTickers = new Set();
    let currentFilter    = 'todos';

    // ── KPI icon SVGs ──────────────────────────────────────────────────
    const I_CALENDAR = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
    const I_CLOCK    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
    const I_ARROW_UP = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
    const I_BAR      = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`;

    // ── Render KPIs ────────────────────────────────────────────────────
    function renderKPIs(earnings) {
      const today = new Date(); today.setHours(0,0,0,0);
      const in7   = new Date(today); in7.setDate(today.getDate() + 7);

      const upcoming7 = earnings.filter(e => {
        const d = new Date(e.data + 'T00:00:00'); d.setHours(0,0,0,0);
        return d >= today && d <= in7;
      }).length;

      const withData  = earnings.filter(e => e.surpresa_media_pct !== null && e.surpresa_media_pct !== undefined);
      const nPositive = withData.filter(e => e.surpresa_media_pct > 0).length;
      const nNegative = withData.filter(e => e.surpresa_media_pct < 0).length;
      const avgRaw    = withData.length
        ? withData.reduce((a, e) => a + e.surpresa_media_pct, 0) / withData.length
        : null;
      const avgPct  = avgRaw !== null ? (avgRaw * 100).toFixed(1) : null;
      const sentCls = avgRaw === null ? '' : avgRaw > 0 ? 'kpi-up' : 'kpi-down';
      const sentSign = avgRaw !== null && avgRaw > 0 ? '+' : '';

      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-icon total">${I_CALENDAR}</div>
          <div class="kpi-label">Total de Divulgações</div>
          <div class="kpi-val">${earnings.length}</div>
          <div class="kpi-sub">próximas 2 semanas</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon upcoming">${I_CLOCK}</div>
          <div class="kpi-label">Próximos 7 Dias</div>
          <div class="kpi-val">${upcoming7}</div>
          <div class="kpi-sub">empresas a reportar</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon positive">${I_ARROW_UP}</div>
          <div class="kpi-label">Surpresas Positivas</div>
          <div class="kpi-val kpi-up">${nPositive}</div>
          <div class="kpi-sub">${nNegative} negativas · ${withData.length} com dados</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon sent">${I_BAR}</div>
          <div class="kpi-label">Surpresa Histórica Média</div>
          <div class="kpi-val ${sentCls}">${avgPct !== null ? sentSign + avgPct + '%' : '—'}</div>
          <div class="kpi-sub">média ponderada das surpresas</div>
        </div>`;
    }

    // ── Render table ───────────────────────────────────────────────────
    function renderTable(earnings) {
      const wrap = document.getElementById('tableWrap');
      if (!earnings.length) {
        wrap.innerHTML = `<div class="table-wrap"><div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <h2>Sem earnings para este período</h2>
          <p style="font-size:var(--text-sm);margin-top:var(--space-2)">Tenta o filtro "Todos" ou aguarda a próxima atualização.</p>
        </div></div>`;
        return;
      }

      const rows = earnings.map(e => {
        const sym    = norm(e.ticker);
        const inPort = portfolioTickers.has(sym);
        const inWatch = watchlistTickers.has(sym);
        const rowCls = inPort ? 'row-portfolio' : (inWatch ? 'row-watchlist' : '');
        const days   = daysUntil(e.data);
        return `<tr class="${rowCls}">
          <td>${fmtDate(e.data)}${daysPill(days)}</td>
          <td>${badgeHora(e.hora)}</td>
          <td>
            <div class="ticker-sym">${e.ticker}</div>
            <div class="ticker-name">${e.nome || '—'}</div>
          </td>
          <td>${fmtEps(e.eps_estimado)}</td>
          <td>${fmtEps(e.eps_anterior)}</td>
          <td>${fmtRevenue(e.revenue_estimado)}</td>
          <td>${fmtRevenue(e.revenue_anterior)}</td>
          <td>${fmtSurprise(e.surpresa_media_pct)}</td>
        </tr>`;
      }).join('');

      wrap.innerHTML = `<div class="table-wrap"><div class="table-scroll"><table>
        <thead><tr>
          <th>Data</th>
          <th>Hora</th>
          <th>Empresa</th>
          <th>EPS Est.</th>
          <th>EPS Ant.</th>
          <th>Revenue Est.</th>
          <th>Revenue Ant.</th>
          <th>Surpresa Hist.</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
    }

    function applyFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === filter)
      );
      let filtered = allEarnings;
      if (filter === 'esta-semana')    filtered = allEarnings.filter(e => inWeek(e.data, 0));
      if (filter === 'proxima-semana') filtered = allEarnings.filter(e => inWeek(e.data, 1));
      renderTable(filtered);
    }

    document.querySelectorAll('.filter-btn').forEach(btn =>
      btn.addEventListener('click', () => applyFilter(btn.dataset.filter))
    );

    // ── JSON helpers ───────────────────────────────────────────────────
    async function fetchJSON(path) {
      try {
        const r = await fetch(path + '?t=' + Date.now());
        if (!r.ok) return null;
        return await r.json();
      } catch { return null; }
    }

    async function loadPortfolioTickers() {
      const addPos = data => {
        if (!data || !Array.isArray(data.positions)) return;
        data.positions.forEach(p => {
          ['ticker', 'ticker_display', 'display_name'].forEach(k => {
            const v = p?.[k];
            if (v) portfolioTickers.add(norm(v));
          });
        });
      };
      const beta  = await fetchJSON('data/beta/beta_positions.json');
      addPos(beta);
      const alpha = (await fetchJSON('data/alpha/portfolio.json'))
                 || (await fetchJSON('portfolio.json'));
      addPos(alpha);
    }

    async function loadWatchlistTickers() {
      const data = await fetchJSON('data/beta/watchlist.json');
      if (!data) return;
      (data.candidates || []).forEach(c => {
        if (c?.ticker) watchlistTickers.add(norm(c.ticker));
      });
    }

    // ── Load data ──────────────────────────────────────────────────────
    async function loadData() {
      const btn = document.getElementById('btnRefresh');
      btn.classList.add('spinning');

      portfolioTickers = new Set();
      watchlistTickers = new Set();

      try {
        await Promise.all([loadPortfolioTickers(), loadWatchlistTickers()]);

        const r = await fetch('earnings.json?t=' + Date.now());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();

        allEarnings = (data.earnings || []).sort((a, b) => a.data.localeCompare(b.data));

        const upd = new Date(data.last_updated).toLocaleString('pt', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });
        document.getElementById('updatedLabel').textContent =
          'Atualizado: ' + upd + ' · ' + allEarnings.length + ' empresas';
        document.getElementById('errorBanner').style.display = 'none';

        renderKPIs(allEarnings);
        applyFilter(currentFilter);

      } catch (err) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = 'Erro ao carregar earnings.json — corre update_earnings.py para gerar.';
        banner.style.display = 'block';
        document.getElementById('updatedLabel').textContent = 'Dados não disponíveis';
        document.getElementById('tableWrap').innerHTML = `<div class="table-wrap"><div class="empty-state">
          <div class="empty-state-icon">🐷</div>
          <h2>Dados ainda não disponíveis</h2>
          <p style="font-size:var(--text-sm);margin-top:var(--space-2)">Corre <code>py update_earnings.py</code> ou aguarda a tarefa das 07:00.</p>
        </div></div>`;
      } finally {
        btn.classList.remove('spinning');
      }
    }

    // ── Auto-refresh 30s ───────────────────────────────────────────────
    const REFRESH_INTERVAL = 30;
    let countdown = REFRESH_INTERVAL;
    let timer;

    function startCountdown() {
      clearInterval(timer);
      countdown = REFRESH_INTERVAL;
      const el = document.getElementById('countdown');
      timer = setInterval(() => {
        countdown--;
        el.textContent = `Próxima atualização em ${countdown}s`;
        if (countdown <= 0) {
          countdown = REFRESH_INTERVAL;
          loadData();
        }
      }, 1000);
    }

    document.getElementById('btnRefresh').addEventListener('click', () => {
      loadData();
      startCountdown();
    });

    loadData().then(startCountdown);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/fundscope/sw.js');
      });
    }
  </script>
