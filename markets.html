<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mercados — FundScope</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#01696f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FundScope">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --color-gold:#c47d1a;--color-gold-bg:#fdf3e0;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --color-gold:#e8af34;--color-gold-bg:#2d2208;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);display:flex;flex-direction:column;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}

    /* ── Header ── */
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-text);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .header-actions{display:flex;align-items:center;gap:var(--space-1);}
    .nav-link{font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);font-weight:500;}
    .nav-link:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .nav-link.active{color:var(--color-primary);background:var(--color-primary-highlight);font-weight:600;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}

    /* ── Mobile nav ── */
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:color-mix(in oklch,var(--color-bg) 95%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--color-divider);padding:var(--space-2) var(--space-4);padding-bottom:max(var(--space-2),env(safe-area-inset-bottom));}
    .mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-lg);color:var(--color-text-faint);font-size:10px;font-weight:600;transition:color var(--transition),background var(--transition);min-width:52px;}
    .mobile-nav-item.active{color:var(--color-primary);}
    .mobile-nav-item svg{width:20px;height:20px;}

    /* ── Page layout ── */
    .page{max-width:1200px;margin:0 auto;padding:var(--space-10) var(--space-6) var(--space-16);width:100%;flex:1;}

    /* ── Hero strip ── */
    .hero-strip{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4);margin-bottom:var(--space-8);}
    .hero-eyebrow{font-size:var(--text-xs);color:var(--color-primary);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:var(--space-2);}
    .hero-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;letter-spacing:-.02em;line-height:1.15;margin-bottom:var(--space-3);}
    .hero-meta{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;}
    .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-success);font-weight:500;}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--color-success);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .updated-label{font-size:var(--text-xs);color:var(--color-text-faint);}
    .slot-badge{display:inline-flex;align-items:center;gap:6px;font-size:var(--text-xs);font-weight:600;padding:2px var(--space-3);border-radius:var(--radius-full);background:var(--color-surface);border:1px solid var(--color-border);color:var(--color-text-muted);}

    /* ── Refresh control ── */
    .refresh-ctrl{display:flex;align-items:center;gap:var(--space-3);}
    .refresh-countdown{font-size:var(--text-xs);color:var(--color-text-faint);font-variant-numeric:tabular-nums;}
    .btn-refresh{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);font-weight:600;color:var(--color-primary);padding:var(--space-2) var(--space-3);border-radius:var(--radius-full);border:1px solid color-mix(in oklch,var(--color-primary) 30%,transparent);background:var(--color-primary-highlight);transition:all var(--transition);}
    .btn-refresh:hover{background:color-mix(in oklch,var(--color-primary) 15%,transparent);}
    .btn-refresh svg{transition:transform .6s ease;}
    .btn-refresh.spinning svg{transform:rotate(360deg);}

    /* ── KPI grid ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-8);}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);transition:box-shadow var(--transition),border-color var(--transition);}
    .kpi-card:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary);}
    .kpi-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-3);}
    .kpi-val{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em;line-height:1.1;margin-bottom:4px;}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-variant-numeric:tabular-nums;}
    .kpi-icon{width:32px;height:32px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);}
    .kpi-icon.total{background:var(--color-primary-highlight);color:var(--color-primary);}
    .kpi-icon.bull{background:var(--color-success-bg);color:var(--color-success);}
    .kpi-icon.bear{background:var(--color-notification-bg);color:var(--color-notification);}
    .kpi-icon.sent{background:var(--color-gold-bg);color:var(--color-gold);}
    .up{color:var(--color-success);}
    .down{color:var(--color-notification);}
    .neutral{color:var(--color-text-muted);}

    /* ── Section header ── */
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);}
    .section-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);}

    /* ── Overview bar ── */
    .overview-bar-wrap{position:relative;margin-bottom:var(--space-8);}
    .overview-bar-wrap::after{content:'';position:absolute;right:0;top:0;bottom:8px;width:60px;background:linear-gradient(to right,transparent,var(--color-bg));pointer-events:none;}
    .overview-bar{display:flex;gap:var(--space-3);overflow-x:auto;padding-bottom:var(--space-2);scrollbar-width:none;}
    .overview-bar::-webkit-scrollbar{display:none;}
    .overview-pill{flex-shrink:0;display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);font-size:var(--text-xs);font-weight:600;transition:all var(--transition);white-space:nowrap;}
    .overview-pill:hover{border-color:var(--color-primary);color:var(--color-primary);}
    .overview-pill.up{color:var(--color-success);}
    .overview-pill.down{color:var(--color-notification);}

    /* ── Sector blocks ── */
    .sector-block{margin-bottom:var(--space-12);scroll-margin-top:80px;}
    .sector-header{position:relative;border-radius:var(--radius-2xl);overflow:hidden;height:160px;margin-bottom:var(--space-6);display:flex;align-items:flex-end;padding:var(--space-6);}
    .sector-header-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.45) saturate(.8);}
    .sector-header-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.75) 0%,rgba(0,0,0,.2) 100%);}
    .sector-header-content{position:relative;z-index:1;display:flex;align-items:center;gap:var(--space-4);width:100%;}
    .sector-icon{font-size:1.8rem;flex-shrink:0;}
    .sector-title{font-family:var(--font-display);font-size:var(--text-lg);color:#fff;flex:1;min-width:0;}
    .sector-avg{font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);white-space:nowrap;flex-shrink:0;}
    .sector-avg.up{background:rgba(67,122,34,.25);color:#7dcc50;border:1px solid rgba(67,122,34,.4);}
    .sector-avg.down{background:rgba(161,53,68,.25);color:#f08090;border:1px solid rgba(161,53,68,.4);}

    /* ── Movers grid ── */
    .movers-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);margin-bottom:var(--space-5);}
    .movers-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .movers-card-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .mover-row{display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--color-divider);}
    .mover-row:last-child{border-bottom:none;}
    .mover-ticker{font-size:var(--text-sm);font-weight:700;letter-spacing:.03em;position:relative;}
    .mover-ticker a{transition:color var(--transition);}
    .mover-ticker a:hover{color:var(--color-primary);}
    .mover-ticker [data-tip]:hover::after{content:attr(data-tip);position:absolute;left:0;top:calc(100% + 4px);z-index:50;background:var(--color-text);color:var(--color-bg);font-size:11px;font-weight:500;white-space:nowrap;padding:4px 8px;border-radius:var(--radius-sm);box-shadow:var(--shadow-md);pointer-events:none;}
    .mover-price{font-size:var(--text-xs);color:var(--color-text-muted);margin-left:var(--space-2);}
    .mover-chg{font-size:var(--text-sm);font-weight:700;font-variant-numeric:tabular-nums;padding:2px 8px;border-radius:var(--radius-full);}
    .mover-chg.up{background:var(--color-success-bg);color:var(--color-success);}
    .mover-chg.down{background:var(--color-notification-bg);color:var(--color-notification);}

    /* ── Bottom row ── */
    .bottom-row{display:grid;grid-template-columns:220px 1fr;gap:var(--space-5);}
    .sentiment-card,.news-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .card-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}

    /* ── Gauge ── */
    .gauge-wrap{margin:var(--space-3) 0;}
    .gauge-bar{height:8px;border-radius:var(--radius-full);background:var(--color-surface-offset);overflow:hidden;margin-bottom:6px;}
    .gauge-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-notification),#f0c040,var(--color-success));}
    .gauge-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-faint);}
    .gauge-score{font-size:var(--text-lg);font-weight:700;text-align:center;margin:var(--space-3) 0 2px;font-family:var(--font-display);}
    .gauge-score.bullish{color:var(--color-success);}
    .gauge-score.bearish{color:var(--color-notification);}
    .gauge-score.neut{color:var(--color-text-muted);}
    .gauge-sub{text-align:center;font-size:var(--text-xs);color:var(--color-text-faint);}
    .analyst-row{display:flex;align-items:center;justify-content:space-between;margin-top:var(--space-2);padding-top:var(--space-2);border-top:1px solid var(--color-divider);font-size:10px;color:var(--color-text-muted);}

    /* ── News ── */
    .news-list{display:flex;flex-direction:column;gap:var(--space-3);}
    .news-item{display:flex;gap:var(--space-3);padding:var(--space-3);background:var(--color-surface-2);border-radius:var(--radius-lg);border:1px solid var(--color-divider);transition:border-color var(--transition),box-shadow var(--transition);color:inherit;}
    .news-item:hover{border-color:var(--color-primary);box-shadow:var(--shadow-sm);}
    .news-thumb{width:64px;height:64px;border-radius:var(--radius-md);object-fit:cover;flex-shrink:0;background:var(--color-surface-offset);}
    .news-body{flex:1;min-width:0;}
    .news-source-row{display:flex;align-items:center;gap:var(--space-2);margin-bottom:3px;}
    .news-ticker-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--radius-sm);background:var(--color-primary-highlight);color:var(--color-primary);}
    .news-source{font-size:10px;color:var(--color-text-faint);}
    .news-headline{font-size:var(--text-xs);font-weight:600;color:var(--color-text);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .news-summary{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:4px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .news-time{font-size:10px;color:var(--color-text-faint);margin-top:4px;}
    .empty-news{font-size:var(--text-xs);color:var(--color-text-faint);text-align:center;padding:var(--space-6);}

    /* ── Error banner ── */
    .error-banner{background:var(--color-notification-bg);border:1px solid color-mix(in oklch,var(--color-notification) 30%,transparent);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-xs);color:var(--color-notification);display:none;margin-bottom:var(--space-6);}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-divider) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-kpi{height:96px;border-radius:var(--radius-xl);}

    /* ── Footer ── */
    .footer{text-align:center;padding:var(--space-6);font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);margin-top:auto;}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}

    /* ── Responsive ── */
    @media(max-width:900px){
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .bottom-row{grid-template-columns:1fr;}
    }
    @media(max-width:768px){
      .header-actions .nav-link{display:none;}
      .mobile-nav{display:block;}
      .page{padding:var(--space-8) var(--space-4) calc(var(--space-16) + 60px);}
      .movers-grid{grid-template-columns:1fr;}
    }
    @media(max-width:480px){
      .header{padding:var(--space-3) var(--space-4);}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .sector-header{height:120px;padding:var(--space-4);}
      .sector-icon{font-size:1.4rem;}
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="search.html" class="logo">
      <svg class="logo-svg" viewBox="0 0 28 28" fill="none">
        <ellipse cx="14" cy="15" rx="9" ry="7.5" fill="var(--color-primary)" opacity="0.18"/>
        <ellipse cx="14" cy="14.5" rx="8" ry="6.5" fill="var(--color-primary)"/>
        <ellipse cx="14" cy="18.5" rx="3.5" ry="2.5" fill="var(--color-primary-hover)"/>
        <circle cx="12.8" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="15.2" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="10.8" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="11.1" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <circle cx="17.2" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="17.5" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <ellipse cx="7" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <ellipse cx="21" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <rect x="12" y="8.5" width="4" height="1.2" rx="0.6" fill="var(--color-bg)" opacity="0.6"/>
        <path d="M22.5 17 Q25 16 24.5 19 Q24 21 22 20" stroke="var(--color-primary-hover)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      FundScope
    </a>
    <div class="header-actions">
      <a href="search.html" class="nav-link">Pesquisa</a>
      <a href="markets.html" class="nav-link active">Mercados</a>
      <a href="news.html" class="nav-link">Notícias</a>
      <a href="earnings.html" class="nav-link">Earnings</a>
      <a href="watchlist.html" class="nav-link">Watchlist</a>
      <button class="btn-icon" id="themeToggle" aria-label="Alternar tema">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <nav class="mobile-nav" aria-label="Navegação principal">
    <div class="mobile-nav-inner">
      <a href="search.html" class="mobile-nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Início
      </a>
      <a href="markets.html" class="mobile-nav-item active">

  <main class="page">

    <div class="section-head">
      <span class="section-title">Setores</span>

      <div class="overview-bar" id="overviewBar">
        <div class="skeleton" style="height:32px;width:120px;border-radius:999px;flex-shrink:0"></div>
        <div class="skeleton" style="height:32px;width:120px;border-radius:999px;flex-shrink:0"></div>
        <div class="skeleton" style="height:32px;width:120px;border-radius:999px;flex-shrink:0"></div>
        <div class="skeleton" style="height:32px;width:120px;border-radius:999px;flex-shrink:0"></div>

    <div id="sectorsWrap">
      <div class="skeleton" style="height:160px;border-radius:1.5rem;margin-bottom:1.5rem"></div>

  <script>
    // ── Theme (localStorage, idêntico ao live_portfolio) ────────────
    const html = document.documentElement;
    const THEME_KEY = 'fs_theme';

    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem(THEME_KEY, t);
      const icon = document.getElementById('themeIcon');
      if (icon) icon.innerHTML = t === 'dark'
        ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }

    const savedTheme = localStorage.getItem(THEME_KEY)
      || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(savedTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    const mobileToggle = document.getElementById('themeToggleMobile');
    if (mobileToggle) mobileToggle.addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    // ── Helpers ─────────────────────────────────────────────────────
    const SLOT_LABELS = { abertura: '🔔 Abertura', 'meio-dia': '☀️ Meio-dia', fecho: '🔕 Fecho' };

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() / 1000) - ts);
      if (diff < 3600)  return Math.floor(diff / 60) + 'min';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h';
      return Math.floor(diff / 86400) + 'd';
    }

    function relativeTime(isoStr) {
      if (!isoStr) return '';
      const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
      if (diff < 60)    return `há ${diff}s`;
      if (diff < 3600)  return `há ${Math.floor(diff / 60)}min`;
      if (diff < 86400) return `há ${Math.floor(diff / 3600)}h`;
      return `há ${Math.floor(diff / 86400)}d`;
    }

    const sign = v => v > 0 ? '+' : '';
    const cls  = v => v > 0 ? 'up' : v < 0 ? 'down' : 'neutral';

    const TICKER_NAMES = {
      AAPL:'Apple',MSFT:'Microsoft',NVDA:'NVIDIA',GOOGL:'Alphabet',META:'Meta',AMD:'AMD',INTC:'Intel',
      TSLA:'Tesla',AVGO:'Broadcom',MU:'Micron',QCOM:'Qualcomm',ORCL:'Oracle',CRM:'Salesforce',
      ADBE:'Adobe',NOW:'ServiceNow',JPM:'JPMorgan',BAC:'Bank of America',GS:'Goldman Sachs',
      MS:'Morgan Stanley',WFC:'Wells Fargo',C:'Citigroup',BLK:'BlackRock',AXP:'Amex',V:'Visa',
      MA:'Mastercard',SCHW:'Schwab',USB:'US Bancorp',PNC:'PNC Financial',TFC:'Truist',COF:'Capital One',
      XOM:'ExxonMobil',CVX:'Chevron',COP:'ConocoPhillips',SLB:'SLB',EOG:'EOG Resources',
      PSX:'Phillips 66',MPC:'Marathon Petroleum',VLO:'Valero',OXY:'Occidental',HAL:'Halliburton',
      NEE:'NextEra Energy',D:'Dominion',DUK:'Duke Energy',SO:'Southern Co.',AEP:'AEP',
      JNJ:'Johnson & Johnson',UNH:'UnitedHealth',PFE:'Pfizer',ABBV:'AbbVie',MRK:'Merck',
      LLY:'Eli Lilly',TMO:'Thermo Fisher',ABT:'Abbott',DHR:'Danaher',BMY:'Bristol-Myers',
      AMGN:'Amgen',GILD:'Gilead',MDT:'Medtronic',CVS:'CVS Health',ISRG:'Intuitive Surgical',
      AMZN:'Amazon',WMT:'Walmart',HD:'Home Depot',MCD:"McDonald's",SBUX:'Starbucks',NKE:'Nike',
      TGT:'Target',COST:'Costco',LOW:"Lowe's",TJX:'TJX',PG:'Procter & Gamble',KO:'Coca-Cola',
      PEP:'PepsiCo',PM:'Philip Morris',CL:'Colgate',MDLZ:'Mondelez',
      FCX:'Freeport-McMoRan',NEM:'Newmont',GOLD:'Barrick Gold',AA:'Alcoa',CLF:'Cleveland-Cliffs',
      X:'US Steel',MP:'MP Materials',WPM:'Wheaton Precious',AEM:'Agnico Eagle',CF:'CF Industries',
      MOS:'Mosaic',NUE:'Nucor',STLD:'Steel Dynamics',RS:'Reliance Steel',ATI:'ATI Inc.'
    };

    // ── KPI icons ────────────────────────────────────────────────────
    const ICON_TREND = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`;
    const ICON_UP    = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
    const ICON_DOWN  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;
    const ICON_SENT  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;

    // ── Render KPIs ──────────────────────────────────────────────────
    function renderKPIs(sectors) {
      const entries = Object.entries(sectors);
      const avgChange = (entries.reduce((a, [, s]) => a + s.avgChange, 0) / entries.length).toFixed(2);
      const nUp   = entries.filter(([, s]) => s.avgChange > 0).length;
      const nDown = entries.filter(([, s]) => s.avgChange < 0).length;
      const best  = entries.reduce((a, b) => a[1].avgChange > b[1].avgChange ? a : b);
      const worst = entries.reduce((a, b) => a[1].avgChange < b[1].avgChange ? a : b);
      const avgSent = (entries.reduce((a, [, s]) => a + (s.sentiment?.bullishPct || 0), 0) / entries.length).toFixed(1);
      const sentCls = avgSent >= 55 ? 'bullish' : avgSent <= 45 ? 'bearish' : 'neut';
      const sentLbl = avgSent >= 55 ? '📈 Otimista' : avgSent <= 45 ? '📉 Pessimista' : '➡️ Neutro';

      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-icon total">${ICON_TREND}</div>
          <div class="kpi-label">Tendência Global</div>
          <div class="kpi-val ${cls(parseFloat(avgChange))}">${sign(parseFloat(avgChange))}${avgChange}%</div>
          <div class="kpi-sub">${nUp} setores em alta · ${nDown} em baixa</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon bull">${ICON_UP}</div>
          <div class="kpi-label">Melhor Setor</div>
          <div class="kpi-val">${best[1].icon} ${best[0]}</div>
          <div class="kpi-sub up">+${best[1].avgChange}% hoje</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon bear">${ICON_DOWN}</div>
          <div class="kpi-label">Pior Setor</div>
          <div class="kpi-val">${worst[1].icon} ${worst[0]}</div>
          <div class="kpi-sub down">${worst[1].avgChange}% hoje</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon sent">${ICON_SENT}</div>
          <div class="kpi-label">Sentimento Médio</div>
          <div class="kpi-val ${sentCls === 'bullish' ? 'up' : sentCls === 'bearish' ? 'down' : 'neutral'}">${avgSent}%</div>
          <div class="kpi-sub">${sentLbl}</div>
        </div>`;
    }

    // ── Render gauge ─────────────────────────────────────────────────
    function renderGauge(pct) {
      if (pct == null) return '<div class="gauge-score neut">—</div><div class="gauge-sub">Sem dados</div>';
      const c   = pct >= 55 ? 'bullish' : pct <= 45 ? 'bearish' : 'neut';
      const lbl = pct >= 55 ? '📈 Otimista' : pct <= 45 ? '📉 Pessimista' : '➡️ Neutro';
      return `<div class="gauge-wrap"><div class="gauge-bar"><div class="gauge-fill" style="width:${pct}%"></div></div><div class="gauge-labels"><span>Pessimista</span><span>Otimista</span></div></div><div class="gauge-score ${c}">${pct}%</div><div class="gauge-sub">${lbl}</div>`;
    }

    const SECTOR_FALLBACKS = {
      'Tecnologia':'https://images.unsplash.com/photo-1518770660439-4636190af475?w=200&q=70',
      'Finanças':'https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=200&q=70',
      'Energia':'https://images.unsplash.com/photo-1509391366360-2e959784a276?w=200&q=70',
      'Saúde':'https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=200&q=70',
      'Consumo':'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=200&q=70',
      'Commodities':'https://images.unsplash.com/photo-1610375461246-83df859d849d?w=200&q=70'
    };

    // ── Render news ──────────────────────────────────────────────────
    function renderNews(arr, sectorName) {
      if (!arr || !arr.length) return '<div class="empty-news">Sem notícias recentes</div>';
      const fallback = SECTOR_FALLBACKS[sectorName] || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=200&q=70';
      return arr.map(n => {
        const thumb = n.image
          ? `<img class="news-thumb" src="${n.image}" alt="" loading="lazy" onerror="this.src='${fallback}'">`
          : `<img class="news-thumb" src="${fallback}" alt="" loading="lazy">`;
        const ago = n.datetime ? timeAgo(n.datetime) : '';
        return `<a class="news-item" href="${n.url || '#'}" target="_blank" rel="noopener">${thumb}<div class="news-body"><div class="news-source-row"><span class="news-ticker-badge">${n.ticker || ''}</span><span class="news-source">${n.source || ''}</span></div><div class="news-headline">${n.headline}</div>${n.summary ? `<div class="news-summary">${n.summary}</div>` : ''}${ago ? `<div class="news-time">${ago} atrás</div>` : ''}</div></a>`;
      }).join('');
    }

    // ── Render sector ────────────────────────────────────────────────
    function renderSector(name, s) {
      const isUp   = s.avgChange >= 0;
      const signS  = isUp ? '+' : '';
      const anchor = name.toLowerCase().replace(/[^a-z]/g, '');

      const moverRow = (g, isGainer) => {
        const tip = TICKER_NAMES[g.ticker] ? ` data-tip="${TICKER_NAMES[g.ticker]}"` : '';
        const chg = isGainer
          ? `<span class="mover-chg up">▲ +${g.changePct.toFixed(2)}%</span>`
          : `<span class="mover-chg down">▼ ${g.changePct.toFixed(2)}%</span>`;
        return `<div class="mover-row"><div style="display:flex;align-items:center;gap:4px"><span class="mover-ticker"><a href="stock.html?ticker=${g.ticker}"${tip}>${g.ticker}</a></span><span class="mover-price">$${g.price}</span></div>${chg}</div>`;
      };

      const gainersHTML = s.gainers.length
        ? s.gainers.map(g => moverRow(g, true)).join('')
        : '<div style="font-size:var(--text-xs);color:var(--color-text-faint);padding:var(--space-4)">Sem dados</div>';
      const losersHTML = s.losers.length
        ? s.losers.map(g => moverRow(g, false)).join('')
        : '<div style="font-size:var(--text-xs);color:var(--color-text-faint);padding:var(--space-4)">Sem dados</div>';

      const analystDetails = (s.sentiment?.details || []).map(d => {
        const tip = TICKER_NAMES[d.ticker] ? ` title="${TICKER_NAMES[d.ticker]}"` : '';
        return `<div class="analyst-row"><span${tip} style="cursor:default">${d.ticker}</span><span>${d.bullish !== null ? d.bullish + '%' : '—'}</span><span>${d.articles} art.</span></div>`;
      }).join('');

      return `<div class="sector-block" id="${anchor}">
        <div class="sector-header">
          <img class="sector-header-img" src="${s.image}" alt="${name}" loading="lazy">
          <div class="sector-header-overlay"></div>
          <div class="sector-header-content">
            <span class="sector-icon">${s.icon}</span>
            <span class="sector-title">${name}</span>
            <span class="sector-avg ${isUp ? 'up' : 'down'}">${signS}${s.avgChange}%</span>
          </div>
        </div>
        <div class="movers-grid">
          <div class="movers-card"><div class="movers-card-title">🟢 Maiores Subidas</div>${gainersHTML}</div>
          <div class="movers-card"><div class="movers-card-title">🔴 Maiores Quedas</div>${losersHTML}</div>
        </div>
        <div class="bottom-row">
          <div class="sentiment-card"><div class="card-label">Sentimento Analistas</div>${renderGauge(s.sentiment?.bullishPct)}${analystDetails}</div>
          <div class="news-card"><div class="card-label">Notícias do Setor</div><div class="news-list">${renderNews(s.news, name)}</div></div>
        </div>
      </div>`;
    }

    // ── Data fetch ───────────────────────────────────────────────────
    async function loadData() {
      const btn = document.getElementById('btnRefresh');
      btn.classList.add('spinning');
      try {
        const res = await fetch(`markets.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('errorBanner').style.display = 'none';

        const badge = document.getElementById('liveBadge');
        badge.innerHTML = `<span class="live-dot"></span> Dados carregados`;
        badge.style.color = 'var(--color-success)';

        document.getElementById('updatedLabel').textContent = data.updated
          ? `Atualizado ${relativeTime(data.updated)}`
          : '';

        const slotBadge = document.getElementById('slotBadge');
        if (data.slot && SLOT_LABELS[data.slot]) {
          slotBadge.textContent = SLOT_LABELS[data.slot];
          slotBadge.style.display = 'inline-flex';
        }

        renderKPIs(data.sectors);

        document.getElementById('overviewBar').innerHTML = Object.entries(data.sectors).map(([name, s]) => {
          const anchor = name.toLowerCase().replace(/[^a-z]/g, '');
          return `<a href="#${anchor}" class="overview-pill ${s.avgChange >= 0 ? 'up' : 'down'}">${s.icon} ${name} <span>${s.avgChange >= 0 ? '+' : ''}${s.avgChange}%</span></a>`;
        }).join('');

        document.getElementById('sectorsWrap').innerHTML = Object.entries(data.sectors)
          .map(([name, s]) => renderSector(name, s)).join('');

      } catch (err) {
        const banner = document.getElementById('errorBanner');
        banner.textContent = `Erro ao carregar markets.json: ${err.message}`;
        banner.style.display = 'block';

        document.getElementById('liveBadge').innerHTML = `⚠ Sem dados`;
        document.getElementById('liveBadge').style.color = 'var(--color-notification)';

        document.getElementById('sectorsWrap').innerHTML = `
          <div style="text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted)">
            <div style="font-size:2.5rem;margin-bottom:var(--space-4)">🐷</div>
            <div style="font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-text);margin-bottom:var(--space-2)">Dados ainda não disponíveis</div>
            <p style="font-size:var(--text-sm)">O workflow corre às 09:00, 13:00 e 16:30 WEST (dias úteis).</p>
          </div>`;
        document.getElementById('overviewBar').innerHTML = '';
      } finally {
        btn.classList.remove('spinning');
      }
    }

    // ── Auto-refresh 30s ─────────────────────────────────────────────
    const REFRESH_INTERVAL = 30;
    let countdown = REFRESH_INTERVAL;
    let timer;

    function startCountdown() {
      clearInterval(timer);
      countdown = REFRESH_INTERVAL;
      const el = document.getElementById('countdown');
      timer = setInterval(() => {
        countdown--;
        el.textContent = `Próxima atualização em ${countdown}s`;
        if (countdown <= 0) {
          countdown = REFRESH_INTERVAL;
          loadData();
        }
      }, 1000);
    }

    document.getElementById('btnRefresh').addEventListener('click', () => {
      loadData();
      startCountdown();
    });

    loadData().then(startCountdown);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
