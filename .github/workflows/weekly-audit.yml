name: FundScope — Auditor Semanal

# Corre ao sábado de madrugada, depois do mercado fechar sexta às 21:00 UTC.
# Dados da semana já estabilizados. [skip ci] no commit evita disparar outros workflows.
on:
  schedule:
    - cron: '0 6 * * 6'   # Sábado 06:00 UTC
  workflow_dispatch:        # execução manual via GitHub UI

concurrency:
  group: fundscope-weekly-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly auditor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: PYTHONPATH=. python -m bot.auditor

      - name: Run criteria review (Romaria de fim de semana)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: PYTHONPATH=. python scripts/criteria_review.py

      - name: Run self-healing tuner
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: PYTHONPATH=. python scripts/self_heal.py

      - name: Simulate shadow exits (fill shadow_result for expired vetoed signals)
        run: PYTHONPATH=. python scripts/simulate_shadow_exits.py || echo "[WARN] simulate_shadow_exits falhou mas continua"

      - name: Commit audit report + suggested config
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/audit_weekly.json data/suggested_config.json data/beta/self_heal_state.json data/criteria_insights.json data/beta/shadow_ledger.json
          git diff --staged --quiet && echo "Sem alterações no relatório" && exit 0
          git commit -m "chore: weekly audit + self-heal $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)
