name: Update Portfolio

on:
  schedule:
    - cron: '0 19 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fundscope-portfolio
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check NYSE holiday
        id: holiday_check
        run: |
          python3 - <<'EOF'
          import datetime, os
          def _nth_weekday(year, month, weekday, n):
              d = datetime.date(year, month, 1)
              delta = (weekday - d.weekday()) % 7
              d += datetime.timedelta(days=delta)
              return d + datetime.timedelta(weeks=n - 1)
          def _last_weekday(year, month, weekday):
              if month == 12:
                  next_month = datetime.date(year + 1, 1, 1)
              else:
                  next_month = datetime.date(year, month + 1, 1)
              d = next_month - datetime.timedelta(days=1)
              delta = (d.weekday() - weekday) % 7
              return d - datetime.timedelta(days=delta)
          def get_nyse_holidays(year):
              h = set()
              ny = datetime.date(year, 1, 1)
              if ny.weekday() == 6: h.add(datetime.date(year, 1, 2))
              elif ny.weekday() != 5: h.add(ny)
              h.add(_nth_weekday(year, 1, 0, 3))
              h.add(_nth_weekday(year, 2, 0, 3))
              a = year % 19; b = year // 100; c = year % 100; d = b // 4; e = b % 4
              f = (b+8)//25; g = (b-f+1)//3; hh = (19*a+b-d-g+15)%30
              i = c//4; k = c%4; l = (32+2*e+2*i-hh-k)%7; m = (a+11*hh+22*l)//451
              mo = (hh+l-7*m+114)//31; dy = ((hh+l-7*m+114)%31)+1
              easter = datetime.date(year, mo, dy)
              h.add(easter - datetime.timedelta(days=2))
              h.add(_last_weekday(year, 5, 0))
              if year >= 2022:
                  jt = datetime.date(year, 6, 19)
                  if jt.weekday() == 6: h.add(datetime.date(year, 6, 20))
                  elif jt.weekday() == 5: h.add(datetime.date(year, 6, 18))
                  else: h.add(jt)
              ind = datetime.date(year, 7, 4)
              if ind.weekday() == 6: h.add(datetime.date(year, 7, 5))
              elif ind.weekday() == 5: h.add(datetime.date(year, 7, 3))
              else: h.add(ind)
              h.add(_nth_weekday(year, 9, 0, 1))
              h.add(_nth_weekday(year, 11, 3, 4))
              xmas = datetime.date(year, 12, 25)
              if xmas.weekday() == 6: h.add(datetime.date(year, 12, 26))
              elif xmas.weekday() == 5: h.add(datetime.date(year, 12, 24))
              else: h.add(xmas)
              return h
          today = datetime.date.today()
          if today in get_nyse_holidays(today.year):
              print("is_holiday=true")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write("is_holiday=true\n")
          else:
              print("is_holiday=false")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write("is_holiday=false\n")
          EOF

      - name: Skip se feriado NYSE
        if: steps.holiday_check.outputs.is_holiday == 'true'
        run: echo "[HOLIDAY] NYSE fechado hoje -- a saltar update_portfolio.py"

      - name: Install dependencies
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          pip install --upgrade pip
          pip install "yfinance==0.2.54" "requests>=2.31" "google-genai>=1.10.0" "python-dotenv>=1.0" "pandas>=2.0" "numpy>=1.26"

      - name: Run portfolio update
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          T212_API_ID:   ${{ secrets.T212_API_ID }}
          T212_API_KEY:  ${{ secrets.T212_API_KEY }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: |
          # Pre-flight: assinalar (sem expor) que secrets criticos estao presentes.
          # Sem isto, um secret em falta produzia "SystemExit(1)" em <2s sem pista nos logs.
          missing=""
          [ -z "$T212_API_ID" ]  && missing="$missing T212_API_ID"
          [ -z "$T212_API_KEY" ] && missing="$missing T212_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Secrets em falta:$missing — abortar antes de chamar a T212"
            exit 1
          fi
          echo "[preflight] T212_API_ID len=${#T212_API_ID} T212_API_KEY len=${#T212_API_KEY}"
          echo "[preflight] FINNHUB_TOKEN ${FINNHUB_TOKEN:+presente}${FINNHUB_TOKEN:-AUSENTE} | GEMINI_API_KEY ${GEMINI_API_KEY:+presente}${GEMINI_API_KEY:-AUSENTE}"
          python -u ingest/update_portfolio.py

      - name: Commit portfolio.json + symbol_cache.json
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Adiciona so o que existe — evita "pathspec did not match" se o script abortou cedo.
          for f in portfolio.json symbol_cache.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "Sem alteracoes — nada para commitar"
            exit 0
          fi
          git commit -m "chore: update portfolio [skip ci]"
          git push

      - name: Deploy to VPS (git pull)
        if: steps.holiday_check.outputs.is_holiday != 'true'
        continue-on-error: true
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS_SSH_KEY nao configurado -- a saltar deploy"
            exit 0
          fi
          echo "$VPS_SSH_KEY" > /tmp/vps_key.pem
          chmod 600 /tmp/vps_key.pem
          ssh -i /tmp/vps_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              ubuntu@134.98.141.58 \
              "cd ~/fundscope && git fetch origin && git reset --hard origin/main && sudo systemctl restart fundscope-web && echo 'VPS actualizada'"
          rm -f /tmp/vps_key.pem
