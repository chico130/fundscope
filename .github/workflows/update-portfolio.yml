name: Update Portfolio

on:
  schedule:
    - cron: '0 19 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

concurrency:
  group: fundscope-portfolio
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.54 requests google-genai>=1.10.0 python-dotenv

      - name: Run portfolio update
        env:
          T212_API_ID:   ${{ secrets.T212_API_ID }}
          T212_API_KEY:  ${{ secrets.T212_API_KEY }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python update_portfolio.py

      - name: Commit portfolio.json + symbol_cache.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json symbol_cache.json
          git diff --staged --quiet || git commit -m "chore: update portfolio [skip ci]"
          git push

      - name: Deploy to VPS (git pull)
        continue-on-error: true
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS_SSH_KEY não configurado — a saltar deploy"
            exit 0
          fi
          echo "$VPS_SSH_KEY" > /tmp/vps_key.pem
          chmod 600 /tmp/vps_key.pem
          ssh -i /tmp/vps_key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              ubuntu@134.98.141.58 \
              "cd ~/fundscope && git fetch origin && git reset --hard origin/main && echo 'VPS actualizada'"
          rm -f /tmp/vps_key.pem
