name: Update Portfolio

on:
  schedule:
    - cron: '0 19 * * 1-5'
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance==0.2.54 requests google-genai>=1.10.0

      - name: Run portfolio update
        env:
          T212_API_ID:   ${{ secrets.T212_API_ID }}
          T212_API_KEY:  ${{ secrets.T212_API_KEY }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_portfolio.py

      - name: Commit portfolio.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio.json
          git diff --staged --quiet || git commit -m "chore: update portfolio [skip ci]"
          git push
