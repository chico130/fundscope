name: FundScope — Relatório de Segurança Semanal

# Relatório semanal de segurança em linguagem simples, sextas-feiras.
# Corre após o último ciclo do bot de sexta (21:00 UTC).
# Verifica: chaves de acesso, erros críticos, dados actualizados.
on:
  schedule:
    - cron: '30 21 * * 5'   # Sextas-feiras 21:30 UTC
  workflow_dispatch:          # execução manual via GitHub UI

concurrency:
  group: fundscope-security-report
  cancel-in-progress: false

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enviar relatório de segurança
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          T212_API_ID:        ${{ secrets.T212_API_ID }}
          T212_API_KEY:       ${{ secrets.T212_API_KEY }}
          FINNHUB_TOKEN:      ${{ secrets.FINNHUB_TOKEN }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_TOKEN }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
        run: PYTHONPATH=. python scripts/security_report.py

      - name: Commit daily_flags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_flags.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: security report flags [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)
