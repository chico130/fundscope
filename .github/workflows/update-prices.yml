# .github/workflows/update-prices.yml
# Rebuild diário da watchlist + análise beta após fecho do mercado US.
# Substitui o workflow anterior que era redundante com update.yml e update-news.yml.

name: Daily Bot Rebuild

on:
  schedule:
    - cron: '30 21 * * 1-5'  # 21:30 UTC — após fecho US (20:00) e limpeza de dados
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install yfinance numpy pandas requests python-dotenv

      - name: Rebuild watchlist e análise beta
        env:
          T212_API_KEY_DEMO: ${{ secrets.T212_API_KEY_DEMO }}
          T212_KEY_ID:       ${{ secrets.T212_KEY_ID }}
        run: python -m bot.phase0

      - name: Commit data/beta/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/beta/
          git diff --staged --quiet || git commit -m "Auto-update beta data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
