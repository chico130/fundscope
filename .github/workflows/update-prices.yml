# .github/workflows/update-prices.yml
# Atualiza preços E notícias automaticamente.

name: Atualizar Preços e Notícias

on:
  schedule:
    # Preços: todos os dias de semana às 22:00 UTC (após fecho do mercado US)
    - cron: '0 22 * * 1-5'
    # Notícias: segunda, quarta e sexta às 08:00 UTC (manhã em Lisboa)
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:  # Permite correr manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install yfinance

      - name: Atualizar preços (só em dias de semana às 22h)
        if: github.event.schedule != '0 8 * * 1,3,5'
        run: python update_prices.py

      - name: Atualizar notícias
        run: python update_news.py

      - name: Fazer commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
