name: FundScope — Clyde · Fase 0

# Cobre o horário de mercado dos EUA (13:00–21:00 UTC = 9:00–17:00 ET)
# + pré-mercado (13:00) e pós-mercado (20:30–21:00)
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'   # cada 15 min: 13:00 → 20:45 UTC  (seg-sex)
    - cron: '0 21 * * 1-5'          # último ciclo: 21:00 UTC          (seg-sex)
  workflow_dispatch:                 # execução manual via GitHub UI

concurrency:
  group: fundscope-bot
  cancel-in-progress: false          # nunca cancelar uma análise já em curso

jobs:
  cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Clyde — ciclo único
        env:
          T212_API_ID:        ${{ secrets.T212_API_ID }}
          T212_API_KEY:       ${{ secrets.T212_API_KEY }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.phase0 --once

      - name: Commit análise e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/beta/ logs/ diario_trades.json
          git diff --staged --quiet && exit 0
          git commit -m "bot: cycle $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)
