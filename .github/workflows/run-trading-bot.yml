name: FundScope — Clyde · Fase 0

# Cobre o horário de mercado dos EUA (13:00–21:00 UTC = 9:00–17:00 ET)
# + pré-mercado (13:00) e pós-mercado (20:30–21:00)
on:
  schedule:
    - cron: '*/15 13-20 * * 1-5'   # cada 15 min: 13:00 → 20:45 UTC  (seg-sex)
    - cron: '0 21 * * 1-5'          # último ciclo: 21:00 UTC          (seg-sex)
  workflow_dispatch:                 # execução manual via GitHub UI

concurrency:
  group: fundscope-bot
  cancel-in-progress: false          # nunca cancelar uma análise já em curso

jobs:
  cycle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Check NYSE holiday
        id: holiday_check
        run: |
          python3 - <<'EOF'
          import datetime, os
          def _nth_weekday(year, month, weekday, n):
              d = datetime.date(year, month, 1)
              delta = (weekday - d.weekday()) % 7
              d += datetime.timedelta(days=delta)
              return d + datetime.timedelta(weeks=n - 1)
          def _last_weekday(year, month, weekday):
              if month == 12:
                  next_month = datetime.date(year + 1, 1, 1)
              else:
                  next_month = datetime.date(year, month + 1, 1)
              d = next_month - datetime.timedelta(days=1)
              delta = (d.weekday() - weekday) % 7
              return d - datetime.timedelta(days=delta)
          def get_nyse_holidays(year):
              h = set()
              ny = datetime.date(year, 1, 1)
              if ny.weekday() == 6: h.add(datetime.date(year, 1, 2))
              elif ny.weekday() != 5: h.add(ny)
              h.add(_nth_weekday(year, 1, 0, 3))
              h.add(_nth_weekday(year, 2, 0, 3))
              a = year % 19; b = year // 100; c = year % 100; d = b // 4; e = b % 4
              f = (b+8)//25; g = (b-f+1)//3; hh = (19*a+b-d-g+15)%30
              i = c//4; k = c%4; l = (32+2*e+2*i-hh-k)%7; m = (a+11*hh+22*l)//451
              mo = (hh+l-7*m+114)//31; dy = ((hh+l-7*m+114)%31)+1
              easter = datetime.date(year, mo, dy)
              h.add(easter - datetime.timedelta(days=2))
              h.add(_last_weekday(year, 5, 0))
              if year >= 2022:
                  jt = datetime.date(year, 6, 19)
                  if jt.weekday() == 6: h.add(datetime.date(year, 6, 20))
                  elif jt.weekday() == 5: h.add(datetime.date(year, 6, 18))
                  else: h.add(jt)
              ind = datetime.date(year, 7, 4)
              if ind.weekday() == 6: h.add(datetime.date(year, 7, 5))
              elif ind.weekday() == 5: h.add(datetime.date(year, 7, 3))
              else: h.add(ind)
              h.add(_nth_weekday(year, 9, 0, 1))
              h.add(_nth_weekday(year, 11, 3, 4))
              xmas = datetime.date(year, 12, 25)
              if xmas.weekday() == 6: h.add(datetime.date(year, 12, 26))
              elif xmas.weekday() == 5: h.add(datetime.date(year, 12, 24))
              else: h.add(xmas)
              return h
          today = datetime.date.today()
          if today in get_nyse_holidays(today.year):
              print("is_holiday=true")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write("is_holiday=true\n")
          else:
              print("is_holiday=false")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f: f.write("is_holiday=false\n")
          EOF

      - name: Skip se feriado NYSE
        if: steps.holiday_check.outputs.is_holiday == 'true'
        run: |
          echo "[HOLIDAY GUARD] NYSE fechado hoje (feriado) -- bot nao corre. Sem mensagens Telegram."

      - name: Install dependencies
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: pip install -r requirements.txt

      - name: Run Clyde — ciclo único
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          T212_API_ID:        ${{ secrets.T212_API_ID }}
          T212_API_KEY:       ${{ secrets.T212_API_KEY }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.phase0 --once

      - name: Run reporter — actualizar stats beta
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          T212_API_ID:        ${{ secrets.T212_API_ID }}
          T212_API_KEY:       ${{ secrets.T212_API_KEY }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -c "from bot.reporter import run_all; run_all()" || echo "[WARN] reporter falhou mas continua"

      - name: Commit análise e push
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/beta/ logs/ diario_trades.json docs/project-health.md data/daily_flags.json data/macro_cache.json
          git diff --staged --quiet && exit 0
          git commit -m "bot: cycle $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)

      # ── Portfolio sync — corre SEMPRE no fim de cada ciclo ──────────────────
      # Garante que trades fechadas, P/L e posições ficam visíveis no site
      # mesmo quando não há trade nova neste ciclo.
      - name: Install portfolio dependencies
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          pip install yfinance==0.2.54 google-genai>=1.10.0 python-dotenv 2>/dev/null || true

      - name: Update portfolio
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          T212_API_ID:         ${{ secrets.T212_API_ID }}
          T212_API_KEY:        ${{ secrets.T212_API_KEY }}
          FINNHUB_TOKEN:       ${{ secrets.FINNHUB_TOKEN }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python ingest/update_portfolio.py || echo "[WARN] ingest/update_portfolio.py falhou mas continua"

      - name: Commit portfolio
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          git add portfolio.json symbol_cache.json data/beta/ || true
          git diff --staged --quiet && echo "Sem alteracoes no portfolio" && exit 0
          git commit -m "chore: portfolio sync $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)

      - name: Generate project health report
        if: steps.holiday_check.outputs.is_holiday != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
        run: |
          pytest tests/test_simulation.py --cov=bot --cov-report=json:data/beta/coverage.json -q 2>/dev/null || true
          python scripts/generate_health_report.py || echo "[WARN] generate_health_report.py falhou mas continua"

      - name: Update CLAUDE.md
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: python scripts/update_claude_md.py || echo "[WARN] update_claude_md.py falhou mas continua"

      - name: Commit CLAUDE.md actualizado
        if: steps.holiday_check.outputs.is_holiday != 'true'
        run: |
          git add CLAUDE.md || true
          git diff --staged --quiet && echo "Sem alteracoes no CLAUDE.md" && exit 0
          git commit -m "chore: auto-update CLAUDE.md [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)

      - name: Notificar falha via Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json as _j
          token   = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          run_url = os.environ.get("GH_RUN_URL", "")
          if not token or not chat_id:
              print("Credenciais Telegram não configuradas — sem notificação.")
          else:
              msg = (
                  "🔴 ERRO — Workflow GitHub Actions Falhou\n\n"
                  "run-trading-bot.yml terminou com erro.\n"
                  f"Detalhes: {run_url}"
              )
              payload = _j.dumps({"chat_id": chat_id, "text": msg}).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=payload,
                  headers={"Content-Type": "application/json"},
              )
              try:
                  urllib.request.urlopen(req, timeout=8)
                  print("Alerta Telegram enviado.")
              except Exception as e:
                  print(f"Falha ao enviar alerta: {e}")
          EOF
