name: Update News

on:
  schedule:
    - cron: '0 7,11,15,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fundscope-news
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr update_news.py
        env:
          FINNHUB_TOKEN:      ${{ secrets.FINNHUB_TOKEN }}
          MARKETAUX_TOKEN:    ${{ secrets.MARKETAUX_TOKEN }}
          ALPHAVANTAGE_TOKEN: ${{ secrets.ALPHAVANTAGE_TOKEN }}
          NEWSAPI_TOKEN:      ${{ secrets.NEWSAPI_TOKEN }}
        run: |
          set +e
          timeout 900 python update_news.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "[WARN] update_news.py terminou com exit $EXIT_CODE (pode ser timeout de API) -- continua"
          fi
          set -e

      - name: Mostrar news.json
        run: head -c 400 news.json 2>/dev/null || echo "news.json nao encontrado"

      - name: Commit e push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f news.json
          git diff --cached --quiet && echo "Sem alteracoes" || (git commit -m "chore: update news.json [skip ci]" && git push)
