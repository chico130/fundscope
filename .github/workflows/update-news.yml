name: Update News

on:
  schedule:
    - cron: '0 8,12,16 * * 1-5'   # 09:00 / 13:00 / 17:00 WEST (dias uteis)
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr update_news.py
        env:
          GNEWS_TOKEN:   ${{ secrets.GNEWS_TOKEN }}
          NEWSAPI_TOKEN: ${{ secrets.NEWSAPI_TOKEN }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python update_news.py

      - name: Commit news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "chore: update news.json [skip ci]"
          git push
