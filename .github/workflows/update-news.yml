name: Update News

on:
  schedule:
    - cron: '0 8,12,16 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Correr update_news.py
        env:
          GNEWS_TOKEN:   ${{ secrets.GNEWS_TOKEN }}
          NEWSAPI_TOKEN: ${{ secrets.NEWSAPI_TOKEN }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
        run: python update_news.py

      - name: Mostrar news.json
        run: head -c 400 news.json 2>/dev/null || echo "news.json nao encontrado"

      - name: Commit e push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet && echo "Sem alteracoes" || git commit -m "chore: update news.json [skip ci]" && git push
