name: Atualizar preços

on:
  schedule:
    - cron: '0 12 * * 1-5'       # 12:00 UTC pré-abertura US
    - cron: '0,30 13-20 * * 1-5' # cada 30min durante sessão US
    - cron: '0 21 * * 1-5'       # 21:00 UTC pós-fecho US
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install yfinance

      - name: Buscar preços e gerar data.json
        run: python update_prices.py

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Auto-update preços $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
