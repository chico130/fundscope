name: Update AI Insights

on:
  schedule:
    - cron: '0 6 * * *'   # diário às 06:00 UTC
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Tickers específicos (espaço-separados). Vazio = usa watchlist completa.'
        required: false
        default: ''
      force:
        description: 'Forçar regeneração mesmo que entrada seja fresca (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: fundscope-ai-insights
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-ai-insights:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install google-genai python-dotenv

      - name: Correr update_ai_insights.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            EXTRA_ARGS="--tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --force"
          fi
          timeout 1200 python scripts/update_ai_insights.py $EXTRA_ARGS
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "[WARN] script saiu com $EXIT_CODE — prossegue para commit do que existe"
          fi
          set -e

      - name: Mostrar primeiras linhas do output
        run: head -c 500 data/beta/ai_insights.json 2>/dev/null || echo "ai_insights.json não encontrado"

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/beta/ai_insights.json
          git diff --cached --quiet && echo "Sem alterações" \
            || (git commit -m "chore: refresh AI insights [skip ci]" && git push)
