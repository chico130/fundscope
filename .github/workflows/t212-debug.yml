name: T212 Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run T212 debug
        env:
          T212_API_KEY: ${{ secrets.T212_API_KEY }}
        run: python t212_debug.py
