name: FundScope — Relatório Diário Francisco

# Resumo diário em linguagem simples, enviado via Telegram após fecho NYSE.
# Corre 15 min depois do último ciclo do bot (21:00 UTC) para garantir que
# os dados do ciclo final já estão commitados.
on:
  schedule:
    - cron: '15 21 * * 1-5'   # 21:15 UTC, segunda a sexta
  workflow_dispatch:            # execução manual via GitHub UI

concurrency:
  group: fundscope-daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Enviar relatório diário
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_TOKEN }}
        run: PYTHONPATH=. python scripts/daily_report_francisco.py

      - name: Commit daily_flags
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_flags.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: daily report flags [skip ci]"
          git pull --rebase --autostash -X theirs origin main
          git push || (git pull --rebase --autostash -X theirs origin main && git push)
