  <!-- Snout -->
  <ellipse cx="16" cy="21" rx="3.2" ry="2.2" fill="#e0d8d0"/>
  <!-- Nostrils -->
  <circle cx="14.8" cy="21.1" r="0.7" fill="#01696f" opacity="0.5"/>
