  <!-- Eyes -->
  <circle cx="12.8" cy="15.8" r="1.1" fill="#28251d"/>
  <circle cx="13.1" cy="15.5" r="0.4" fill="#fff"/>
  <circle cx="19.2" cy="15.8" r="1.1" fill="#28251d"/>
  <circle cx="19.5" cy="15.5" r="0.4" fill="#fff"/>
  <!-- Ears -->
