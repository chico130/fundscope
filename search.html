<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesquisa — FundScope</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="/fundscope/manifest.json">
  <meta name="theme-color" content="#01696f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FundScope">
  <link rel="apple-touch-icon" href="/fundscope/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --color-tooltip-bg:#1c1b19;--color-tooltip-text:#e8e7e5;--color-tooltip-border:#2e2d2b;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;--space-24:6rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --color-tooltip-bg:#f0ede8;--color-tooltip-text:#28251d;--color-tooltip-border:#d4d1ca;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);display:flex;flex-direction:column;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    .header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 85%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(40,37,29,.06);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em;color:var(--color-text);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:28px;height:28px;}
    .header-actions{display:flex;align-items:center;gap:var(--space-3);}
    .nav-link{font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);display:inline-flex;align-items:center;gap:6px;}
    .nav-link:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .nav-link.active{color:var(--color-primary);}
    .theme-toggle{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .theme-toggle:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-24) var(--space-6) var(--space-16);text-align:center;}
    .mascot-wrap{margin-bottom:var(--space-8);display:flex;align-items:center;justify-content:center;}
    .mascot-gif{width:180px;height:180px;object-fit:contain;filter:drop-shadow(0 14px 28px rgba(230,100,100,.22));animation:pigFloat 3.2s ease-in-out infinite;}
    @keyframes pigFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
    .hero-eyebrow{font-size:var(--text-sm);color:var(--color-primary);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:var(--space-3);}
    .hero-title{font-family:var(--font-display);font-size:var(--text-2xl);font-weight:400;line-height:1.1;letter-spacing:-.02em;color:var(--color-text);margin-bottom:var(--space-4);max-width:14ch;}
    .hero-title em{font-style:italic;color:var(--color-primary);}
    .hero-sub{font-size:var(--text-base);color:var(--color-text-muted);max-width:44ch;line-height:1.65;margin-bottom:var(--space-10);}
    .search-container{width:100%;max-width:560px;position:relative;margin-bottom:var(--space-5);}
    .search-box{width:100%;background:var(--color-surface);border:1.5px solid var(--color-border);border-radius:var(--radius-full);padding:var(--space-4) var(--space-6) var(--space-4) var(--space-5);font-size:var(--text-base);color:var(--color-text);outline:none;box-shadow:var(--shadow-sm);transition:border-color var(--transition),box-shadow var(--transition);padding-right:calc(var(--space-12) + var(--space-2));}
    .search-box::placeholder{color:var(--color-text-faint);}
    .search-box:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 15%,transparent),var(--shadow-md);}
    .search-btn{position:absolute;right:var(--space-2);top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:var(--radius-full);background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;transition:background var(--transition),transform var(--transition),box-shadow var(--transition);box-shadow:var(--shadow-sm);}
    .search-btn:hover{background:var(--color-primary-hover);transform:translateY(-50%) scale(1.05);box-shadow:var(--shadow-md);}
    .quick-chips{display:flex;flex-wrap:wrap;gap:var(--space-2);justify-content:center;margin-bottom:var(--space-12);}
    .chip{font-size:var(--text-xs);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);cursor:pointer;transition:all var(--transition);font-weight:500;}
    .chip:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-highlight);}
    .results-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:color-mix(in oklch,var(--color-bg) 92%,transparent);backdrop-filter:blur(20px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding-top:clamp(80px,14vh,120px);padding-inline:var(--space-4);opacity:0;pointer-events:none;transition:opacity 240ms ease;}
    .results-panel.open{opacity:1;pointer-events:all;}
    .results-box{width:100%;max-width:560px;background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-lg);overflow:hidden;transform:translateY(12px);transition:transform 240ms cubic-bezier(.16,1,.3,1);}
    .results-panel.open .results-box{transform:translateY(0);}
    .results-search-row{display:flex;align-items:center;padding:var(--space-3) var(--space-4);border-bottom:1px solid var(--color-divider);gap:var(--space-3);}
    .results-search-input{flex:1;background:none;border:none;outline:none;font:inherit;font-size:var(--text-base);color:var(--color-text);}
    .results-search-input::placeholder{color:var(--color-text-faint);}
    .results-close{color:var(--color-text-muted);padding:var(--space-1);border-radius:var(--radius-sm);transition:color var(--transition),background var(--transition);}
    .results-close:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .results-list{max-height:420px;overflow-y:auto;}
    .results-empty{padding:var(--space-12);text-align:center;color:var(--color-text-muted);font-size:var(--text-sm);}
    .result-item{display:flex;align-items:center;padding:var(--space-3) var(--space-5);gap:var(--space-4);cursor:pointer;transition:background var(--transition);text-decoration:none;color:inherit;}
    .result-item:hover{background:var(--color-surface-offset);}
    .result-badge{min-width:52px;text-align:center;font-size:var(--text-xs);font-weight:700;letter-spacing:.04em;padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);background:var(--color-primary-highlight);color:var(--color-primary);flex-shrink:0;}
    .result-info{flex:1;min-width:0;}
    .result-name{font-size:var(--text-sm);font-weight:500;color:var(--color-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .result-type{font-size:var(--text-xs);color:var(--color-text-muted);}
    .result-price{font-size:var(--text-sm);font-variant-numeric:tabular-nums;color:var(--color-text);font-weight:500;text-align:right;white-space:nowrap;}
    .result-chg{font-size:var(--text-xs);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
    .result-chg.up{color:var(--color-success);}
    .result-chg.down{color:var(--color-notification);}
    .btn-watchlist-add{width:32px;height:32px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-faint);border:1px solid var(--color-border);background:var(--color-surface);transition:all var(--transition);flex-shrink:0;}
    .btn-watchlist-add:hover{color:var(--color-primary);border-color:var(--color-primary);background:var(--color-primary-highlight);}
    .btn-watchlist-add.added{color:var(--color-primary);border-color:var(--color-primary);background:var(--color-primary-highlight);}
    .loading-dots{display:flex;gap:6px;justify-content:center;padding:var(--space-8);}
    .loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--color-primary);animation:dot-bounce 1.2s ease-in-out infinite;}
    .loading-dots span:nth-child(2){animation-delay:.15s;}
    .loading-dots span:nth-child(3){animation-delay:.3s;}
    @keyframes dot-bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
    @media(max-width:640px){
      .header{padding:var(--space-3) var(--space-4);}
      .nav-link .nav-label{display:none;}
      .nav-link{padding:0;width:36px;height:36px;justify-content:center;}
      .mascot-gif{width:130px;height:130px;}
      .hero-title{font-size:clamp(1.8rem,9vw,3.5rem);}
      .hero-sub{margin-bottom:var(--space-8);}
      .quick-chips{margin-bottom:var(--space-8);}
    }
  </style>
</head>

<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const icons={
    light:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
    dark:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  };
  const setTheme=th=>{d=th;r.setAttribute('data-theme',th);if(t)t.innerHTML=icons[th];};
  setTheme(d);
  if(t)t.addEventListener('click',()=>setTheme(d==='dark'?'light':'dark'));
})();

const WORKER='https://stocks.araujo-francisco-fernandes.workers.dev';
const YF_PROXY='https://query2.finance.yahoo.com/v1/finance/search';
const CORS_P='https://corsproxy.io/?';

function normalizeWatchlist(items){const arr=Array.isArray(items)?items:[];const seen=new Set();const out=[];for(const item of arr){const t=String(item||'').trim().toUpperCase();if(!t||seen.has(t))continue;seen.add(t);out.push(t);}return out;}
function getWatchlist(){try{const normalized=normalizeWatchlist(JSON.parse(localStorage.getItem('fs_watchlist')||'[]'));localStorage.setItem('fs_watchlist',JSON.stringify(normalized));return normalized;}catch{return[];}}
function saveWatchlist(arr){localStorage.setItem('fs_watchlist',JSON.stringify(normalizeWatchlist(arr)));}
function isInWatchlist(ticker){const t=String(ticker||'').toUpperCase();return getWatchlist().includes(t);}
function toggleWatchlist(ticker){const t=String(ticker||'').toUpperCase();let arr=getWatchlist();if(arr.includes(t)){arr=arr.filter(x=>x!==t);}else{arr.push(t);}saveWatchlist(arr);return arr.includes(t);}

let LOCAL={};
async function loadLocal(){try{const r=await fetch('data.json?t='+Date.now());if(!r.ok)throw 0;const j=await r.json();LOCAL=j.stocks||{};}catch{}}

async function yfSearch(term){const url=`${CORS_P}${encodeURIComponent(YF_PROXY+'?q='+encodeURIComponent(term)+'&lang=en&region=US&quotesCount=8&newsCount=0&enableFuzzyQuery=true')}`;const r=await fetch(url,{headers:{'Accept':'application/json'}});if(!r.ok)throw new Error('search '+r.status);return r.json();}

async function workerQuote(symbol){try{const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),8000);const r=await fetch(`${WORKER}?ticker=${encodeURIComponent(symbol)}&range=1d&interval=5m`,{signal:ctrl.signal});clearTimeout(tid);if(!r.ok)return null;const j=await r.json();const meta=j?.chart?.result?.[0]?.meta;if(!meta||!meta.regularMarketPrice)return null;const price=meta.regularMarketPrice;const prev=meta.chartPreviousClose||meta.previousClose||price;return{price,chgPct:prev?((price-prev)/prev)*100:0,currency:meta.currency||'USD'};}catch{return null;}}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function currencySymbol(cur){const m={USD:'$',EUR:'€',GBP:'£',CHF:'CHF ',SEK:'SEK ',JPY:'¥',CAD:'CA$',AUD:'A$'};return m[cur]||'$';}
function quoteTypeLabel(qt){const m={EQUITY:'Ação',ETF:'ETF',MUTUALFUND:'Fundo',INDEX:'Índice'};return m[qt]||'Ação';}

const panel=document.getElementById('resultsPanel');
const list=document.getElementById('resultsList');
const mainIn=document.getElementById('mainSearch');
const resIn=document.getElementById('resultsInput');
const closeBtn=document.getElementById('resultsClose');
let timer=null;

function openPanel(q){panel.classList.add('open');resIn.value=q||'';resIn.focus();if(q)doSearch(q);else list.innerHTML='<div class="results-empty">Escreve para pesquisar qualquer a&#231;&#227;o ou ETF&#8230;</div>';}
function closePanel(){panel.classList.remove('open');mainIn.focus();}

function watchlistBtnHTML(ticker){const added=isInWatchlist(ticker);return `<button class="btn-watchlist-add${added?' added':''}" data-wl="${esc(ticker)}" title="${added?'Remover da Watchlist':'Adicionar à Watchlist'}" onclick="event.preventDefault();event.stopPropagation();handleWlToggle(this,'${esc(ticker)}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${added?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>`;}

window.handleWlToggle=function(btn,ticker){const added=toggleWatchlist(ticker);btn.className='btn-watchlist-add'+(added?' added':'');btn.title=added?'Remover da Watchlist':'Adicionar à Watchlist';btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="${added?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;};

function resultHTML(ticker,name,typeLabel,exch,price,chgPct,sym){const up=chgPct>=0,sign=up?'+':'-';return `<a class="result-item" href="stock.html?ticker=${encodeURIComponent(ticker)}"><span class="result-badge">${esc(ticker.slice(0,7))}</span><div class="result-info"><p class="result-name">${esc(name)}</p><p class="result-type">${esc(typeLabel)}${exch?' &middot; '+esc(exch):''}</p></div><div style="text-align:right;flex-shrink:0;"><p class="result-price">${esc(sym)}${price.toFixed(2)}</p><p class="result-chg ${up?'up':'down'}">${up?'&#9650;':'&#9660;'} ${sign}${Math.abs(chgPct).toFixed(2)}%</p></div>${watchlistBtnHTML(ticker)}</a>`;}

async function doSearch(q){const term=q.trim();if(!term){list.innerHTML='<div class="results-empty">Escreve para pesquisar&#8230;</div>';return;}list.innerHTML='<div class="loading-dots"><span></span><span></span><span></span></div>';const termUpper=term.toUpperCase();const localHits=Object.values(LOCAL).filter(s=>(s.ticker||'').toUpperCase().includes(termUpper)||(s.name||'').toUpperCase().includes(termUpper));if(localHits.length){list.innerHTML=localHits.map(s=>resultHTML(s.ticker,s.name||s.ticker,s.type||'Ação',s.exchange||'',s.price||0,s.changePct||0,s.symbol||'$')).join('');}try{const data=await yfSearch(term);const quotes=(data.quotes||[]).filter(q=>['EQUITY','ETF','MUTUALFUND','INDEX'].includes(q.quoteType)).slice(0,7);if(!quotes.length){if(!localHits.length)list.innerHTML='<div class="results-empty">Sem resultados para "<strong>'+esc(q)+'</strong>"</div>';return;}const results=await Promise.all(quotes.map(async h=>{const sym=h.symbol;const lk=sym.replace(/\.(AS|L|PA|DE|MI|BR|HK|T|BO|NS|F|ST|CO|OL|HE|VI|PR|IS)$/i,'');if(LOCAL[lk]){const s=LOCAL[lk];return{ticker:lk,name:h.longname||h.shortname||s.name,typeLabel:quoteTypeLabel(h.quoteType),exch:h.exchDisp||s.exchange||'',price:s.price,chgPct:s.changePct,sym:s.symbol||'$'};}const q2=await workerQuote(sym);if(!q2)return null;return{ticker:sym,name:h.longname||h.shortname||sym,typeLabel:quoteTypeLabel(h.quoteType),exch:h.exchDisp||'',price:q2.price,chgPct:q2.chgPct,sym:currencySymbol(q2.currency)};}));const seen=new Set();const deduped=results.filter(r=>{if(!r||seen.has(r.ticker))return false;seen.add(r.ticker);return true;});if(!deduped.length){if(!localHits.length)list.innerHTML='<div class="results-empty">Sem preços disponíveis. Tenta um ticker exato (ex: AAPL).</div>';return;}list.innerHTML=deduped.map(r=>resultHTML(r.ticker,r.name,r.typeLabel,r.exch,r.price,r.chgPct,r.sym)).join('');}catch(err){const t=term.toUpperCase();if(!t.includes(' ')&&!localHits.length){list.innerHTML=`<a class="result-item" href="stock.html?ticker=${encodeURIComponent(t)}"><span class="result-badge">${esc(t)}</span><div class="result-info"><p class="result-name">Ver página de ${esc(t)}</p><p class="result-type">Clicar para abrir</p></div></a>`;}else if(!localHits.length){list.innerHTML='<div class="results-empty">Erro de ligação. Tenta novamente.</div>';}}}

document.getElementById('searchBtn').addEventListener('click',()=>openPanel(mainIn.value));
mainIn.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=mainIn.value.trim();if(v)location.href='stock.html?ticker='+encodeURIComponent(v.toUpperCase());}});
mainIn.addEventListener('input',()=>{if(mainIn.value.trim())openPanel(mainIn.value);});
resIn.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(()=>doSearch(resIn.value),400);});
closeBtn.addEventListener('click',closePanel);
panel.addEventListener('click',e=>{if(e.target===panel)closePanel();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&panel.classList.contains('open'))closePanel();});
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>openPanel(c.dataset.query)));
loadLocal();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/fundscope/sw.js');
      });
    }
  </script>
</body>
</html>
