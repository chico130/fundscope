<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FundScope</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);}
    .back-btn:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .page{max-width:1100px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16);}
    .stock-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-6);margin-bottom:var(--space-8);}
    .stock-identity{display:flex;align-items:center;gap:var(--space-4);}
    .stock-logo-wrap{width:56px;height:56px;border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--color-primary);flex-shrink:0;}
    .stock-ticker{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em;}
    .stock-name{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px;}
    .stock-exchange{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .stock-price-block{text-align:right;}
    .stock-price{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
    .stock-change{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);margin-top:var(--space-2);font-variant-numeric:tabular-nums;}
    .stock-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .stock-change.down{background:var(--color-notification-bg);color:var(--color-notification);}
    .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-success);margin-top:var(--space-2);font-weight:500;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--color-success);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .finnhub-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-primary);margin-top:var(--space-1);font-weight:500;}
    .closed-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-1);font-weight:500;background:var(--color-surface-offset);padding:2px 8px;border-radius:var(--radius-full);}
    .period-tabs{display:flex;gap:var(--space-1);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-5);width:fit-content;}
    .period-tab{padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);transition:all var(--transition);}
    .period-tab.active{background:var(--color-bg);color:var(--color-text);box-shadow:var(--shadow-sm);}
    .period-tab:hover:not(.active){color:var(--color-text);}
    .chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-6);box-shadow:var(--shadow-sm);}
    .chart-wrap{position:relative;height:280px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);margin-bottom:var(--space-6);}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .card-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}
    .kpi-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
    .kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-primary),var(--color-success));}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .error-state{text-align:center;padding:var(--space-16);color:var(--color-text-muted);}
    .error-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);}
    .admin-bar{background:color-mix(in oklch,var(--color-primary) 10%,var(--color-surface));border-bottom:1px solid var(--color-primary-highlight);padding:var(--space-2) var(--space-6);font-size:11px;color:var(--color-text-muted);display:flex;align-items:center;gap:var(--space-3);}
    .admin-bar span{color:var(--color-primary);font-weight:600;}
    .footer{padding:var(--space-6);text-align:center;font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);margin-top:var(--space-8);}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.stock-hero{flex-direction:column;gap:var(--space-4);}.stock-price-block{text-align:left;}.page{padding:var(--space-6) var(--space-4) var(--space-12);}}
    @media(max-width:480px){.grid-3{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="admin-bar">
    🛠️ Deploy admin: <span>07 Mai 2026, 01:25 WEST</span> &nbsp;·&nbsp; v1.4 — Fallback fecho de mercado (q.pc) corrigido
  </div>

  <header class="header">
    <a href="index.html" class="logo">
      <svg class="logo-svg" viewBox="0 0 28 28" fill="none">
        <ellipse cx="14" cy="15" rx="9" ry="7.5" fill="var(--color-primary)" opacity="0.18"/>
        <ellipse cx="14" cy="14.5" rx="8" ry="6.5" fill="var(--color-primary)"/>
        <ellipse cx="14" cy="18.5" rx="3.5" ry="2.5" fill="var(--color-primary-hover)"/>
        <circle cx="12.8" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="15.2" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="10.8" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="11.1" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <circle cx="17.2" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="17.5" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <ellipse cx="7" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <ellipse cx="21" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <rect x="12" y="8.5" width="4" height="1.2" rx="0.6" fill="var(--color-bg)" opacity="0.6"/>
        <path d="M22.5 17 Q25 16 24.5 19 Q24 21 22 20" stroke="var(--color-primary-hover)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
      FundScope
    </a>
    <button class="btn-icon" data-theme-toggle aria-label="Alternar tema">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <div class="page">
    <a href="index.html" class="back-btn" style="display:inline-flex;margin-bottom:var(--space-6)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
    <div id="stockContent">
      <div style="display:flex;flex-direction:column;gap:var(--space-4)">
        <div class="skeleton" style="height:64px;width:320px"></div>
        <div class="skeleton" style="height:40px;width:180px"></div>
        <div class="skeleton" style="height:300px;border-radius:var(--radius-2xl)"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5)">
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl)"></div>
          <div class="skeleton" style="height:200px;border-radius:var(--radius-xl)"></div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 FundScope · <a href="https://github.com/chico130/fundscope">GitHub</a> · Preços via Yahoo Finance &amp; Finnhub</p>
  </footer>

  <script>
    (function(){
      const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
      let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
      r.setAttribute('data-theme',d);
      const icons={
        light:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
        dark:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      };
      const setTheme=th=>{d=th;r.setAttribute('data-theme',th);if(t)t.innerHTML=icons[th];};
      setTheme(d);
      if(t)t.addEventListener('click',()=>setTheme(d==='dark'?'light':'dark'));
    })();

    const FH = 'd7ttd51r01qvtspvodegd7ttd51r01qvtspvodf0';

    function generatePriceData(base,pts,vol){
      const data=[];let p=base*(1-vol*0.5);
      for(let i=0;i<pts;i++){p+=(Math.random()-.48)*base*vol;p=Math.max(p,base*.7);data.push(parseFloat(p.toFixed(2)));}
      data[data.length-1]=base;return data;
    }
    function generateLabels(period){
      const now=new Date(),labels=[];
      if(period==='1D'){for(let h=9;h<=16;h++)for(let m=0;m<60;m+=15){if(h===16&&m>0)break;labels.push(`${h}:${m.toString().padStart(2,'0')}`);}}
      else if(period==='1S'){for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('pt',{weekday:'short'}));}}
      else if(period==='1M'){for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('pt',{day:'numeric',month:'short'}));}}
      else{for(let i=11;i>=0;i--){const d=new Date(now);d.setMonth(d.getMonth()-i);labels.push(d.toLocaleDateString('pt',{month:'short',year:'2-digit'}));}}
      return labels;
    }
    let chartInstance=null;
    function renderChart(price,period,isUp){
      const canvas=document.getElementById('priceChart');if(!canvas)return;
      const pts={'1D':29,'1S':7,'1M':30,'1A':12}[period]||30;
      const vol={'1D':.003,'1S':.012,'1M':.025,'1A':.08}[period]||.02;
      const data=generatePriceData(price,pts,vol);
      const labels=generateLabels(period);
      const color=isUp?'#437a22':'#a13544';
      if(chartInstance)chartInstance.destroy();
      chartInstance=new Chart(canvas,{
        type:'line',
        data:{labels:labels.slice(0,data.length),datasets:[{data,borderColor:color,borderWidth:2,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:color,fill:true,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,isUp?'rgba(67,122,34,.18)':'rgba(161,53,68,.18)');g.addColorStop(1,'rgba(0,0,0,0)');return g;},tension:.4}]},
        options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--color-surface-2)',titleColor:'var(--color-text-muted)',bodyColor:'var(--color-text)',borderColor:'var(--color-border)',borderWidth:1,padding:10,callbacks:{label:ctx=>` $${ctx.raw.toFixed(2)}`}}},scales:{x:{grid:{display:false},ticks:{color:'#bab9b4',font:{size:11},maxTicksLimit:6}},y:{position:'right',grid:{color:'rgba(180,178,172,.12)'},ticks:{color:'#bab9b4',font:{size:11},callback:v=>'$'+v.toFixed(0)}}}}
      });
    }

    async function loadAndRender(ticker) {
      const T = ticker.toUpperCase();

      // 1. Tentar data.json local
      try {
        const res = await fetch('data.json?t=' + Date.now());
        if (res.ok) {
          const json = await res.json();
          const localStock = (json.stocks || {})[T] || null;
          if (localStock) {
            renderStock(localStock, json.updated, 'local', false);
            return;
          }
        }
      } catch(e) {}

      // 2. Finnhub /quote
      try {
        const q = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(T)}&token=${FH}`).then(r=>r.json());

        // Se q.c === 0, mercado fechado — usar q.pc (fecho anterior) como preço
        const marketClosed = !q.c || q.c === 0;
        const price = marketClosed ? q.pc : q.c;

        // Se nem q.pc existe, o ticker não é reconhecido
        if (!price || price === 0) {
          throw new Error(`"${T}" não encontrado na Finnhub. Verifica se o símbolo está correto.`);
        }

        const chgPct = q.pc && q.c ? ((q.c - q.pc) / q.pc) * 100 : 0;
        const change = q.c && q.pc ? q.c - q.pc : 0;

        // Nome via /search
        let name = T;
        try {
          const sr = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(T)}&token=${FH}`).then(r=>r.json());
          const match = (sr.result||[]).find(r => r.symbol.toUpperCase() === T);
          if (match && match.description) name = match.description;
        } catch(e) {}

        renderStock({
          ticker: T, name,
          price, changePct: chgPct, change,
          open: q.o||0, high: q.h||price, low: q.l||price, prevClose: q.pc||price,
          week52High: (q.h||price) * 1.18,
          week52Low: (q.l||price) * 0.82,
          symbol: '$', exchange: '', type: '', sector: ''
        }, new Date().toISOString(), 'finnhub', marketClosed);

      } catch(err) {
        renderError(T, err.message || 'Não foi possível obter dados. Tenta novamente.');
      }
    }

    function renderStock(s, updated, source, marketClosed) {
      document.title = 'FundScope — ' + s.ticker;
      const isUp = s.changePct >= 0;
      const sym = s.symbol || '$';
      const sign = isUp ? '+' : '';
      const arrow = isUp ? '▲' : '▼';
      const w52H = s.week52High || s.price * 1.1;
      const w52L = s.week52Low || s.price * 0.9;
      const rangePos = Math.min(100, Math.max(0, Math.round(((s.price - w52L) / (w52H - w52L)) * 100)));
      const initials = s.ticker.slice(0,2);
      const updLabel = updated ? new Date(updated).toLocaleString('pt',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : 'agora';

      let sourceNote;
      if (source === 'local') {
        sourceNote = `<div class="live-badge"><span class="live-dot"></span>Atualizado ${updLabel}</div>`;
      } else if (marketClosed) {
        sourceNote = `<div class="finnhub-badge">⚡ Finnhub</div><div class="closed-badge">🔒 Mercado fechado — preço de fecho</div>`;
      } else {
        sourceNote = `<div class="finnhub-badge">⚡ Finnhub — tempo real</div>`;
      }

      document.getElementById('stockContent').innerHTML = `
        <div class="stock-hero">
          <div class="stock-identity">
            <div class="stock-logo-wrap">${initials}</div>
            <div>
              <div class="stock-ticker">${s.ticker}</div>
              <div class="stock-name">${s.name}</div>
              <div class="stock-exchange">${[s.exchange,s.type,s.sector].filter(Boolean).join(' · ')}</div>
            </div>
          </div>
          <div class="stock-price-block">
            <div class="stock-price">${sym}${s.price.toFixed(2)}</div>
            <div><span class="stock-change ${isUp?'up':'down'}">${arrow} ${sign}${sym}${Math.abs(s.change||0).toFixed(2)} (${sign}${s.changePct.toFixed(2)}%)</span></div>
            ${sourceNote}
          </div>
        </div>
        <div class="period-tabs" id="periodTabs">
          <button class="period-tab active" data-period="1D">1D</button>
          <button class="period-tab" data-period="1S">1S</button>
          <button class="period-tab" data-period="1M">1M</button>
          <button class="period-tab" data-period="1A">1A</button>
        </div>
        <div class="chart-card"><div class="chart-wrap"><canvas id="priceChart"></canvas></div></div>
        <div class="grid-3">
          <div class="card"><div class="kpi-label">Abertura</div><div class="kpi-value">${sym}${(s.open||s.price).toFixed(2)}</div><div class="kpi-sub">Fecho anterior: ${sym}${(s.prevClose||s.price).toFixed(2)}</div></div>
          <div class="card"><div class="kpi-label">Máximo do dia</div><div class="kpi-value" style="color:var(--color-success)">${sym}${(s.high||s.price).toFixed(2)}</div><div class="kpi-sub">Mínimo: ${sym}${(s.low||s.price).toFixed(2)}</div></div>
          <div class="card"><div class="kpi-label">Volume</div><div class="kpi-value">${s.volume||'—'}</div><div class="kpi-sub">Média: ${s.avgVolume||'—'}</div></div>
        </div>
        <div class="grid-2">
          <div class="card"><div class="card-title">Estatísticas</div><div class="stat-row">
            <div class="stat-item"><span class="stat-label">Capitalização</span><span class="stat-value">${s.marketCap||'—'}</span></div>
            <div class="stat-item"><span class="stat-label">P/E Ratio</span><span class="stat-value">${s.pe||'—'}</span></div>
            <div class="stat-item"><span class="stat-label">EPS</span><span class="stat-value">${s.eps||'—'}</span></div>
            <div class="stat-item"><span class="stat-label">Dividendo</span><span class="stat-value">${s.dividend||'—'}</span></div>
            <div class="stat-item"><span class="stat-label">Beta</span><span class="stat-value">${s.beta||'—'}</span></div>
          </div></div>
          <div class="card"><div class="card-title">Intervalo 52 Semanas</div>
            <div class="range-bar-wrap">
              <div class="range-labels"><span>Mín ${sym}${w52L.toFixed(2)}</span><span>Máx ${sym}${w52H.toFixed(2)}</span></div>
              <div class="range-track"><div class="range-fill" style="width:${rangePos}%"></div><div class="range-thumb" style="left:${rangePos}%"></div></div>
              <div style="text-align:center;margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-muted)">Atual <strong>${sym}${s.price.toFixed(2)}</strong> — ${rangePos}% do intervalo anual</div>
            </div>
            <div class="stat-row" style="margin-top:var(--space-5)">
              <div class="stat-item"><span class="stat-label">Máx. 52 semanas</span><span class="stat-value" style="color:var(--color-success)">${sym}${w52H.toFixed(2)}</span></div>
              <div class="stat-item"><span class="stat-label">Mín. 52 semanas</span><span class="stat-value" style="color:var(--color-notification)">${sym}${w52L.toFixed(2)}</span></div>
            </div>
          </div>
        </div>
        ${s.about?`<div class="card"><div class="card-title">Sobre</div><p style="font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.7">${s.about}</p></div>`:''}
      `;
      requestAnimationFrame(()=>renderChart(s.price,'1D',isUp));
      document.getElementById('periodTabs').addEventListener('click',e=>{
        const btn=e.target.closest('.period-tab');if(!btn)return;
        document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
        btn.classList.add('active');
        renderChart(s.price,btn.dataset.period,isUp);
      });
    }

    function renderError(ticker, msg) {
      document.getElementById('stockContent').innerHTML = `
        <div class="error-state">
          <div style="font-size:2.5rem;margin-bottom:var(--space-4)">🐷</div>
          <h2>Dados indisponíveis</h2>
          <p>Não foi possível carregar <strong>${ticker}</strong>.</p>
          <p style="margin-top:var(--space-2);font-size:var(--text-sm);color:var(--color-text-faint)">${msg}</p>
          <a href="index.html" class="back-btn" style="margin-top:var(--space-6);justify-content:center;display:inline-flex">← Voltar ao início</a>
        </div>`;
    }

    const params = new URLSearchParams(location.search);
    const ticker = (params.get('ticker') || params.get('t') || '').trim();
    if (ticker) loadAndRender(ticker);
    else renderError('?', 'Nenhum ticker especificado.');
  </script>
</body>
</html>
