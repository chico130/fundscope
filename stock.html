<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundScope</title>
  <link rel="manifest" href="/fundscope/manifest.json">
  <meta name="theme-color" content="#01696f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FundScope">
  <link rel="apple-touch-icon" href="/fundscope/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-error:#a13544;--color-error-bg:#f8e8ea;
      --color-warn:#8a6200;--color-warn-bg:#fef3c7;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-error:#dd6974;--color-error-bg:#2e1015;
      --color-warn:#d4a017;--color-warn-bg:#2a2000;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);}
    .back-btn:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .page{max-width:1100px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16);}
    .stock-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-6);margin-bottom:var(--space-8);}
    .stock-identity{display:flex;align-items:center;gap:var(--space-4);}
    .stock-logo-wrap{width:56px;height:56px;border-radius:var(--radius-lg);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:var(--color-surface);}
    .stock-ticker{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em;}
    .stock-name{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px;}
    .stock-exchange{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .stock-price-block{text-align:right;}
    .stock-price{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
    .stock-change{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);margin-top:var(--space-2);font-variant-numeric:tabular-nums;}
    .stock-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .stock-change.down{background:var(--color-error-bg);color:var(--color-error);}
    .source-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-2);}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--color-success);animation:pulse 1.8s infinite;}
    .static-dot{width:6px;height:6px;border-radius:50%;background:var(--color-warn);}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
    .warn-banner{display:flex;align-items:center;gap:var(--space-3);background:var(--color-warn-bg);color:var(--color-warn);border:1px solid color-mix(in oklch,var(--color-warn) 30%,transparent);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-sm);margin-bottom:var(--space-6);}
    .period-tabs{display:flex;gap:var(--space-1);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-5);width:fit-content;}
    .period-tab{padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);transition:all var(--transition);}
    .period-tab.active{background:var(--color-bg);color:var(--color-text);box-shadow:var(--shadow-sm);}
    .period-tab:hover:not(.active){color:var(--color-text);}
    .chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-6);box-shadow:var(--shadow-sm);}
    .chart-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);}
    .chart-change-badge{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-variant-numeric:tabular-nums;}
    .chart-change-badge.up{background:var(--color-success-bg);color:var(--color-success);}
    .chart-change-badge.down{background:var(--color-error-bg);color:var(--color-error);}
    .chart-wrap{position:relative;height:280px;}
    .chart-loading{display:flex;align-items:center;justify-content:center;height:280px;color:var(--color-text-muted);font-size:var(--text-sm);gap:8px;}
    .spinner{width:18px;height:18px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);margin-bottom:var(--space-6);}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .card-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--color-divider);padding-bottom:var(--space-2);}
    .stat-item:last-child{border-bottom:none;padding-bottom:0;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}
    .kpi-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
    .kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-error),var(--color-success));}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-state{text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
    .error-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);}
    .error-detail{margin-top:var(--space-2);font-size:var(--text-sm);color:var(--color-text-faint);font-family:monospace;background:var(--color-surface);padding:var(--space-3);border-radius:var(--radius-md);text-align:left;max-width:520px;margin-inline:auto;word-break:break-all;line-height:1.6;}
    .analyst-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);margin-bottom:var(--space-6);}
    .analyst-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-5);}
    .analyst-kpi{text-align:center;}
    .analyst-kpi .kpi-value{font-size:var(--text-base);}
    .rec-bar-wrap{display:flex;gap:3px;height:8px;border-radius:var(--radius-full);overflow:hidden;margin-bottom:var(--space-3);}
    .rec-seg{height:100%;transition:width .4s ease;}
    .rec-seg.strong-buy{background:#437a22;}
    .rec-seg.buy{background:#8ab74a;}
    .rec-seg.hold{background:#bab9b4;}
    .rec-seg.sell{background:#dd8a6a;}
    .rec-seg.strong-sell{background:#a13544;}
    .rec-legend{display:flex;gap:var(--space-4);flex-wrap:wrap;}
    .rec-legend-item{display:flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-text-muted);}
    .rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .news-section{margin-bottom:var(--space-6);}
    .news-section-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .news-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);}
    .news-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;transition:box-shadow var(--transition);}
    .news-card:hover{box-shadow:var(--shadow-md);}
    .news-img{width:100%;height:120px;object-fit:cover;background:var(--color-surface-offset);}
    .news-body{padding:var(--space-4);flex:1;display:flex;flex-direction:column;gap:var(--space-2);}
    .news-meta{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-faint);}
    .news-source{font-weight:600;color:var(--color-text-muted);}
    .news-sentiment{padding:1px 6px;border-radius:var(--radius-full);font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
    .news-sentiment.positive{background:var(--color-success-bg);color:var(--color-success);}
    .news-sentiment.negative{background:var(--color-error-bg);color:var(--color-error);}
    .news-sentiment.neutral{background:var(--color-surface-offset);color:var(--color-text-faint);}
    .news-title{font-size:var(--text-sm);font-weight:600;line-height:1.4;color:var(--color-text);flex:1;}
    .news-title:hover{color:var(--color-primary);}
    .news-date{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:auto;}
    .news-fallback{font-size:var(--text-xs);color:var(--color-text-faint);padding:var(--space-4);text-align:center;background:var(--color-surface);border-radius:var(--radius-xl);border:1px solid var(--color-border);}
    .footer{padding:var(--space-6);text-align:center;font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.stock-hero{flex-direction:column;}.stock-price-block{text-align:left;}.page{padding:var(--space-6) var(--space-4) var(--space-16);}.analyst-grid{grid-template-columns:1fr 1fr;}.news-grid{grid-template-columns:1fr;}}
    @media(max-width:480px){.grid-3{grid-template-columns:1fr;}.header{padding:var(--space-3) var(--space-4);}.analyst-grid{grid-template-columns:1fr 1fr;}}
    .ai-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);margin-bottom:var(--space-6);position:relative;overflow:hidden;}
    .ai-card::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--color-primary),var(--color-primary-hover));border-radius:var(--radius-xl) 0 0 var(--radius-xl);}
    .ai-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);}
    .ai-title-group{display:flex;align-items:center;gap:var(--space-2);}
    .ai-label{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);}
    .ai-beta{font-size:.65rem;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary);letter-spacing:.04em;}
    .ai-score{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);font-weight:700;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1px solid;}
    .ai-score.high{background:var(--color-success-bg);color:var(--color-success);border-color:color-mix(in oklch,var(--color-success) 28%,transparent);}
    .ai-score.mid{background:var(--color-warn-bg);color:var(--color-warn);border-color:color-mix(in oklch,var(--color-warn) 28%,transparent);}
    .ai-score.low{background:var(--color-error-bg);color:var(--color-error);border-color:color-mix(in oklch,var(--color-error) 28%,transparent);}
    .ai-insights{display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4);}
    .ai-line{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.65;padding-left:var(--space-3);border-left:2px solid var(--color-divider);}
    .ai-metrics{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3);}
    .ai-chip{display:inline-flex;align-items:center;gap:3px;font-size:var(--text-xs);font-weight:600;padding:3px 10px;border-radius:var(--radius-full);background:var(--color-surface-offset);color:var(--color-text-muted);font-variant-numeric:tabular-nums;}
    .ai-chip.pos{background:var(--color-success-bg);color:var(--color-success);}
    .ai-chip.neg{background:var(--color-error-bg);color:var(--color-error);}
    .ai-disclaimer{font-size:var(--text-xs);color:var(--color-text-faint);}
  </style>
</head>
<body>
  <header class="header">
    <a href="https://chico130.github.io/fundscope/search.html" class="logo">
      <svg class="logo-svg" viewBox="0 0 28 28" fill="none">
        <ellipse cx="14" cy="15" rx="9" ry="7.5" fill="var(--color-primary)" opacity="0.18"/>
        <ellipse cx="14" cy="14.5" rx="8" ry="6.5" fill="var(--color-primary)"/>
        <ellipse cx="14" cy="18.5" rx="3.5" ry="2.5" fill="var(--color-primary-hover)"/>
        <circle cx="12.8" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="15.2" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
        <circle cx="10.8" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="11.1" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <circle cx="17.2" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
        <circle cx="17.5" cy="12.8" r="0.5" fill="var(--color-text)"/>
        <ellipse cx="7" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <ellipse cx="21" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
        <path d="M11.5 16.8 Q14 18.5 16.5 16.8" stroke="var(--color-bg)" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      </svg>
      FundScope
    </a>
    <div style="display:flex;align-items:center;gap:var(--space-2);">
      <a id="backBtn" href="search.html" class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span id="backLabel">Pesquisa</span>
      </a>
      <button class="btn-icon" id="themeToggle" aria-label="Alternar tema">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="page">
    <div id="skeletonHero" class="stock-hero">
      <div class="stock-identity">
        <div class="skeleton" style="width:56px;height:56px;border-radius:var(--radius-lg);flex-shrink:0;"></div>
        <div>
          <div class="skeleton" style="width:120px;height:28px;margin-bottom:8px;"></div>
          <div class="skeleton" style="width:180px;height:16px;margin-bottom:6px;"></div>
          <div class="skeleton" style="width:80px;height:12px;"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div class="skeleton" style="width:140px;height:36px;margin-bottom:10px;margin-left:auto;"></div>
        <div class="skeleton" style="width:100px;height:24px;margin-left:auto;"></div>
      </div>
    </div>
    <div id="skeletonChart" class="chart-card">
      <div class="skeleton" style="height:280px;border-radius:var(--radius-lg);"></div>
    </div>
    <div id="stockContent" style="display:none;"></div>
  </main>

  <footer class="footer">
    <p>&#169; 2026 FundScope &middot; <a href="https://github.com/chico130/fundscope" target="_blank" rel="noopener">GitHub</a> &middot; Dados via Yahoo Finance &amp; Finnhub</p>

<script>
const WORKER = 'https://stocks.araujo-francisco-fernandes.workers.dev';

(function(){
  const btn=document.getElementById('themeToggle'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const icons={

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtNum(n,dec=2){if(n==null||isNaN(n)||n===0)return '\u2014';return Number(n).toFixed(dec);}
function fmtLarge(n){if(!n||isNaN(n))return '\u2014';if(n>=1e12)return '$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return '$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M';return '$'+n.toFixed(0);}
function fmtVol(n){if(!n||isNaN(n))return '\u2014';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return String(n);}
function fmtRelTime(iso){
  const d=new Date(iso),now=Date.now(),diff=Math.floor((now-d)/1000);
  if(diff<60) return 'agora';
  if(diff<3600) return Math.floor(diff/60)+'min';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  if(diff<604800) return Math.floor(diff/86400)+'d';
  return d.toLocaleDateString('pt',{day:'numeric',month:'short'});
}
function rawVal(obj){
  if(obj !== null && typeof obj === 'object' && 'raw' in obj) return obj.raw;
  return obj ?? null;
}
function fetchTimeout(url,ms=12000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}

// Logo: mesma lógica que na watchlist, com 4 caracteres max
function tickerColor(ticker) {
  const palette = [
    ['#01696f','#e8f5f5'],
    ['#437a22','#eaf3e2'],
    ['#006494','#e0f0f8'],
    ['#7a39bb','#f0eaf8'],
    ['#a13544','#fbeaec'],
    ['#da7101','#fdf0e0'],
    ['#d19900','#fdf6e0'],
    ['#0c4e54','#e0f2f4'],
    ['#2e5c10','#ecf5e5'],
    ['#0b3751','#dceef8'],
    ['#431673','#ede0f5'],
    ['#4b2614','#f5ede8'],
  ];
  const clean = String(ticker||'').toUpperCase();
  let h = 0;
  for (let i = 0; i < clean.length; i++) h = (h * 31 + clean.charCodeAt(i)) >>> 0;
  return palette[h % palette.length];
}
function makeLogoSVG(ticker) {
  const clean = String(ticker||'').replace(/[^A-Z0-9]/gi, '').toUpperCase();
  const label = clean.slice(0, 4) || String(ticker||'').slice(0, 4).toUpperCase();
  const [bg, fg] = tickerColor(label);
  const fs = label.length <= 2 ? 22 : 16;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56">`
    + `<rect width="56" height="56" rx="10" fill="${bg}"/>`
    + `<text x="28" y="28" dominant-baseline="central" text-anchor="middle"`
    + ` font-family="Inter,Helvetica Neue,sans-serif" font-weight="700"`
    + ` font-size="${fs}" fill="${fg}" letter-spacing="-0.5">${label}</text>`
    + `</svg>`;
}

// Notícias: mesma lógica de filtragem que na watchlist
async function fetchNews(ticker){
  try{
    const r = await fetchTimeout('news.json', 6000);
    if(!r.ok) return [];
    const j = await r.json();
    const articles = Array.isArray(j?.articles) ? j.articles : [];
    const t = ticker.toUpperCase();
    const withImpact = articles.filter(a => {
      const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : [];
      return tickers.includes(t);
    });
    const textMatches = articles.filter(a => {
      if(!a || !a.title) return false;
      const title = String(a.title).toUpperCase();
      const desc  = String(a.description || '').toUpperCase();
      const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : [];
      if(tickers.includes(t)) return false;
      return title.includes(t) || desc.includes(t);
    });
    const merged = [...withImpact, ...textMatches];
    merged.sort((a,b) => {
      const da = a.publishedAt ? new Date(a.publishedAt).getTime() : 0;
      const db = b.publishedAt ? new Date(b.publishedAt).getTime() : 0;
      return db - da;
    });
    return merged.slice(0, 4);
  }catch(e){
    return [];
  }
}

let chartInst=null;
const PERIOD_MAP={'1D':{range:'1d',interval:'5m'},'1S':{range:'5d',interval:'1h'},'1M':{range:'1mo',interval:'1d'},'1A':{range:'1y',interval:'1wk'},'3A':{range:'3y',interval:'1wk'}};
function fmtAxisLabel(ts,period){
  const d=new Date(ts*1000);
  if(period==='1D') return d.toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'});
  if(period==='1S') return d.toLocaleDateString('pt',{weekday:'short',day:'numeric'});
  if(period==='1M') return d.toLocaleDateString('pt',{day:'numeric',month:'short'});
  return d.toLocaleDateString('pt',{month:'short',year:'2-digit'});
}
function fmtTooltipLabel(ts,period){
  const d=new Date(ts*1000);
  if(period==='1D') return d.toLocaleString('pt',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('pt',{day:'2-digit',month:'short',year:'numeric'});
}
function parseChartPts(data){
  try{
    const result=data?.chart?.result?.[0];
    if(!result) return {pts:[],prevClose:null};
    const meta=result.meta||{};
    const prevClose=meta.chartPreviousClose??meta.previousClose??null;
    const ts=result.timestamp||[],cl=result.indicators?.quote?.[0]?.close||[],pts=[];
    for(let i=0;i<ts.length;i++){const v=cl[i];if(v==null||isNaN(v))continue;pts.push({t:ts[i],v:parseFloat(v.toFixed(4))});}
    return {pts,prevClose};
  }catch(e){return {pts:[],prevClose:null};}
}
function renderChart(period,pts,baseClose){
  const wrap=document.querySelector('.chart-wrap');
  if(!wrap) return;
  if(!pts||pts.length<2){
    if(chartInst){chartInst.destroy();chartInst=null;}
    wrap.innerHTML='<div class="chart-loading" style="color:var(--color-text-faint);">Sem dados para este per\u00edodo</div>';
    return;
  }
  if(!wrap.querySelector('#priceChart')){const c=document.createElement('canvas');c.id='priceChart';wrap.innerHTML='';wrap.appendChild(c);}
  const cvs=document.getElementById('priceChart');
  const ref=baseClose??pts[0].v;
  const last=pts[pts.length-1].v,up=last>=ref;
  const color=up?'#437a22':'#a13544',bg0=up?'rgba(67,122,34,.18)':'rgba(161,53,68,.18)';
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const axCol=dark?'#5a5957':'#8a8985',gridC=dark?'rgba(80,78,74,.25)':'rgba(180,178,172,.15)';
  if(chartInst){chartInst.destroy();chartInst=null;}
  const timestamps=pts.map(p=>p.t),labels=pts.map(p=>fmtAxisLabel(p.t,period)),data=pts.map(p=>p.v);
  chartInst=new Chart(cvs,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,borderWidth:2,pointRadius:0,pointHoverRadius:4,
      pointHoverBackgroundColor:color,tension:.3,fill:true,
      backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,bg0);g.addColorStop(1,'transparent');return g;}}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:dark?'#f0ede8':'#1c1b19',titleColor:dark?'#28251d':'#e8e7e5',
        bodyColor:dark?'#28251d':'#e8e7e5',borderColor:dark?'#d4d1ca':'#2e2d2b',borderWidth:1,padding:10,cornerRadius:8,
        callbacks:{title:ctx=>{const i=ctx[0]?.dataIndex;return timestamps[i]?fmtTooltipLabel(timestamps[i],period):(labels[i]||'');},
          label:ctx=>' $'+ctx.parsed.y.toFixed(2)}}},
      scales:{
        x:{ticks:{color:axCol,maxTicksLimit:6,maxRotation:0,font:{size:11}},grid:{color:gridC},border:{display:false}},
        y:{ticks:{color:axCol,maxTicksLimit:5,font:{size:11},callback:v=>'$'+v.toFixed(2)},grid:{color:gridC},border:{display:false},position:'right'}
      }}
  });
}
function updateChangeBadge(pts,period,baseClose){
  const badge=document.getElementById('chartChangeBadge');
  if(!badge) return;
  if(!pts||pts.length<2){badge.textContent='\u2014';badge.className='chart-change-badge';return;}
  const ref=baseClose??pts[0].v;
  const last=pts[pts.length-1].v,chg=last-ref,pct=ref?(chg/ref)*100:0;

}

async function fetchLiveQuote(ticker){
  const [chartData, stats, staticDataRaw] = await Promise.all([
    workerChart(ticker,'1d','5m'),
    workerStats(ticker),
    fetchTimeout('data.json', 4000).then(r=>r.json()).catch(()=>null)
  ]);
  const chartResult = chartData?.chart?.result?.[0];
  const meta        = chartResult?.meta || {};
  const staticStock = staticDataRaw?.stocks?.[ticker] || {};
  const priceM = stats?.price || {};
  const summM  = stats?.summaryDetail || {};
  const keyM   = stats?.defaultKeyStatistics || {};
  let price = rawVal(priceM.regularMarketPrice) ?? meta.regularMarketPrice ?? null;
  let isStatic = false;
  if(!price || price === 0){
    if(staticStock.price){ price = staticStock.price; isStatic = true; }
    else return null;
  }
  const prevClose = rawVal(priceM.regularMarketPreviousClose) ?? rawVal(summM.previousClose) ?? meta.chartPreviousClose ?? staticStock.prevClose ?? price;
  const change    = parseFloat((price - prevClose).toFixed(2));
  const changePct = parseFloat(((change/prevClose)*100).toFixed(2));
  const mktCapRaw = rawVal(priceM.marketCap);
  const marketCap = (mktCapRaw != null) ? fmtLarge(mktCapRaw) : (staticStock.marketCap || '\u2014');
  const peRaw  = rawVal(summM.trailingPE) ?? rawVal(keyM.trailingPE);
  const pe     = (peRaw  != null) ? parseFloat(Number(peRaw).toFixed(1))  : (staticStock.pe  || '\u2014');
  const epsRaw = rawVal(keyM.trailingEps);
  const eps    = (epsRaw != null) ? parseFloat(Number(epsRaw).toFixed(2)) : (staticStock.eps || '\u2014');
  const betaRaw = rawVal(keyM.beta) ?? rawVal(summM.beta);
  const beta    = (betaRaw != null) ? parseFloat(Number(betaRaw).toFixed(2)) : (staticStock.beta || '\u2014');
  let divStr = '\u2014';
  const divRate  = rawVal(summM.dividendRate);
  const divYield = rawVal(summM.dividendYield);
  if(divRate != null && divRate > 0){
    const pct = divYield ? (divYield < 1 ? divYield * 100 : divYield) : null;
    divStr = '$' + divRate.toFixed(2) + (pct ? ' (' + pct.toFixed(2) + '%)' : '');
  } else if(staticStock.dividend && staticStock.dividend !== '\u2014'){
    divStr = staticStock.dividend;
  }
  const volRaw    = rawVal(priceM.regularMarketVolume) ?? meta.regularMarketVolume;
  const avgVolRaw = rawVal(summM.averageVolume);
  const volume    = (volRaw    != null && volRaw    > 0) ? fmtVol(volRaw)    : (staticStock.volume    || '\u2014');
  const avgVolume = (avgVolRaw != null && avgVolRaw > 0) ? fmtVol(avgVolRaw) : (staticStock.avgVolume || '\u2014');
  const w52hRaw = rawVal(summM.fiftyTwoWeekHigh) ?? meta.fiftyTwoWeekHigh ?? staticStock.week52High;
  const w52lRaw = rawVal(summM.fiftyTwoWeekLow)  ?? meta.fiftyTwoWeekLow  ?? staticStock.week52Low;
  const w52h    = (w52hRaw != null) ? parseFloat(Number(w52hRaw).toFixed(2)) : null;
  const w52l    = (w52lRaw != null) ? parseFloat(Number(w52lRaw).toFixed(2)) : null;
  const qt = rawVal(priceM.quoteType) ?? meta.instrumentType ?? (staticStock.type==='\u00c7\u00e3o'?'EQUITY':staticStock.type==='ETF'?'ETF':'');
  const {pts: hist1Dpts} = parseChartPts(chartData);
  return {
    ticker, isStatic,
    name:      rawVal(priceM.longName) ?? rawVal(priceM.shortName) ?? meta.longName ?? meta.shortName ?? staticStock.name ?? ticker,
    exchange:  rawVal(priceM.exchangeName) ?? meta.exchangeName ?? staticStock.exchange ?? 'NASDAQ / NYSE',
    type:      qt==='EQUITY'?'A\u00e7\u00e3o':qt==='ETF'?'ETF':qt==='MUTUALFUND'?'Fundo':qt==='INDEX'?'\u00cdndice':(staticStock.type||''),
    currency:  'USD',
    price: parseFloat(price.toFixed(2)), prevClose: parseFloat(prevClose.toFixed(2)),
    change, changePct,
    open:  rawVal(priceM.regularMarketOpen)    ?? meta.regularMarketOpen    ?? staticStock.open ?? null,
    high:  rawVal(priceM.regularMarketDayHigh) ?? meta.regularMarketDayHigh ?? staticStock.high ?? null,
    low:   rawVal(priceM.regularMarketDayLow)  ?? meta.regularMarketDayLow  ?? staticStock.low  ?? null,
    week52High: w52h, week52Low: w52l,
    volume, avgVolume, marketCap, pe, eps, beta, dividend: divStr,
    hist1D: hist1Dpts.length ? hist1Dpts : (staticStock.history ? staticStock.history['1D'] : []),
  };
}

      const raw=await workerChart(window._yfTicker,range,interval);
      const parsed=parseChartPts(raw);
      pts=parsed.pts;
      baseClose = (p==='1D') ? window._prevClose : (parsed.prevClose ?? (pts.length?pts[0].v:null));
      if(pts&&pts.length>1) window._histCache[p]={pts,prevClose:baseClose};
    } else {
      if(p==='1D') baseClose=window._prevClose;
    }
    const w2=document.querySelector('.chart-wrap');
    if(w2&&!w2.querySelector('#priceChart')){const c=document.createElement('canvas');c.id='priceChart';w2.innerHTML='';w2.appendChild(c);}
    renderChart(p,pts,baseClose);
    updateChangeBadge(pts,p,baseClose);
  }
  loadAndRender('1D');
  document.getElementById('periodTabs').addEventListener('click',e=>{
    const btn=e.target.closest('[data-p]');
    if(!btn) return;
    document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    loadAndRender(btn.dataset.p);
  });
  Promise.all([workerAnalysts(ticker), fetchNews(ticker)]).then(([analystData, articles])=>{
    renderAnalysts(analystData, price);
    renderNews(articles, ticker);
  });
  workerProfile(ticker).then(profile => tryLoadClearbitLogo(ticker, profile, 'logoWrap'));
  fetchAIReview(ticker);
}

function renderAnalysts(analystData, currentPrice){
  const sec = document.getElementById('analystSection');
  if(!sec) return;
  if(!analystData || !analystData.financialData){
    sec.innerHTML=`<div class="analyst-card"><div class="card-title">Analistas</div><p style="font-size:var(--text-sm);color:var(--color-text-muted);">Sem dados de analistas dispon\u00edveis para <strong>${esc(TICKER)}</strong>.</p></div>`;
    return;
  }
  const fd = analystData.financialData;
  const targetMean = rawVal(fd.targetMeanPrice);
  const targetHigh = rawVal(fd.targetHighPrice);
  const targetLow  = rawVal(fd.targetLowPrice);
  const recKey     = fd.recommendationKey || '';
  const numAnal    = rawVal(fd.numberOfAnalystOpinions);
  const recLabels={'strong_buy':'Compra Forte','buy':'Comprar','hold':'Manter','sell':'Vender','strong_sell':'Venda Forte','':'\u2014'};
  const recColors={'strong_buy':'var(--color-success)','buy':'#8ab74a','hold':'var(--color-text-muted)','sell':'#dd8a6a','strong_sell':'var(--color-error)','':'var(--color-text-faint)'};
  const recLabel = recLabels[recKey] ?? recKey;
  const recColor = recColors[recKey] ?? 'var(--color-text-faint)';
  const upside = (targetMean && currentPrice) ? ((targetMean - currentPrice) / currentPrice * 100) : null;
  const upsideStr = upside != null ? `${upside>=0?'+':''}${upside.toFixed(1)}%` : '\u2014';
  const upsideCls = upside == null ? '' : (upside >= 0 ? 'color:var(--color-success)' : 'color:var(--color-error)');
  sec.innerHTML=`<div class="analyst-card"><div class="card-title">Analistas</div>
    <div class="analyst-grid">
      <div class="analyst-kpi"><div class="kpi-value">${targetMean ? '$'+Number(targetMean).toFixed(2) : '\u2014'}</div><div class="kpi-label">Target m\u00e9dio</div></div>
      <div class="analyst-kpi"><div class="kpi-value" style="${upsideCls}">${upsideStr}</div><div class="kpi-label">Upside potencial</div></div>
      <div class="analyst-kpi"><div class="kpi-value" style="color:${recColor}">${recLabel}</div><div class="kpi-label">Consenso</div></div>
      <div class="analyst-kpi"><div class="kpi-value">${numAnal ?? '\u2014'}</div><div class="kpi-label">N.\u00ba analistas</div></div>
    </div>
    <div class="range-bar-wrap">
      <div class="range-labels"><span>Target baixo: ${targetLow ? '$'+Number(targetLow).toFixed(2) : '\u2014'}</span><span>Target alto: ${targetHigh ? '$'+Number(targetHigh).toFixed(2) : '\u2014'}</span></div>
      ${(targetLow && targetHigh && targetHigh > targetLow) ? `<div class="range-track"><div class="range-fill" style="width:100%;"></div>${targetMean ? `<div class="range-thumb" style="left:${Math.min(100,Math.max(0,Math.round((targetMean-targetLow)/(targetHigh-targetLow)*100)))}%;"></div>` : ''}</div>` : ''}
    </div></div>`;
}

function renderNews(articles, ticker){
  const sec = document.getElementById('newsSection');
  if(!sec) return;
  if(!articles || articles.length === 0){
    sec.innerHTML=`<div class="news-section"><div class="news-section-title">Not\u00edcias recentes &mdash; ${esc(ticker)}</div><div class="news-fallback">Sem not\u00edcias dispon\u00edveis para <strong>${esc(ticker)}</strong> de momento.</div></div>`;
    return;
  }
  const cards = articles.map(a=>{
    const sent = a.impact?.sentiment || 'neutral';
    const sentLabel = sent==='positive'?'Positivo':sent==='negative'?'Negativo':'Neutro';
    const imgSrc = a.image || 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800&q=80';
    return `<a href="${esc(a.url)}" target="_blank" rel="noopener" class="news-card">
      <img class="news-img" src="${esc(imgSrc)}" alt="" loading="lazy" onerror="this.style.display='none'">
      <div class="news-body">
        <div class="news-meta"><span class="news-source">${esc(a.source||'')}</span><span class="news-sentiment ${sent}">${sentLabel}</span></div>
        <div class="news-title">${esc(a.title||'')}</div>
        <div class="news-date">${fmtRelTime(a.publishedAt)}</div>
      </div></a>`;
  }).join('');
  sec.innerHTML=`<div class="news-section"><div class="news-section-title">Not\u00edcias recentes &mdash; ${esc(ticker)}</div><div class="news-grid">${cards}</div></div>`;
}

function generateAIInsights(d) {
  const lines = [];
  const sc = d.score || 0;
  const m1 = d.mom_1m || 0;
  const m3 = d.mom_3m || 0;
  const liq = d.liq_usd_avg || 0;
  const rankStr = d.rank ? `#${d.rank} de ${d.total}` : '';

  if (sc >= 0.80) {
    lines.push(`<strong>Convicção elevada</strong> do modelo quantitativo${rankStr ? ` — posição ${rankStr} na watchlist` : ''} (score ${sc.toFixed(2)}). Candidato de alta prioridade no ciclo atual.`);
  } else if (sc >= 0.70) {
    lines.push(`Score <strong>${sc.toFixed(2)}</strong>${rankStr ? ` (posição ${rankStr})` : ''} indica convicção moderada-alta — ${esc(d.ticker)} encontra-se no núcleo da watchlist quantitativa.`);
  } else {
    lines.push(`Score <strong>${sc.toFixed(2)}</strong>${rankStr ? ` (posição ${rankStr})` : ''} — o modelo monitoriza o ticker mas sem prioridade máxima neste ciclo.`);
  }

  if (m1 === 0 && m3 === 0) {
    lines.push(`Dados de momentum ainda não processados para este ciclo — análise de tendência disponível após o próximo update do robô.`);
  } else {
    const m1s = `${m1 >= 0 ? '+' : ''}${(m1 * 100).toFixed(0)}%`;
    const m3s = `${m3 >= 0 ? '+' : ''}${(m3 * 100).toFixed(0)}%`;
    if (m1 > 0.3 && m3 > 0.5) {
      lines.push(`Momentum técnico <strong>forte e consistente</strong>: ${m1s} no último mês, ${m3s} nos últimos três — tendência de alta confirmada em múltiplos horizontes.`);
    } else if (m1 > 0.1 || m3 > 0.2) {
      lines.push(`Momentum positivo em construção (${m1s} / ${m3s}) — aceleração relativa detetada, aguardando confirmação de continuidade.`);
    } else if (m1 < 0 && m3 < 0) {
      lines.push(`Momentum negativo (${m1s} / ${m3s}) — score elevado pode sinalizar oportunidade de <strong>reversão à média</strong> identificada pelo modelo.`);
    } else {
      lines.push(`Momentum misto (${m1s} / ${m3s}) — ciclo de transição; o modelo aguarda maior direcionalidade para aumentar convicção.`);
    }
  }

  let line3 = '';
  if (liq >= 1e9) {
    line3 = `Liquidez média de $${(liq / 1e9).toFixed(1)}B/dia garante execução eficiente sem impacto de mercado.`;
  } else if (liq >= 1e6) {
    line3 = `Liquidez moderada ($${(liq / 1e6).toFixed(0)}M/dia) — adequada para posições de dimensão normal.`;
  } else {
    line3 = `Liquidez reduzida neste ciclo — verificar impacto de mercado antes de qualquer posição de maior dimensão.`;
  }
  if (d.target_mean && d.price) {
    const upside = ((d.target_mean - d.price) / d.price * 100);
    line3 += ` Target médio de analistas: <strong>$${Number(d.target_mean).toFixed(1)}</strong> (${upside >= 0 ? '+' : ''}${upside.toFixed(0)}% vs preço de watchlist).`;
  }
  lines.push(line3);
  return lines;
}

async function fetchAIReview(ticker) {
  const sec = document.getElementById('aiAnalystSection');
  if (!sec) return;
  try {
    const r = await fetchTimeout(`/api/stock-review?ticker=${encodeURIComponent(ticker)}`, 4000);
    if (!r.ok) return;
    const d = await r.json();
    if (!d.found) return;

    const sc = d.score || 0;
    const scoreCls = sc >= 0.75 ? 'high' : sc >= 0.60 ? 'mid' : 'low';
    const scoreLabel = `Score ${sc.toFixed(2)}`;
    const lines = generateAIInsights(d);

    const m1 = d.mom_1m || 0, m3 = d.mom_3m || 0, liq = d.liq_usd_avg || 0;
    const chips = [];
    if (m1 !== 0) chips.push(`<span class="ai-chip ${m1 >= 0 ? 'pos' : 'neg'}">Mom 1M ${m1 >= 0 ? '+' : ''}${(m1*100).toFixed(0)}%</span>`);
    if (m3 !== 0) chips.push(`<span class="ai-chip ${m3 >= 0 ? 'pos' : 'neg'}">Mom 3M ${m3 >= 0 ? '+' : ''}${(m3*100).toFixed(0)}%</span>`);
    if (liq >= 1e6) chips.push(`<span class="ai-chip">Liq ${liq >= 1e9 ? '$'+(liq/1e9).toFixed(1)+'B' : '$'+(liq/1e6).toFixed(0)+'M'}/dia</span>`);
    if (d.rank) chips.push(`<span class="ai-chip">Rank ${d.rank}/${d.total}</span>`);

    sec.innerHTML = `<div class="ai-card">
      <div class="ai-header">
        <div class="ai-title-group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 7h.01M11 7h6M7 11h.01M11 11h6"/></svg>
          <span class="ai-label">FundScope AI Analyst</span>
          <span class="ai-beta">Beta</span>
        </div>
        <span class="ai-score ${scoreCls}">${scoreLabel}</span>
      </div>
      <div class="ai-insights">${lines.map(l => `<div class="ai-line">${l}</div>`).join('')}</div>
      ${chips.length ? `<div class="ai-metrics">${chips.join('')}</div>` : ''}
      <div class="ai-disclaimer">Análise gerada automaticamente a partir do score do modelo quantitativo FundScope. Não constitui conselho de investimento.</div>
    </div>`;
  } catch (e) {
    // Silently ignore if local server is not running (e.g. GitHub Pages)
  }
}

function renderError(ticker,msg){
  document.getElementById('skeletonHero').style.display='none';
  document.getElementById('skeletonChart').style.display='none';
  const c=document.getElementById('stockContent');
  c.innerHTML=`<div class="error-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-faint)" stroke-width="1.5" style="margin:0 auto var(--space-4)"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <h2>N\u00e3o foi poss\u00edvel carregar "${esc(ticker)}"</h2>
    <p>Este site suporta apenas a\u00e7\u00f5es cotadas em bolsas norte-americanas (NYSE, NASDAQ, AMEX).<br>Exemplos v\u00e1lidos: <strong>AAPL</strong>, <strong>MSFT</strong>, <strong>NVDA</strong>, <strong>SPY</strong>, <strong>BRK-B</strong></p>
    <div class="error-detail">${esc(msg)}</div>
    <a href="search.html" style="display:inline-flex;align-items:center;gap:8px;margin-top:24px;padding:10px 20px;background:var(--color-primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar \u00e0 pesquisa
    </a></div>`;
  c.style.display='block';
}

if(!TICKER){
  renderError('?','Nenhum ticker na URL. Exemplo: stock.html?ticker=AAPL');
} else if(TICKER.includes('.')){
  renderError(TICKER,'Ticker "'+TICKER+'" inv\u00e1lido. Este site suporta apenas a\u00e7\u00f5es americanas puras.');
} else {
  fetchLiveQuote(TICKER).then(data=>{
    if(data) renderStock(data);
    else renderError(TICKER,'Ticker "'+TICKER+'" n\u00e3o encontrado. A API pode estar temporariamente indispon\u00edvel \u2014 tenta novamente em breve.');
  });
}
