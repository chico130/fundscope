<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundScope</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-error:#a13544;--color-error-bg:#f8e8ea;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-error:#dd6974;--color-error-bg:#2e1015;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);}
    .back-btn:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .page{max-width:1100px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16);}
    .stock-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-6);margin-bottom:var(--space-8);}
    .stock-identity{display:flex;align-items:center;gap:var(--space-4);}
    .stock-logo-wrap{width:56px;height:56px;border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:var(--color-primary);flex-shrink:0;overflow:hidden;}
    .stock-logo-wrap img{width:100%;height:100%;object-fit:contain;padding:6px;}
    .stock-ticker{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em;}
    .stock-name{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px;}
    .stock-exchange{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .stock-price-block{text-align:right;}
    .stock-price{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
    .stock-change{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);margin-top:var(--space-2);font-variant-numeric:tabular-nums;}
    .stock-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .stock-change.down{background:var(--color-error-bg);color:var(--color-error);}
    .source-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-2);}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--color-success);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .period-tabs{display:flex;gap:var(--space-1);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-5);width:fit-content;}
    .period-tab{padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);transition:all var(--transition);}
    .period-tab.active{background:var(--color-bg);color:var(--color-text);box-shadow:var(--shadow-sm);}
    .period-tab:hover:not(.active){color:var(--color-text);}
    .chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-6);box-shadow:var(--shadow-sm);}
    .chart-wrap{position:relative;height:280px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);margin-bottom:var(--space-6);}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .card-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--color-divider);padding-bottom:var(--space-2);}
    .stat-item:last-child{border-bottom:none;padding-bottom:0;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}
    .kpi-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
    .kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-error),var(--color-success));}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .error-state{text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
    .error-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);}
    .error-detail{margin-top:var(--space-2);font-size:var(--text-sm);color:var(--color-text-faint);font-family:monospace;background:var(--color-surface);padding:var(--space-3);border-radius:var(--radius-md);text-align:left;max-width:520px;margin-inline:auto;word-break:break-all;line-height:1.6;}
    .footer{padding:var(--space-6);text-align:center;font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.stock-hero{flex-direction:column;}.stock-price-block{text-align:left;}.page{padding:var(--space-6) var(--space-4) var(--space-16);}}
    @media(max-width:480px){.grid-3{grid-template-columns:1fr;}.header{padding:var(--space-3) var(--space-4);}}
  </style>
</head>

<script>
/* ── tema ─────────────────────────────────────────────────────────── */
(function(){
  const btn=document.getElementById('themeToggle'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const icons={
    light:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
    dark:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  };
  if(btn){btn.innerHTML=icons[d];btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);btn.innerHTML=icons[d];});}
})();

/* ── utils ────────────────────────────────────────────────────────── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sym(c){return({USD:'$',EUR:'\u20ac',GBP:'\u00a3',JPY:'\u00a5',CHF:'CHF\u00a0',CAD:'C$',AUD:'A$',DKK:'kr\u00a0',SEK:'kr\u00a0',NOK:'kr\u00a0',BRL:'R$',HKD:'HK$',CNY:'\u00a5',INR:'\u20b9'})[c]||(c+'\u00a0');}
function fmtBig(n){if(n==null||isNaN(n))return '\u2014';if(n>=1e12)return(n/1e12).toFixed(2)+'T';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';return n.toLocaleString('pt');}
function fmtNum(n,dec=2){if(n==null||isNaN(n)||n===0)return '\u2014';return Number(n).toFixed(dec);}
/* extrai valor de campo que pode ser {raw:x} ou número directo */
function raw(v){if(v==null)return null;if(typeof v==='object'&&v.raw!=null)return v.raw;if(typeof v==='number')return v;return null;}

const TICKER=(()=>{const p=new URLSearchParams(location.search);return(p.get('ticker')||p.get('t')||'').trim().toUpperCase();})();

/* ── fetch com timeout (ms) ───────────────────────────────────────── */
function fetchT(url,ms=10000){
  const ac=new AbortController();
  const t=setTimeout(()=>ac.abort(),ms);
  return fetch(url,{signal:ac.signal,cache:'no-store'}).finally(()=>clearTimeout(t));
}

/* ── constrói lista de URLs a tentar para um path Yahoo ───────────── 
   Ordem: directo q1 → directo q2 → allorigins → corsproxy           */
function yUrls(path){
  const base1='https://query1.finance.yahoo.com'+path;
  const base2='https://query2.finance.yahoo.com'+path;
  return [
    base1,
    base2,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(base1),
    'https://corsproxy.io/?'+encodeURIComponent(base1)
  ];
}

/* ── tenta lista de URLs, devolve primeiro JSON válido ─────────────
   validate(json) → devolve o objecto útil ou null se inválido        */
async function tryUrls(urls,validate,timeoutMs=9000){
  for(const url of urls){
    try{
      const r=await fetchT(url,timeoutMs);
      if(!r.ok) continue;
      const j=await r.json();
      const v=validate(j);
      if(v) return v;
    }catch(e){continue;}
  }
  return null;
}

/* ── FETCH PRINCIPAL: /v8/finance/chart com range=1y ───────────────
   range=1y devolve o meta com TODOS os campos: preço, fundamentais,
   52-week, dividendo, beta, EPS, P/E, marketCap — tudo de uma vez.  */
async function fetchAll(ticker){
  /* Usamos range=1y para garantir que o Yahoo inclui todos os
     campos de fundamentais no objecto meta. Com range=1d alguns
     campos ficam em falta para acções não-US.                        */
  const path=`/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1y&includePrePost=false`;
  const result=await tryUrls(yUrls(path),(j)=>{
    const res=j?.chart?.result?.[0];
    if(res&&res.meta&&res.meta.regularMarketPrice) return res;
    return null;
  });
  if(!result) throw new Error('Ticker "'+ticker+'" não encontrado. Verifica no Yahoo Finance (ex: AAPL, ASML, NOVO-B.CO, VOO).');
  return result;
}

/* ── FETCH HISTÓRICO para outros períodos ─────────────────────────  */
async function fetchHistory(ticker,range,interval){
  const path=`/v8/finance/chart/${encodeURIComponent(ticker)}?interval=${interval}&range=${range}&includePrePost=false`;
  const result=await tryUrls(yUrls(path),(j)=>{
    const res=j?.chart?.result?.[0];
    if(!res) return null;
    const times=res.timestamp||[];
    const closes=res.indicators?.quote?.[0]?.close||[];
    const pts=times.map((t,i)=>({t,v:closes[i]})).filter(p=>p.v!=null&&!isNaN(p.v));
    return pts.length>1?pts:null;
  });
  return result; /* null se falhar — gráfico placeholder */
}

/* ── GRÁFICO ──────────────────────────────────────────────────────── */
let chartInst=null;
function renderChart(price,period,up,pts){
  const canvas=document.getElementById('priceChart');
  if(!canvas) return;
  const color=up?'#437a22':'#a13544';
  const bg0=up?'rgba(67,122,34,.18)':'rgba(161,53,68,.18)';
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const axCol=dark?'#5a5957':'#8a8985';
  const gridC=dark?'rgba(80,78,74,.25)':'rgba(180,178,172,.15)';
  if(chartInst){chartInst.destroy();chartInst=null;}
  let labels,data;
  if(pts&&pts.length>1){
    labels=pts.map(p=>{
      const d=new Date(p.t*1000);
      return period==='1D'
        ?d.toLocaleTimeString('pt',{hour:'2-digit',minute:'2-digit'})
        :d.toLocaleDateString('pt',{month:'short',day:'numeric'});
    });
    data=pts.map(p=>p.v);
  }else{
    const n=30;labels=Array.from({length:n},()=>'');
    let v=price*0.97;
    data=Array.from({length:n},()=>{v+=v*(Math.random()-.48)*.015;return+v.toFixed(4);});
    data[n-1]=price;
  }
  chartInst=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,borderWidth:2,pointRadius:0,pointHoverRadius:4,
      pointHoverBackgroundColor:color,tension:.3,fill:true,
      backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,bg0);g.addColorStop(1,'transparent');return g;}
    }]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:dark?'#f0ede8':'#1c1b19',titleColor:dark?'#28251d':'#e8e7e5',
        bodyColor:dark?'#28251d':'#e8e7e5',borderColor:dark?'#d4d1ca':'#2e2d2b',borderWidth:1,padding:10,cornerRadius:8,
        callbacks:{label:ctx=>' '+ctx.parsed.y.toFixed(2)}}},
      scales:{
        x:{ticks:{color:axCol,maxTicksLimit:6,maxRotation:0,font:{size:11}},grid:{color:gridC},border:{display:false}},
        y:{ticks:{color:axCol,maxTicksLimit:5,font:{size:11},callback:v=>v.toFixed(2)},grid:{color:gridC},border:{display:false},position:'right'}
      }
    }
  });
}

/* ── RENDER PRINCIPAL ─────────────────────────────────────────────── */
function renderStock(meta,histPts){
  document.getElementById('skeletonHero').style.display='none';
  document.getElementById('skeletonChart').style.display='none';

  /* ── extrair todos os campos do meta ─────────────────────────── */
  const ticker   = meta.symbol||TICKER;
  const name     = meta.shortName||meta.longName||ticker;
  const exchange = meta.exchangeName||meta.fullExchangeName||'';
  const type     = meta.instrumentType||meta.quoteType||'';
  const currency = meta.currency||'USD';
  const s        = sym(currency);
  const mktState = meta.marketState||'CLOSED';

  const price     = meta.regularMarketPrice;
  const prevClose = meta.chartPreviousClose??meta.regularMarketPreviousClose??price;
  const change    = price-prevClose;
  const changePct = prevClose?(change/prevClose)*100:0;
  const open      = meta.regularMarketOpen??price;
  const high      = meta.regularMarketDayHigh??price;
  const low       = meta.regularMarketDayLow??price;
  const vol       = fmtBig(meta.regularMarketVolume||0);
  const w52h      = meta.fiftyTwoWeekHigh??price;
  const w52l      = meta.fiftyTwoWeekLow??price;

  /* fundamentais — todos vêm do mesmo meta do /v8/finance/chart */
  const mcap   = fmtBig(meta.marketCap??null);
  /* P/E: trailingPE directo no meta (alguns tickers) ou calculado */
  const pe     = (()=>{
    const v=meta.trailingPE??null;
    if(v&&v>0) return fmtNum(v);
    /* fallback: price / epsTrailingTwelveMonths */
    const eps=meta.epsTrailingTwelveMonths??null;
    if(eps&&eps>0) return fmtNum(price/eps);
    return '\u2014';
  })();
  const eps    = (()=>{const v=meta.epsTrailingTwelveMonths??null;return v!=null?s+fmtNum(v):'\u2014';})();
  const beta   = (()=>{const v=meta.beta??null;return v!=null?fmtNum(v):'\u2014';})();
  const div    = (()=>{
    const rate=meta.dividendRate??null;
    const yld=meta.dividendYield??null;  /* já em % no meta — ex: 1.42 */
    if(!rate&&!yld) return '\u2014';
    const parts=[];
    if(rate&&rate>0) parts.push(s+fmtNum(rate));
    if(yld&&yld>0) parts.push('('+fmtNum(yld)+'%)');
    return parts.join(' ')||'\u2014';
  })();
  const avgVol = fmtBig(meta.averageDailyVolume3Month??meta.averageVolume??null);

  const up=change>=0, sign=up?'+':'', arrow=up?'\u25b2':'\u25bc', cls=up?'up':'down';
  const w52p=w52h>w52l?Math.round((price-w52l)/(w52h-w52l)*100):50;
  const typeLabel=({'EQUITY':'Ação','ETF':'ETF','MUTUALFUND':'Fundo','INDEX':'Índice','CRYPTOCURRENCY':'Cripto','FUTURE':'Futuro'})[type]||type;

  document.title='FundScope \u2014 '+ticker;

  document.getElementById('stockContent').innerHTML=`
  <div class="stock-hero">
    <div class="stock-identity">
      <div class="stock-logo-wrap" id="logoWrap">${esc(ticker.slice(0,2))}</div>
      <div>
        <div class="stock-ticker">${esc(ticker)}</div>
        <div class="stock-name">${esc(name)}</div>
        <div class="stock-exchange">${esc(exchange)}${typeLabel?' &middot; '+esc(typeLabel):''}</div>
      </div>
    </div>
    <div class="stock-price-block">
      <div class="stock-price">${s}${fmtNum(price)}</div>
      <div class="stock-change ${cls}">${arrow} ${sign}${s}${fmtNum(Math.abs(change))} (${sign}${fmtNum(changePct)}%)</div>
      <div class="source-badge"><span class="live-dot"></span> Yahoo Finance &middot; ${esc(currency)} &middot; ${mktState==='REGULAR'?'Mercado aberto':'Mercado fechado'}</div>
    </div>
  </div>
  <div class="chart-card">
    <div id="periodTabs" class="period-tabs">
      <button class="period-tab active" data-p="1D">1D</button>
      <button class="period-tab" data-p="1S">1S</button>
      <button class="period-tab" data-p="1M">1M</button>
      <button class="period-tab" data-p="1A">1A</button>
      <button class="period-tab" data-p="3A">3A</button>
    </div>
    <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
  </div>
  <div class="grid-3">
    <div class="card"><div class="card-title">Abertura</div><div class="kpi-value">${s}${fmtNum(open)}</div><div class="kpi-label">Pre\u00e7o de abertura</div></div>
    <div class="card"><div class="card-title">M\u00e1x / M\u00edn hoje</div><div class="kpi-value">${s}${fmtNum(high)}</div><div class="kpi-sub">M\u00edn: ${s}${fmtNum(low)}</div></div>
    <div class="card"><div class="card-title">Volume</div><div class="kpi-value">${vol}</div><div class="kpi-label">M\u00e9dia 3M: ${avgVol}</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Estat\u00edsticas</div>
      <div class="stat-row">
        <div class="stat-item"><span class="stat-label">Fecho anterior</span><span class="stat-value">${s}${fmtNum(prevClose)}</span></div>
        <div class="stat-item"><span class="stat-label">Cap. mercado</span><span class="stat-value">${mcap}</span></div>
        <div class="stat-item"><span class="stat-label">P/E (trailing)</span><span class="stat-value">${pe}</span></div>
        <div class="stat-item"><span class="stat-label">EPS (trailing)</span><span class="stat-value">${eps}</span></div>
        <div class="stat-item"><span class="stat-label">Dividendo</span><span class="stat-value">${div}</span></div>
        <div class="stat-item"><span class="stat-label">Beta</span><span class="stat-value">${beta}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Intervalo 52 semanas</div>
      <div class="stat-row" style="margin-bottom:var(--space-4);">
        <div class="stat-item"><span class="stat-label">M\u00e1ximo 52s</span><span class="stat-value">${s}${fmtNum(w52h)}</span></div>
        <div class="stat-item"><span class="stat-label">M\u00ednimo 52s</span><span class="stat-value">${s}${fmtNum(w52l)}</span></div>
      </div>
      <div class="range-bar-wrap">
        <div class="range-labels"><span>${s}${fmtNum(w52l)}</span><span>${s}${fmtNum(w52h)}</span></div>
        <div class="range-track">
          <div class="range-fill" style="width:${w52p}%;"></div>
          <div class="range-thumb" style="left:${w52p}%;"></div>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('stockContent').style.display='block';

  /* gráfico com dados do range=1y já carregado */
  renderChart(price,'1A',up,histPts);
  /* marca 1A como activo */
  document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-p="1A"]').classList.add('active');

  /* troca de período */
  const rangeMap={"1D":"1d","1S":"5d","1M":"1mo","1A":"1y","3A":"3y"};
  const intMap  ={"1D":"5m","1S":"1h","1M":"1d","1A":"1wk","3A":"1wk"};
  document.getElementById('periodTabs').addEventListener('click',e=>{
    const btn=e.target.closest('[data-p]');if(!btn)return;
    document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    const p=btn.dataset.p;
    /* usa histPts de 1y se o período for 1A */
    if(p==='1A'){renderChart(price,'1A',up,histPts);return;}
    renderChart(price,p,up,null); /* placeholder imediato */
    fetchHistory(ticker,rangeMap[p],intMap[p]).then(pts=>renderChart(price,p,up,pts));
  });

  /* logo via clearbit — silencioso se falhar */
  const img=new Image();
  img.onload=()=>{const w=document.getElementById('logoWrap');if(w){w.innerHTML='';w.appendChild(img);}};
  img.onerror=()=>{};
  /* usa apenas a parte base do ticker sem sufixo de bolsa */
  img.src='https://logo.clearbit.com/'+ticker.toLowerCase().replace(/[^a-z0-9]/g,'').replace(/^([a-z]+).*/,'$1')+'.com';
}

/* ── ERRO ─────────────────────────────────────────────────────────── */
function renderError(ticker,msg){
  document.getElementById('skeletonHero').style.display='none';
  document.getElementById('skeletonChart').style.display='none';
  const c=document.getElementById('stockContent');
  c.innerHTML=`<div class="error-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-faint)" stroke-width="1.5" style="margin:0 auto var(--space-4)"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <h2>N\u00e3o foi poss\u00edvel carregar "${esc(ticker)}"</h2>
    <p>Verifica se o ticker existe no Yahoo Finance.<br>Exemplos: <b>AAPL</b>, <b>ASML.AS</b>, <b>VOO</b>, <b>NOVO-B.CO</b></p>
    <div class="error-detail">${esc(msg)}</div>
    <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;margin-top:24px;padding:10px 20px;background:var(--color-primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Voltar \u00e0 pesquisa
    </a>
  </div>`;
  c.style.display='block';
}

/* ── ENTRY POINT ──────────────────────────────────────────────────── */
if(!TICKER){
  renderError('?','Nenhum ticker na URL. Exemplo: stock.html?ticker=AAPL');
}else{
  fetchAll(TICKER)
    .then(res=>{
      /* res é o result[0] do chart — meta + timestamps + indicators */
      const meta=res.meta;
      /* extrair pontos históricos do próprio response (range=1y) */
      const times=res.timestamp||[];
      const closes=res.indicators?.quote?.[0]?.close||[];
      const histPts=times.map((t,i)=>({t,v:closes[i]})).filter(p=>p.v!=null&&!isNaN(p.v));
      renderStock(meta, histPts.length>1?histPts:null);
    })
    .catch(err=>renderError(TICKER,err.message));
}
</script>
</body>
</html>
