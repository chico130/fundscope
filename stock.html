<head>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,0.06);--shadow-md:0 4px 12px rgba(40,37,29,0.08);--shadow-lg:0 12px 32px rgba(40,37,29,0.12);
      --transition:180ms cubic-bezier(0.16,1,0.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"] {
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --shadow-sm:0 1px 2px rgba(0,0,0,0.25);--shadow-md:0 4px 12px rgba(0,0,0,0.35);--shadow-lg:0 12px 32px rgba(0,0,0,0.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);}
    .back-btn:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .page{max-width:1100px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16);}
    .stock-hero{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-6);margin-bottom:var(--space-8);}
    .stock-identity{display:flex;align-items:center;gap:var(--space-4);}
    .stock-logo-wrap{width:56px;height:56px;border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--color-primary);flex-shrink:0;}
    .stock-ticker{font-size:var(--text-xl);font-weight:700;letter-spacing:-0.02em;}
    .stock-name{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px;}
    .stock-exchange{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .stock-price-block{text-align:right;}
    .stock-price{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
    .stock-change{display:inline-flex;align-items:center;gap:4px;font-size:var(--text-sm);font-weight:600;padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);margin-top:var(--space-2);font-variant-numeric:tabular-nums;}
    .stock-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .stock-change.down{background:var(--color-notification-bg);color:var(--color-notification);}
    .last-updated{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-2);}
    .period-tabs{display:flex;gap:var(--space-1);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:3px;margin-bottom:var(--space-5);width:fit-content;}
    .period-tab{padding:var(--space-2) var(--space-4);border-radius:calc(var(--radius-lg) - 3px);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);transition:all var(--transition);}
    .period-tab.active{background:var(--color-bg);color:var(--color-text);box-shadow:var(--shadow-sm);}
    .period-tab:hover:not(.active){color:var(--color-text);}
    .chart-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);padding:var(--space-6);margin-bottom:var(--space-6);box-shadow:var(--shadow-sm);}
    .chart-wrap{position:relative;height:280px;}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-5);margin-bottom:var(--space-6);}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-6);}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);}
    .card-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--color-text-faint);margin-bottom:var(--space-4);}
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}
    .kpi-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px;}
    .kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-faint);margin-top:2px;}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-primary),var(--color-success));}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}
    .about-text{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.7;}
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .error-state{text-align:center;padding:var(--space-16);color:var(--color-text-muted);}
    .error-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);}
    .footer{padding:var(--space-6);text-align:center;font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);margin-top:var(--space-8);}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.stock-hero{flex-direction:column;gap:var(--space-4);}.stock-price-block{text-align:left;}.page{padding:var(--space-6) var(--space-4) var(--space-12);}}
    @media(max-width:480px){.grid-3{grid-template-columns:1fr;}}
  </style>
</head>

    function generatePriceData(basePrice,points,volatility){
      const data=[];let price=basePrice*(1-volatility*0.5);
      for(let i=0;i<points;i++){price+=(Math.random()-0.48)*basePrice*volatility;price=Math.max(price,basePrice*0.7);data.push(parseFloat(price.toFixed(2)));}
      data[data.length-1]=basePrice;return data;
    }
    function generateLabels(period){
      const now=new Date(),labels=[];
      if(period==='1D'){for(let h=9;h<=16;h++){for(let m=0;m<60;m+=15){if(h===16&&m>0)break;labels.push(`${h}:${m.toString().padStart(2,'0')}`);}}}
      else if(period==='1S'){for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('pt',{weekday:'short'}));}}
      else if(period==='1M'){for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('pt',{day:'numeric',month:'short'}));}}
      else{for(let i=11;i>=0;i--){const d=new Date(now);d.setMonth(d.getMonth()-i);labels.push(d.toLocaleDateString('pt',{month:'short',year:'2-digit'}));}}
      return labels;
    }

      const pts={'1D':29,'1S':7,'1M':30,'1A':12}[period]||30;
      const vol={'1D':0.003,'1S':0.012,'1M':0.025,'1A':0.08}[period]||0.02;
      const data=generatePriceData(stock.price,pts,vol);
      const labels=generateLabels(period);
      const color=isUp?'#437a22':'#a13544';
      if(chartInstance)chartInstance.destroy();
      chartInstance=new Chart(canvas,{
        type:'line',
        data:{labels:labels.slice(0,data.length),datasets:[{data,borderColor:color,borderWidth:2,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:color,fill:true,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);g.addColorStop(0,isUp?'rgba(67,122,34,0.18)':'rgba(161,53,68,0.18)');g.addColorStop(1,'rgba(0,0,0,0)');return g;},tension:0.4}]},
        options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--color-surface-2)',titleColor:'var(--color-text-muted)',bodyColor:'var(--color-text)',borderColor:'var(--color-border)',borderWidth:1,padding:10,callbacks:{label:ctx=>` $${ctx.raw.toFixed(2)}`}}},scales:{x:{grid:{display:false},ticks:{color:'#bab9b4',font:{size:11},maxTicksLimit:6}},y:{position:'right',grid:{color:'rgba(180,178,172,0.12)'},ticks:{color:'#bab9b4',font:{size:11},callback:v=>'$'+v.toFixed(0)}}}}
      });
    }

    function renderStock(ticker){
      const stock=STOCKS[ticker.toUpperCase()];
      const content=document.getElementById('stockContent');
      if(!stock){
        content.innerHTML=`<div class="error-state"><h2>Ticker não encontrado</h2><p>Não encontrámos dados para "<strong>${ticker}</strong>".</p><a href="index.html" class="back-btn" style="margin-top:var(--space-6);justify-content:center">← Voltar ao início</a></div>`;
        return;
      }
      document.title=`FundScope — ${ticker.toUpperCase()}`;
      const isUp=stock.changePct>=0,sign=isUp?'+':'',arrow=isUp?'▲':'▼';
      const rangePos=Math.round(((stock.price-stock.week52Low)/(stock.week52High-stock.week52Low))*100);
      const initials=ticker.slice(0,2).toUpperCase();
      content.innerHTML=`
        <div class="stock-hero">
          <div class="stock-identity">
            <div class="stock-logo-wrap" style="color:${stock.color||'var(--color-primary)'}">${initials}</div>
            <div>
              <div class="stock-ticker">${ticker.toUpperCase()}</div>
              <div class="stock-name">${stock.name}</div>
              <div class="stock-exchange">${stock.exchange} · ${stock.type} · ${stock.sector}</div>
            </div>
          </div>
          <div class="stock-price-block">
            <div class="stock-price">$${stock.price.toFixed(2)}</div>
            <div><span class="stock-change ${isUp?'up':'down'}">${arrow} ${sign}$${Math.abs(stock.change).toFixed(2)} (${sign}${stock.changePct.toFixed(2)}%)</span></div>
            <div class="last-updated">Hoje · Fecho anterior: $${stock.prevClose.toFixed(2)}</div>
          </div>
        </div>
        <div class="period-tabs" id="periodTabs">
          <button class="period-tab active" data-period="1D">1D</button>
          <button class="period-tab" data-period="1S">1S</button>
          <button class="period-tab" data-period="1M">1M</button>
          <button class="period-tab" data-period="1A">1A</button>
        </div>
        <div class="chart-card"><div class="chart-wrap"><canvas id="priceChart"></canvas></div></div>
        <div class="grid-3">
          <div class="card"><div class="kpi-label">Abertura</div><div class="kpi-value">$${stock.open.toFixed(2)}</div><div class="kpi-sub">Fecho anterior: $${stock.prevClose.toFixed(2)}</div></div>
          <div class="card"><div class="kpi-label">Máximo do dia</div><div class="kpi-value" style="color:var(--color-success)">$${stock.high.toFixed(2)}</div><div class="kpi-sub">Mínimo: $${stock.low.toFixed(2)}</div></div>
          <div class="card"><div class="kpi-label">Volume</div><div class="kpi-value">${stock.volume}</div><div class="kpi-sub">Média: ${stock.avgVolume}</div></div>
        </div>
        <div class="grid-2">
          <div class="card"><div class="card-title">Estatísticas</div><div class="stat-row">
            <div class="stat-item"><span class="stat-label">Capitalização</span><span class="stat-value">${stock.marketCap}</span></div>
            <div class="stat-item"><span class="stat-label">P/E Ratio</span><span class="stat-value">${stock.pe}</span></div>
            <div class="stat-item"><span class="stat-label">EPS</span><span class="stat-value">${stock.eps}</span></div>
            <div class="stat-item"><span class="stat-label">Dividendo</span><span class="stat-value">${stock.dividend}</span></div>
            <div class="stat-item"><span class="stat-label">Beta</span><span class="stat-value">${stock.beta}</span></div>
          </div></div>
          <div class="card"><div class="card-title">Intervalo 52 Semanas</div>
            <div class="range-bar-wrap">
              <div class="range-labels"><span>Mín $${stock.week52Low.toFixed(2)}</span><span>Máx $${stock.week52High.toFixed(2)}</span></div>
              <div class="range-track"><div class="range-fill" style="width:${rangePos}%"></div><div class="range-thumb" style="left:${rangePos}%"></div></div>
              <div style="text-align:center;margin-top:var(--space-3);font-size:var(--text-xs);color:var(--color-text-muted)">Atual <strong>$${stock.price.toFixed(2)}</strong> — ${rangePos}% do intervalo anual</div>
            </div>
            <div class="stat-row" style="margin-top:var(--space-5)">
              <div class="stat-item"><span class="stat-label">Máx. 52 semanas</span><span class="stat-value" style="color:var(--color-success)">$${stock.week52High.toFixed(2)}</span></div>
              <div class="stat-item"><span class="stat-label">Mín. 52 semanas</span><span class="stat-value" style="color:var(--color-notification)">$${stock.week52Low.toFixed(2)}</span></div>
            </div>
          </div>
        </div>
        <div class="card"><div class="card-title">Sobre</div><p class="about-text">${stock.about}</p></div>
      `;
      requestAnimationFrame(()=>renderChart(ticker.toUpperCase(),'1D',isUp));
      document.getElementById('periodTabs').addEventListener('click',e=>{
        const btn=e.target.closest('.period-tab');if(!btn)return;
        document.querySelectorAll('.period-tab').forEach(t=>t.classList.remove('active'));
        btn.classList.add('active');
        renderChart(ticker.toUpperCase(),btn.dataset.period,isUp);
      });
    }

    const params=new URLSearchParams(location.search);
    const ticker=params.get('ticker')||params.get('t')||'';
    if(ticker){renderStock(ticker);}
    else{document.getElementById('stockContent').innerHTML='<div class="error-state"><h2>Nenhum ticker especificado</h2><p>Volta à página principal e pesquisa uma ação ou ETF.</p><a href="index.html" class="back-btn" style="margin-top:var(--space-6);justify-content:center">← Voltar ao início</a></div>';}
  </script>
</body>
</html>
