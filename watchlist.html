<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundScope &mdash; Watchlist</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-error:#a13544;--color-error-bg:#f8e8ea;
      --color-warn:#8a6200;--color-warn-bg:#fef3c7;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-error:#dd6974;--color-error-bg:#2e1015;
      --color-warn:#d4a017;--color-warn-bg:#2a2000;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .header-right{display:flex;align-items:center;gap:var(--space-2);}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .back-btn{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);}
    .back-btn:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .page{max-width:900px;margin:0 auto;padding:var(--space-8) var(--space-6) var(--space-16);}
    .page-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;margin-bottom:var(--space-2);}
    .page-sub{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-8);}
    .empty-state{text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
    .empty-state svg{margin:0 auto var(--space-4);display:block;opacity:.3;}
    .empty-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);}
    .empty-state a{display:inline-flex;align-items:center;gap:8px;margin-top:var(--space-6);padding:10px 20px;background:var(--color-primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;transition:background var(--transition);}
    .empty-state a:hover{background:var(--color-primary-hover);}
    .wl-list{display:flex;flex-direction:column;gap:var(--space-4);}
    .wl-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow var(--transition);}
    .wl-card:hover{box-shadow:var(--shadow-md);}
    .wl-card-header{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-5);cursor:pointer;user-select:none;}
    .wl-logo{width:44px;height:44px;border-radius:var(--radius-lg);background:var(--color-surface-offset);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--color-primary);flex-shrink:0;overflow:hidden;}
    .wl-logo svg{width:100%;height:100%;display:block;border-radius:var(--radius-lg);}
    .wl-identity{flex:1;min-width:0;}
    .wl-ticker{font-size:var(--text-base);font-weight:700;letter-spacing:-.01em;}
    .wl-name{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .wl-price-block{text-align:right;flex-shrink:0;}
    .wl-price{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;}
    .wl-change{display:inline-flex;align-items:center;gap:3px;font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-full);margin-top:3px;font-variant-numeric:tabular-nums;}
    .wl-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .wl-change.down{background:var(--color-error-bg);color:var(--color-error);}
    .wl-actions{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0;}
    .btn-remove{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-faint);transition:color var(--transition),background var(--transition);}
    .btn-remove:hover{color:var(--color-error);background:var(--color-error-bg);}
    .btn-expand{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition),transform var(--transition);}
    .btn-expand:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .btn-expand.open{transform:rotate(180deg);}
    .wl-expand{display:none;border-top:1px solid var(--color-divider);}
    .wl-expand.open{display:block;}
    .mini-chart-wrap{position:relative;height:68px;margin:var(--space-3) var(--space-5) var(--space-2);}
    .mini-chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
    .wl-tabs{display:flex;gap:0;border-bottom:1px solid var(--color-divider);padding:0 var(--space-5);}
    .wl-tab{padding:var(--space-3) var(--space-4);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);border-bottom:2px solid transparent;transition:color var(--transition),border-color var(--transition);cursor:pointer;}
    .wl-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);}
    .wl-tab:hover:not(.active){color:var(--color-text);}
    .wl-tab-panel{display:none;padding:var(--space-5);}
    .wl-tab-panel.active{display:block;}
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--color-divider);padding-bottom:var(--space-2);}
    .stat-item:last-child{border-bottom:none;padding-bottom:0;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}
    .news-list{display:flex;flex-direction:column;gap:var(--space-3);}
    .news-item{display:flex;flex-direction:column;gap:4px;padding:var(--space-3);border-radius:var(--radius-lg);background:var(--color-surface-offset);transition:background var(--transition);}
    .news-item:hover{background:var(--color-primary-highlight);}
    .news-headline{font-size:var(--text-sm);font-weight:500;color:var(--color-text);line-height:1.4;}
    .news-meta{font-size:var(--text-xs);color:var(--color-text-faint);}
    .target-block{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4);margin-bottom:var(--space-5);}
    .target-item{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-4);text-align:center;}
    .target-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:4px;}
    .target-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;}
    .target-value.bull{color:var(--color-success);}
    .target-value.bear{color:var(--color-error);}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-error),var(--color-success));width:100%;}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}
    .ai-section{margin-bottom:var(--space-5);}
    .ai-section-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:var(--space-3);display:flex;align-items:center;gap:6px;}
    .ai-section-title.good{color:var(--color-success);}
    .ai-section-title.bad{color:var(--color-error);}
    .ai-section-title.watch{color:var(--color-warn);}
    .ai-points{display:flex;flex-direction:column;gap:var(--space-2);}
    .ai-point{font-size:var(--text-sm);color:var(--color-text);background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);line-height:1.5;}
    .ai-resumo{font-size:var(--text-sm);color:var(--color-text-muted);font-style:italic;background:var(--color-primary-highlight);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);line-height:1.6;}
    .ai-loading{display:flex;align-items:center;gap:10px;color:var(--color-text-muted);font-size:var(--text-sm);padding:var(--space-6) 0;}
    .spinner{width:18px;height:18px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:600px){.target-block{grid-template-columns:1fr 1fr;}.page{padding:var(--space-6) var(--space-4) var(--space-16);}}
  </style>
</head>
<body>
<header class="header">
  <a href="index.html" class="logo">
    <svg class="logo-svg" viewBox="0 0 28 28" fill="none">
      <ellipse cx="14" cy="15" rx="9" ry="7.5" fill="var(--color-primary)" opacity="0.18"/>
      <ellipse cx="14" cy="14.5" rx="8" ry="6.5" fill="var(--color-primary)"/>
      <ellipse cx="14" cy="18.5" rx="3.5" ry="2.5" fill="var(--color-primary-hover)"/>
      <circle cx="12.8" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
      <circle cx="15.2" cy="18.6" r="0.8" fill="var(--color-bg)" opacity="0.7"/>
      <circle cx="10.8" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
      <circle cx="11.1" cy="12.8" r="0.5" fill="var(--color-text)"/>
      <circle cx="17.2" cy="13" r="1.2" fill="var(--color-bg)" opacity="0.9"/>
      <circle cx="17.5" cy="12.8" r="0.5" fill="var(--color-text)"/>
      <ellipse cx="7" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
      <ellipse cx="21" cy="11" rx="2.2" ry="2.8" fill="var(--color-primary)"/>
      <path d="M11.5 16.8 Q14 18.5 16.5 16.8" stroke="var(--color-bg)" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </svg>
    FundScope
  </a>
  <div class="header-right">
    <a href="index.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Pesquisa
    </a>
    <button class="btn-icon" id="themeToggle" aria-label="Alternar tema">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<main class="page">
  <h1 class="page-title">Watchlist</h1>
  <p class="page-sub">Clica num card para ver detalhes, notícias, price target e análise AI dos earnings.</p>
  <div class="wl-list" id="wlList"></div>
</main>

<script>
const WORKER='https://stocks.araujo-francisco-fernandes.workers.dev';

(function(){
  const btn=document.getElementById('themeToggle'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const icons={
    light:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
    dark:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  };
  if(btn){btn.innerHTML=icons[d];btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';r.setAttribute('data-theme',d);btn.innerHTML=icons[d];});}
})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtNum(n,dec=2){if(n==null||isNaN(n))return '—';return Number(n).toFixed(dec);}
function fmtLarge(n){if(!n||isNaN(n))return '—';if(n>=1e12)return '$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return '$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return '$'+(n/1e6).toFixed(2)+'M';return '$'+n.toFixed(0);}
function fmtVol(n){if(!n||isNaN(n))return '—';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return String(n);}
function rawVal(obj){ if(obj!==null&&typeof obj==='object'&&'raw' in obj)return obj.raw; return obj??null; }

function tickerColor(ticker){
  const palette=[['#01696f','#e8f5f5'],['#437a22','#eaf3e2'],['#006494','#e0f0f8'],['#7a39bb','#f0eaf8'],['#a13544','#fbeaec'],['#da7101','#fdf0e0'],['#d19900','#fdf6e0'],['#0c4e54','#e0f2f4'],['#2e5c10','#ecf5e5'],['#0b3751','#dceef8'],['#431673','#ede0f5'],['#4b2614','#f5ede8']];
  const clean = String(ticker||'').toUpperCase();
  let h=0; for(let i=0;i<clean.length;i++) h=(h*31+clean.charCodeAt(i))>>>0; return palette[h%palette.length];
}
function makeLogoSVG(ticker){
  const clean = String(ticker||'').replace(/[^A-Z0-9]/gi,'').toUpperCase();
  const label = clean.slice(0,4) || String(ticker||'').slice(0,4).toUpperCase();
  const [bg,fg]=tickerColor(label);
  const fs=label.length<=2?18:label.length===3?13:11;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" aria-label="${esc(ticker)} logo"><rect width="44" height="44" rx="8" fill="${bg}"/><text x="22" y="22" dominant-baseline="central" text-anchor="middle" font-family="Inter,Helvetica Neue,sans-serif" font-weight="700" font-size="${fs}" fill="${fg}" letter-spacing="-0.5">${esc(label)}</text></svg>`;
}

function normalizeWatchlist(items){
  const arr=Array.isArray(items)?items:[];
  const seen=new Set();
  const out=[];
  for(const item of arr){
    const t=String(item||'').trim().toUpperCase();
    if(!t||seen.has(t)) continue;
    seen.add(t);
    out.push(t);
  }
  return out;
}
function getWatchlist(){
  try{
    const normalized=normalizeWatchlist(JSON.parse(localStorage.getItem('fs_watchlist')||'[]'));
    localStorage.setItem('fs_watchlist',JSON.stringify(normalized));
    return normalized;
  }catch{return[];}
}
function saveWatchlist(arr){localStorage.setItem('fs_watchlist',JSON.stringify(normalizeWatchlist(arr)));}
function removeFromWatchlist(ticker){saveWatchlist(getWatchlist().filter(t=>t!==ticker.toUpperCase()));}

async function fetchWithTimeout(url,ms=12000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(tid));
}
async function fetchQuote(ticker){
  try{
    const r=await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=price,summaryDetail,defaultKeyStatistics`,12000);
    if(!r.ok)return null;
    const j=await r.json();
    if(j?.quoteSummary?.error)return null;
    return j?.quoteSummary?.result?.[0]||null;
  }catch{return null;}
}
async function fetchProfile(ticker){
  try{
    const r=await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=summaryProfile`,8000);
    if(!r.ok)return null;
    const j=await r.json();
    if(j?.quoteSummary?.error)return null;
    return j?.quoteSummary?.result?.[0]?.summaryProfile||null;
  }catch{return null;}
}
function tryLoadClearbitLogo(ticker, profile, wrapId){
  const website=profile?.website;
  if(!website)return;
  try{
    const domain=new URL(website).hostname.replace(/^www\./,'');
    const img=new Image();
    img.onload=()=>{
      const wrap=document.getElementById(wrapId);
      if(wrap)wrap.innerHTML=`<img src="https://logo.clearbit.com/${domain}" alt="${ticker}" style="width:100%;height:100%;object-fit:contain;">`;
    };
    img.onerror=()=>{};
    img.src=`https://logo.clearbit.com/${domain}`;
  }catch(e){}
}
async function fetchAnalysts(ticker){
  try{
    const r=await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=financialData,recommendationTrend`,12000);
    if(!r.ok)return null;
    const j=await r.json();
    if(j?.quoteSummary?.error)return null;
    const res = j?.quoteSummary?.result?.[0] || {};
    return {
      financialData: res.financialData || null,
      recommendationTrend: res.recommendationTrend || null
    };
  }catch{return null;}
}
async function fetchChart(ticker){
  try{
    const r=await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&range=5d&interval=1h`);
    if(!r.ok)return[];
    const j=await r.json();
    const result=j?.chart?.result?.[0];
    if(!result)return[];
    const ts=result.timestamp||[],cl=result.indicators?.quote?.[0]?.close||[],pts=[];
    for(let i=0;i<ts.length;i++){const v=cl[i];if(v!=null&&!isNaN(v))pts.push({t:ts[i],v:parseFloat(v.toFixed(4))});}
    return pts;
  }catch{return[];}
}
async function fetchNews(ticker){
  try{
    const r=await fetchWithTimeout('news.json',6000);
    if(!r.ok)return[];
    const j=await r.json();
    const articles=Array.isArray(j?.articles)?j.articles:[];
    const t = String(ticker||'').toUpperCase();

    // regex com fronteiras de palavra para evitar matches tipo "O" em "Stock"
    const regex = new RegExp(`\\b${t}\\b`, 'i');

    const withImpact = articles.filter(a => {
      const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : [];
      return tickers.includes(t);
    });

    const textMatches = articles.filter(a => {
      if(!a) return false;
      const title   = String(a.title || '').toUpperCase();
      const summary = String(a.summary || '').toUpperCase();
      const content = String(a.content || '').toUpperCase();
      const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : [];
      if(tickers.includes(t)) return false;
      return regex.test(title) || regex.test(summary) || regex.test(content);
    });

    const merged = [...withImpact, ...textMatches];
    merged.sort((a,b)=>{
      const da=a.publishedAt?new Date(a.publishedAt).getTime():0;
      const db=b.publishedAt?new Date(b.publishedAt).getTime():0;
      return db-da;
    });
    return merged.slice(0,6).map(a=>({
      headline:a.title||'Sem título',
      source:a.source||'Fonte',
      datetime: Math.floor(new Date(a.publishedAt||Date.now()).getTime()/1000),
      url:a.url||'#'
    }));
  }catch{return[];}
}
async function fetchEarningsAI(ticker){
  try{
    const r=await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&action=earnings-ai`,25000);
    if(r.ok){const j=await r.json();if(j)return j;}
  }catch{}
  try{
    const r=await fetchWithTimeout('data/beta/earnings_ai.json',6000);
    if(!r.ok)return null;
    const j=await r.json();
    return j?.[ticker]||null;
  }catch{return null;}
}

const _charts={};
function renderMiniChart(wrapperId,pts){
  const wrap=document.getElementById(wrapperId);
  if(!wrap||pts.length<2)return;
  if(_charts[wrapperId]){_charts[wrapperId].destroy();delete _charts[wrapperId];}
  wrap.innerHTML='';
  const cvs=document.createElement('canvas');
  wrap.appendChild(cvs);
  const first=pts[0].v,last=pts[pts.length-1].v,up=last>=first;
  const color=up?'#437a22':'#a13544';
  cvs.width=wrap.offsetWidth||600;
  cvs.height=wrap.offsetHeight||68;
  _charts[wrapperId]=new Chart(cvs,{type:'line',data:{labels:pts.map(()=>''),datasets:[{data:pts.map(p=>p.v),borderColor:color,borderWidth:1.5,pointRadius:0,tension:.3,fill:false}]},options:{responsive:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
}

function buildStatsHTML(stats){
  const p=stats?.price||{},s=stats?.summaryDetail||{},k=stats?.defaultKeyStatistics||{};
  const pe=rawVal(s.trailingPE)??rawVal(k.trailingPE);
  const eps=rawVal(k.trailingEps);
  const beta=rawVal(k.beta)??rawVal(s.beta);
  const mktCap=rawVal(p.marketCap);
  const w52h=rawVal(s.fiftyTwoWeekHigh),w52l=rawVal(s.fiftyTwoWeekLow);
  const divRate=rawVal(s.dividendRate),divYield=rawVal(s.dividendYield);
  let divStr='—';
  if(divRate&&divRate>0){const pct=divYield?(divYield<1?divYield*100:divYield):null;divStr='$'+divRate.toFixed(2)+(pct?' ('+pct.toFixed(2)+'%)':'');}
  return `<div class="stat-row">
    <div class="stat-item"><span class="stat-label">Cap. Mercado</span><span class="stat-value">${fmtLarge(mktCap)}</span></div>
    <div class="stat-item"><span class="stat-label">P/E (trailing)</span><span class="stat-value">${pe!=null?parseFloat(Number(pe).toFixed(1)):'—'}</span></div>
    <div class="stat-item"><span class="stat-label">EPS (trailing)</span><span class="stat-value">${eps!=null?'$'+parseFloat(Number(eps).toFixed(2)):'—'}</span></div>
    <div class="stat-item"><span class="stat-label">Beta</span><span class="stat-value">${beta!=null?parseFloat(Number(beta).toFixed(2)):'—'}</span></div>
    <div class="stat-item"><span class="stat-label">Dividendo</span><span class="stat-value">${divStr}</span></div>
    <div class="stat-item"><span class="stat-label">Máx 52s</span><span class="stat-value">${w52h?'$'+fmtNum(w52h):'—'}</span></div>
    <div class="stat-item"><span class="stat-label">Mínimo 52s</span><span class="stat-value">${w52l?'$'+fmtNum(w52l):'—'}</span></div>
    <div class="stat-item"><span class="stat-label">Volume médio</span><span class="stat-value">${fmtVol(rawVal(s.averageVolume))}</span></div>
  </div>`;
}
function buildNewsHTML(news){
  if(!news||!news.length)return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem notícias recentes.</p>';
  return '<div class="news-list">'+news.map(n=>{
    const date=new Date(n.datetime*1000).toLocaleDateString('pt',{day:'2-digit',month:'short'});
    return `<a class="news-item" href="${esc(n.url)}" target="_blank" rel="noopener noreferrer"><span class="news-headline">${esc(n.headline)}</span><span class="news-meta">${esc(n.source)} &middot; ${date}</span></a>`;
  }).join('')+'</div>';
}
function buildTargetsHTML(analystData,currentPrice){
  if(!analystData || !analystData.financialData)return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados de analistas.</p>';
  const fd = analystData.financialData;
  const targetMean=rawVal(fd.targetMeanPrice);
  const targetMedian=rawVal(fd.targetMedianPrice) ?? rawVal(fd.targetMeanPrice);
  const targetHigh=rawVal(fd.targetHighPrice);
  const targetLow=rawVal(fd.targetLowPrice);
  const recKey=fd.recommendationKey||'';
  const numAnal=rawVal(fd.numberOfAnalystOpinions);
  if(targetMean==null && targetMedian==null && targetHigh==null && targetLow==null && !recKey)
    return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados de analistas disponíveis.</p>';
  const recLabels={'strong_buy':'Compra Forte','buy':'Comprar','hold':'Manter','sell':'Vender','strong_sell':'Venda Forte','':'—'};
  const recColors={'strong_buy':'var(--color-success)','buy':'#8ab74a','hold':'var(--color-text-muted)','sell':'#dd8a6a','strong_sell':'var(--color-error)','':'var(--color-text-faint)'};
  const recLabel=recLabels[recKey]??recKey;
  const recColor=recColors[recKey]??'var(--color-text-faint)';
  const upside=(targetMean!=null&&currentPrice)?((targetMean-currentPrice)/currentPrice*100):null;
  const upsideStr=upside!=null?`<div style="font-size:var(--text-xs);color:${upside>=0?'var(--color-success)':'var(--color-error)'};margin-top:4px;">${upside>=0?'+':''}${upside.toFixed(1)}% vs atual</div>`:'';
  let html=`<div class="target-block">
    <div class="target-item"><div class="target-label">Alvo Médio</div><div class="target-value">${targetMean!=null?'$'+Number(targetMean).toFixed(2):'—'}</div>${upsideStr}</div>
    <div class="target-item"><div class="target-label">Alvo Mediano</div><div class="target-value">${targetMedian!=null?'$'+Number(targetMedian).toFixed(2):'—'}</div></div>
    <div class="target-item"><div class="target-label">Alvo Máximo</div><div class="target-value bull">${targetHigh!=null?'$'+Number(targetHigh).toFixed(2):'—'}</div></div>
    <div class="target-item"><div class="target-label">Alvo Mínimo</div><div class="target-value bear">${targetLow!=null?'$'+Number(targetLow).toFixed(2):'—'}</div></div>
  </div>`;
  html+=`<div class="stat-row" style="margin-bottom:var(--space-4);">
    <div class="stat-item"><span class="stat-label">Consenso</span><span class="stat-value" style="color:${recColor}">${recLabel}</span></div>
    <div class="stat-item"><span class="stat-label">N.º analistas</span><span class="stat-value">${numAnal??'—'}</span></div>
  </div>`;
  if(targetLow!=null&&targetHigh!=null&&targetHigh>targetLow){
    const refTarget = targetMean ?? targetMedian ?? ((targetLow+targetHigh)/2);
    const pct=Math.min(100,Math.max(0,Math.round((refTarget-targetLow)/(targetHigh-targetLow)*100)));
    html+=`<div class="range-bar-wrap"><div class="range-labels"><span>Mín: $${Number(targetLow).toFixed(2)}</span><span>Máx: $${Number(targetHigh).toFixed(2)}</span></div><div class="range-track"><div class="range-fill"></div><div class="range-thumb" style="left:${pct}%;"></div></div></div>`;
  }
  return html;
}
function buildAIHTML(data){
  const a = data?.analysis || data;
  if(!a || (!a.resumo && !Array.isArray(a.correu_bem) && !Array.isArray(a.correu_mal) && !Array.isArray(a.vigiar))){
    return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados de earnings disponíveis.</p>';
  }
  let html='';
  if(a.resumo)html+=`<div class="ai-resumo">“${esc(a.resumo)}” &mdash; ${esc(a.periodo||'')}</div>`;
  if(a.correu_bem?.length)html+=`<div class="ai-section"><div class="ai-section-title good"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>O que correu bem</div><div class="ai-points">${a.correu_bem.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
  if(a.correu_mal?.length)html+=`<div class="ai-section"><div class="ai-section-title bad"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>O que correu mal</div><div class="ai-points">${a.correu_mal.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
  if(a.vigiar?.length)html+=`<div class="ai-section"><div class="ai-section-title watch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Vigiar no próximo earnings</div><div class="ai-points">${a.vigiar.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
  return html;
}

  const div=document.createElement('div');
  div.className='wl-card'; div.id='card-'+ticker;
  const chartWrapperId='minichart-wrap-'+ticker;
  div.innerHTML=`
    <div class="wl-card-header" onclick="toggleCard('${ticker}')">
      <div class="wl-logo" id="logo-${ticker}">${makeLogoSVG(ticker)}</div>
      <div class="wl-identity">
        <div class="wl-ticker">${esc(ticker)}</div>
        <div class="wl-name" id="name-${ticker}" style="color:var(--color-text-faint);">A carregar…</div>
      </div>
      <div class="wl-price-block">
        <div class="wl-price" id="price-${ticker}">—</div>
        <div class="wl-change" id="change-${ticker}" style="background:var(--color-surface-offset);color:var(--color-text-faint);">—</div>
      </div>
      <div class="wl-actions" onclick="event.stopPropagation()">
        <a href="stock.html?ticker=${encodeURIComponent(ticker)}&from=watchlist" class="btn-icon" title="Ver página completa" style="color:var(--color-text-muted);display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--radius-md);transition:all var(--transition);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
        <button class="btn-remove" title="Remover" onclick="removeCard('${ticker}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="btn-expand" id="expand-btn-${ticker}" title="Expandir" onclick="toggleCard('${ticker}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>
    <div class="wl-expand" id="expand-${ticker}">

      <div class="wl-tabs">
        <div class="wl-tab active" data-tab="stats" onclick="switchTab('${ticker}','stats')">Dados</div>
        <div class="wl-tab" data-tab="news" onclick="switchTab('${ticker}','news')">Notícias</div>
        <div class="wl-tab" data-tab="targets" onclick="switchTab('${ticker}','targets')">Analistas</div>
        <div class="wl-tab" data-tab="ai" onclick="switchTab('${ticker}','ai')">🤖 Earnings AI</div>
      </div>
      <div class="wl-tab-panel active" id="panel-stats-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar dados…</div></div>
      <div class="wl-tab-panel" id="panel-news-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar notícias…</div></div>
      <div class="wl-tab-panel" id="panel-targets-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar analistas…</div></div>
      <div class="wl-tab-panel" id="panel-ai-${ticker}"><div class="ai-loading"><div class="spinner"></div>A analisar earnings com IA…</div></div>
    </div>`;
  document.getElementById('wlList').appendChild(div);
}

function fillCard(ticker,stats){
  const priceM=stats?.price||{};
  const price=rawVal(priceM.regularMarketPrice);
  const prev=rawVal(priceM.regularMarketPreviousClose)||price;
  const change=price&&prev?parseFloat((price-prev).toFixed(2)):0;
  const changePct=prev?parseFloat(((change/prev)*100).toFixed(2)):0;
  const name=rawVal(priceM.longName)||rawVal(priceM.shortName)||ticker;
  const up=changePct>=0;
  const nameEl=document.getElementById('name-'+ticker), priceEl=document.getElementById('price-'+ticker), changeEl=document.getElementById('change-'+ticker), statsEl=document.getElementById('panel-stats-'+ticker);
  if(nameEl)nameEl.textContent=name;
  if(priceEl)priceEl.textContent=price?'$'+fmtNum(price):'—';
  if(changeEl){changeEl.className='wl-change '+(up?'up':'down');changeEl.innerHTML=`${up?'▲':'▼'} ${up?'+':''}${fmtNum(Math.abs(change))} (${up?'+':''}${fmtNum(Math.abs(changePct))}%)`;}
  if(statsEl)statsEl.innerHTML=buildStatsHTML(stats);
  return price;
}

window.toggleCard=function(ticker){
  const expand=document.getElementById('expand-'+ticker), btn=document.getElementById('expand-btn-'+ticker), isOpen=expand.classList.contains('open');
  expand.classList.toggle('open',!isOpen); btn.classList.toggle('open',!isOpen);
  if(!isOpen){ lazyLoadTabs(ticker); fetchChart(ticker).then(pts=>renderMiniChart('minichart-wrap-'+ticker,pts)); }
};

const _loaded={}; const _cardPrices={};
function lazyLoadTabs(ticker){
  if(_loaded[ticker])return;
  _loaded[ticker]=true;

  let price=_cardPrices[ticker];
  if(!price){
    const priceText=document.getElementById('price-'+ticker)?.textContent;
    if(priceText && priceText.trim()!=='—'){
      const num=parseFloat(priceText.replace('$','').replace(',',''));
      if(!isNaN(num)) price=num;
    }
  }

  fetchNews(ticker).then(news=>{ const el=document.getElementById('panel-news-'+ticker); if(el)el.innerHTML=buildNewsHTML(news); });
  fetchAnalysts(ticker).then(analystData=>{ const el=document.getElementById('panel-targets-'+ticker); if(el)el.innerHTML=buildTargetsHTML(analystData,price); });
  fetchEarningsAI(ticker).then(data=>{ const el=document.getElementById('panel-ai-'+ticker); if(el)el.innerHTML=buildAIHTML(data); });
}
window.switchTab=function(ticker,tab){
  const card=document.getElementById('card-'+ticker);
  if(!card)return;
  card.querySelectorAll('.wl-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  card.querySelectorAll('.wl-tab-panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${tab}-${ticker}`));
};
window.removeCard=function(ticker){
  removeFromWatchlist(ticker);
  const k='minichart-wrap-'+ticker;
  if(_charts[k]){_charts[k].destroy();delete _charts[k];}
  const el=document.getElementById('card-'+ticker); if(el)el.remove();
  if(!getWatchlist().length)renderEmpty();
};
function renderEmpty(){
  document.getElementById('wlList').innerHTML=`<div class="empty-state"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><h2>Watchlist vazia</h2><p>Pesquisa uma ação ou ETF e clica no ★ para adicionar.</p><a href="index.html">← Ir para a pesquisa</a></div>`;
}
async function init(){
  const tickers=getWatchlist();
  if(!tickers.length){renderEmpty();return;}
  tickers.forEach(t=>buildCardPlaceholder(t));
  await Promise.all(tickers.map(async t=>{ const stats=await fetchQuote(t); const price=fillCard(t,stats); _cardPrices[t]=price; }));
  tickers.forEach(t=>fetchProfile(t).then(profile=>tryLoadClearbitLogo(t,profile,'logo-'+t)));
  setInterval(async()=>{ const current = getWatchlist(); for(const t of current){ const stats=await fetchQuote(t); if(!stats)continue; const price=fillCard(t,stats); _cardPrices[t]=price; } },60000);
}
init();
</script>
