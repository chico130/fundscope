<!DOCTYPE html>
<html lang="pt" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watchlist — FundScope</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#01696f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FundScope">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f0ede8;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
      --color-text-faint:#bab9b4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#cedcd8;--color-success:#437a22;--color-success-bg:#eaf3e2;
      --color-notification:#a13544;--color-notification-bg:#f8e8ea;
      --color-gold:#c47d1a;--color-gold-bg:#fdf3e0;
      --color-warn:#8a6200;--color-warn-bg:#fef3c7;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-2xl:1.5rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(40,37,29,.06);--shadow-md:0 4px 12px rgba(40,37,29,.08);--shadow-lg:0 12px 32px rgba(40,37,29,.12);
      --transition:180ms cubic-bezier(.16,1,.3,1);
      --font-display:'Instrument Serif',Georgia,serif;--font-body:'Inter','Helvetica Neue',sans-serif;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
    }
    [data-theme="dark"]{
      --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#201f1d;--color-surface-offset:#252421;
      --color-border:#393836;--color-divider:#2e2d2b;--color-text:#cdccca;--color-text-muted:#797876;
      --color-text-faint:#5a5957;--color-primary:#4f98a3;--color-primary-hover:#63b2be;
      --color-primary-highlight:#1f3335;--color-success:#6daa45;--color-success-bg:#1a2e10;
      --color-notification:#dd6974;--color-notification-bg:#2e1015;
      --color-gold:#e8af34;--color-gold-bg:#2d2208;
      --color-warn:#d4a017;--color-warn-bg:#2a2000;
      --shadow-sm:0 1px 2px rgba(0,0,0,.25);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 32px rgba(0,0,0,.45);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);display:flex;flex-direction:column;}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
    a{color:inherit;text-decoration:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}

    /* ── Header ── */
    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) var(--space-6);background:color-mix(in oklch,var(--color-bg) 88%,transparent);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--color-divider);}
    .logo{display:flex;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-text);transition:color var(--transition);}
    .logo:hover{color:var(--color-primary);}
    .logo-svg{width:26px;height:26px;}
    .header-actions{display:flex;align-items:center;gap:var(--space-1);}
    .nav-link{font-size:var(--text-sm);color:var(--color-text-muted);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);transition:color var(--transition),background var(--transition);font-weight:500;}
    .nav-link:hover{color:var(--color-primary);background:var(--color-primary-highlight);}
    .nav-link.active{color:var(--color-primary);background:var(--color-primary-highlight);font-weight:600;}
    .btn-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition);}
    .btn-icon:hover{color:var(--color-text);background:var(--color-surface-offset);}

    /* ── Mobile nav ── */
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:color-mix(in oklch,var(--color-bg) 95%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--color-divider);padding:var(--space-2) var(--space-4);padding-bottom:max(var(--space-2),env(safe-area-inset-bottom));}
    .mobile-nav-inner{display:flex;justify-content:space-around;align-items:center;}
    .mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:var(--space-2) var(--space-2);border-radius:var(--radius-lg);color:var(--color-text-faint);font-size:10px;font-weight:600;transition:color var(--transition),background var(--transition);min-width:44px;}
    .mobile-nav-item.active{color:var(--color-primary);}
    .mobile-nav-item svg{width:20px;height:20px;}

    /* ── Page layout ── */
    .page{max-width:1100px;margin:0 auto;padding:var(--space-10) var(--space-6) var(--space-16);width:100%;flex:1;}

    /* ── Hero strip ── */
    .hero-strip{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4);margin-bottom:var(--space-8);}
    .hero-eyebrow{font-size:var(--text-xs);color:var(--color-primary);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:var(--space-2);}
    .hero-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:400;letter-spacing:-.02em;line-height:1.15;margin-bottom:var(--space-3);}
    .hero-meta{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;}
    .live-badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);color:var(--color-success);font-weight:500;}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--color-success);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .updated-label{font-size:var(--text-xs);color:var(--color-text-faint);}
    .hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:var(--space-3);}

    /* ── Export / Import ── */
    .io-btns{display:flex;gap:var(--space-2);}
    .btn-io{display:inline-flex;align-items:center;gap:5px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;border:1px solid var(--color-border);color:var(--color-text-muted);background:var(--color-surface);transition:all var(--transition);cursor:pointer;}
    .btn-io:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-highlight);}

    /* ── Refresh control ── */
    .refresh-ctrl{display:flex;align-items:center;gap:var(--space-3);}
    .refresh-countdown{font-size:var(--text-xs);color:var(--color-text-faint);font-variant-numeric:tabular-nums;}
    .btn-refresh{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);font-weight:600;color:var(--color-primary);padding:var(--space-2) var(--space-3);border-radius:var(--radius-full);border:1px solid color-mix(in oklch,var(--color-primary) 30%,transparent);background:var(--color-primary-highlight);transition:all var(--transition);}
    .btn-refresh:hover{background:color-mix(in oklch,var(--color-primary) 15%,transparent);}
    .btn-refresh svg{transition:transform .6s ease;}
    .btn-refresh.spinning svg{transform:rotate(360deg);}

    /* ── KPI grid ── */
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-4);margin-bottom:var(--space-8);}
    .kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);transition:box-shadow var(--transition),border-color var(--transition);}
    .kpi-card:hover{box-shadow:var(--shadow-md);border-color:var(--color-primary);}
    .kpi-label{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);margin-bottom:var(--space-3);}
    .kpi-val{font-family:var(--font-display);font-size:var(--text-lg);font-weight:400;letter-spacing:-.01em;line-height:1.1;margin-bottom:4px;}
    .kpi-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-variant-numeric:tabular-nums;}
    .kpi-icon{width:32px;height:32px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-3);}
    .kpi-icon.total{background:var(--color-primary-highlight);color:var(--color-primary);}
    .kpi-icon.bull{background:var(--color-success-bg);color:var(--color-success);}
    .kpi-icon.best{background:var(--color-gold-bg);color:var(--color-gold);}
    .kpi-icon.worst{background:var(--color-notification-bg);color:var(--color-notification);}

    /* ── Error banner ── */
    .error-banner{background:var(--color-notification-bg);border:1px solid color-mix(in oklch,var(--color-notification) 30%,transparent);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);font-size:var(--text-xs);color:var(--color-notification);display:none;margin-bottom:var(--space-6);}

    /* ── Skeleton ── */
    .skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-divider) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-md);}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-kpi{height:96px;border-radius:var(--radius-xl);}

    /* ── Watchlist manager (outer tabs) ── */
    .wl-manager{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-5);}
    .wl-tabs-outer{display:flex;gap:var(--space-2);overflow-x:auto;flex:1;scrollbar-width:none;padding-bottom:2px;}
    .wl-tabs-outer::-webkit-scrollbar{display:none;}
    .wl-tab-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;white-space:nowrap;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);transition:all var(--transition);cursor:pointer;flex-shrink:0;}
    .wl-tab-btn.active{background:var(--color-primary);color:#fff;border-color:var(--color-primary);}
    .wl-tab-btn:hover:not(.active){background:var(--color-surface-offset);color:var(--color-text);border-color:var(--color-text-muted);}
    .wl-tab-icon{display:inline-flex;align-items:center;opacity:.6;transition:opacity var(--transition);}
    .wl-tab-icon:hover{opacity:1;}
    .btn-new-wl{flex-shrink:0;width:30px;height:30px;border-radius:var(--radius-full);border:1px dashed var(--color-border);color:var(--color-text-muted);font-size:1.1rem;line-height:1;display:flex;align-items:center;justify-content:center;transition:all var(--transition);background:none;}
    .btn-new-wl:hover{border-color:var(--color-primary);color:var(--color-primary);background:var(--color-primary-highlight);}

    /* ── Add ticker form ── */
    .add-form{display:flex;gap:var(--space-3);margin-bottom:var(--space-6);align-items:center;}
    .add-input{flex:1;max-width:260px;padding:var(--space-2) var(--space-4);border:1px solid var(--color-border);border-radius:var(--radius-full);background:var(--color-surface);color:var(--color-text);font-size:var(--text-sm);font-family:var(--font-body);outline:none;transition:border-color var(--transition),box-shadow var(--transition);}
    .add-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px color-mix(in oklch,var(--color-primary) 12%,transparent);}
    .add-input::placeholder{color:var(--color-text-faint);}
    .btn-add{display:inline-flex;align-items:center;gap:5px;padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);background:var(--color-primary);color:#fff;font-size:var(--text-sm);font-weight:600;transition:background var(--transition);flex-shrink:0;}
    .btn-add:hover{background:var(--color-primary-hover);}

    /* ── Section header ── */
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4);}
    .section-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-faint);}
    .section-count{font-size:var(--text-xs);color:var(--color-text-faint);background:var(--color-surface-offset);padding:2px 8px;border-radius:var(--radius-full);}

    /* ── Watchlist cards ── */
    .wl-list{display:flex;flex-direction:column;gap:var(--space-4);}
    .wl-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-sm);overflow:hidden;transition:box-shadow var(--transition),border-color var(--transition);}
    .wl-card:hover{box-shadow:var(--shadow-md);}
    .wl-card-header{display:flex;align-items:center;gap:var(--space-4);padding:var(--space-5);cursor:pointer;user-select:none;}
    .wl-logo{width:44px;height:44px;border-radius:var(--radius-lg);background:var(--color-surface-offset);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--color-primary);flex-shrink:0;overflow:hidden;}
    .wl-logo svg{width:100%;height:100%;display:block;border-radius:var(--radius-lg);}
    .wl-identity{flex:1;min-width:0;}
    .wl-ticker{font-size:var(--text-base);font-weight:700;letter-spacing:-.01em;}
    .wl-name{font-size:var(--text-xs);color:var(--color-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}

    /* ── Sparkline ── */
    .sparkline-wrap{width:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

    .wl-price-block{text-align:right;flex-shrink:0;}
    .wl-price{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;}
    .wl-change{display:inline-flex;align-items:center;gap:3px;font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-full);margin-top:3px;font-variant-numeric:tabular-nums;}
    .wl-change.up{background:var(--color-success-bg);color:var(--color-success);}
    .wl-change.down{background:var(--color-notification-bg);color:var(--color-notification);}
    .wl-actions{display:flex;align-items:center;gap:var(--space-2);flex-shrink:0;}
    .btn-action{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-faint);transition:color var(--transition),background var(--transition);}
    .btn-action:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .btn-action.remove:hover{color:var(--color-notification);background:var(--color-notification-bg);}
    .btn-expand{width:30px;height:30px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:color var(--transition),background var(--transition),transform var(--transition);}
    .btn-expand:hover{color:var(--color-text);background:var(--color-surface-offset);}
    .btn-expand.open{transform:rotate(180deg);}

    /* ── Expand panel ── */
    .wl-expand{display:none;border-top:1px solid var(--color-divider);}
    .wl-expand.open{display:block;}
    .mini-chart-wrap{position:relative;height:68px;margin:var(--space-3) var(--space-5) var(--space-2);}
    .mini-chart-wrap canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;}
    .wl-tabs{display:flex;gap:0;border-bottom:1px solid var(--color-divider);padding:0 var(--space-5);}
    .wl-tab{padding:var(--space-3) var(--space-4);font-size:var(--text-xs);font-weight:600;color:var(--color-text-muted);border-bottom:2px solid transparent;transition:color var(--transition),border-color var(--transition);cursor:pointer;}
    .wl-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);}
    .wl-tab:hover:not(.active){color:var(--color-text);}
    .wl-tab-panel{display:none;padding:var(--space-5);}
    .wl-tab-panel.active{display:block;}

    /* ── Stats ── */
    .stat-row{display:flex;flex-direction:column;gap:var(--space-3);}
    .stat-item{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--color-divider);padding-bottom:var(--space-2);}
    .stat-item:last-child{border-bottom:none;padding-bottom:0;}
    .stat-label{font-size:var(--text-sm);color:var(--color-text-muted);}
    .stat-value{font-size:var(--text-sm);font-weight:600;font-variant-numeric:tabular-nums;}

    /* ── Inline news ── */
    .news-list-inline{display:flex;flex-direction:column;gap:var(--space-3);}
    .news-item-inline{display:flex;flex-direction:column;gap:4px;padding:var(--space-3);border-radius:var(--radius-lg);background:var(--color-surface-offset);transition:background var(--transition);}
    .news-item-inline:hover{background:var(--color-primary-highlight);}
    .news-headline{font-size:var(--text-sm);font-weight:500;color:var(--color-text);line-height:1.4;}
    .news-meta{font-size:var(--text-xs);color:var(--color-text-faint);}

    /* ── Analyst targets ── */
    .target-block{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-4);margin-bottom:var(--space-5);}
    .target-item{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-4);text-align:center;}
    .target-label{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:4px;}
    .target-value{font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;}
    .target-value.bull{color:var(--color-success);}
    .target-value.bear{color:var(--color-notification);}
    .range-bar-wrap{margin-top:var(--space-3);}
    .range-labels{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-2);}
    .range-track{height:6px;background:var(--color-surface-offset);border-radius:var(--radius-full);position:relative;}
    .range-fill{height:100%;border-radius:var(--radius-full);background:linear-gradient(90deg,var(--color-notification),var(--color-gold),var(--color-success));width:100%;}
    .range-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:var(--color-primary);border:2px solid var(--color-bg);box-shadow:var(--shadow-sm);}

    /* ── AI Earnings ── */
    .ai-section{margin-bottom:var(--space-5);}
    .ai-section-title{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:var(--space-3);display:flex;align-items:center;gap:6px;}
    .ai-section-title.good{color:var(--color-success);}
    .ai-section-title.bad{color:var(--color-notification);}
    .ai-section-title.watch{color:var(--color-warn);}
    .ai-points{display:flex;flex-direction:column;gap:var(--space-2);}
    .ai-point{font-size:var(--text-sm);color:var(--color-text);background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-2) var(--space-3);line-height:1.5;}
    .ai-resumo{font-size:var(--text-sm);color:var(--color-text-muted);font-style:italic;background:var(--color-primary-highlight);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-5);line-height:1.6;}
    .ai-loading{display:flex;align-items:center;gap:10px;color:var(--color-text-muted);font-size:var(--text-sm);padding:var(--space-6) 0;}
    .spinner{width:18px;height:18px;border:2px solid var(--color-border);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Empty state ── */
    .empty-state{text-align:center;padding:var(--space-16) var(--space-8);color:var(--color-text-muted);}
    .empty-state svg{margin:0 auto var(--space-4);display:block;opacity:.3;}
    .empty-state h2{font-size:var(--text-lg);margin-bottom:var(--space-3);color:var(--color-text);font-family:var(--font-display);font-weight:400;}
    .empty-state p{font-size:var(--text-sm);margin-bottom:var(--space-2);}
    .empty-cta{display:inline-flex;align-items:center;gap:8px;margin-top:var(--space-6);padding:var(--space-3) var(--space-6);background:var(--color-primary);color:#fff;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;transition:background var(--transition);}
    .empty-cta:hover{background:var(--color-primary-hover);}

    /* ── Footer ── */
    .footer{text-align:center;padding:var(--space-6);font-size:var(--text-xs);color:var(--color-text-faint);border-top:1px solid var(--color-divider);margin-top:auto;}
    .footer a{color:var(--color-text-muted);transition:color var(--transition);}
    .footer a:hover{color:var(--color-primary);}

    /* ── Responsive ── */
    @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:768px){
      .header-actions .nav-link{display:none;}

    }
    @media(max-width:480px){
      .header{padding:var(--space-3) var(--space-4);}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .wl-card-header{padding:var(--space-4);}
      .sparkline-wrap{display:none;}
      .add-input{max-width:none;}
      .io-btns{display:none;}
    }
  </style>

  <script>
    const WORKER = 'https://stocks.araujo-francisco-fernandes.workers.dev';

    // ── Theme ────────────────────────────────────────────────────────
    const html = document.documentElement;
    const THEME_KEY = 'fs_theme';
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem(THEME_KEY, t);
      const icon = document.getElementById('themeIcon');
      if (icon) icon.innerHTML = t === 'dark'
        ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
    const savedTheme = localStorage.getItem(THEME_KEY) || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
    const mobileToggle = document.getElementById('themeToggleMobile');
    if (mobileToggle) mobileToggle.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

    // ── Helpers ──────────────────────────────────────────────────────
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtNum(n, dec = 2) { if (n == null || isNaN(n)) return '—'; return Number(n).toFixed(dec); }
    function fmtLarge(n) { if (!n || isNaN(n)) return '—'; if (n>=1e12) return '$'+(n/1e12).toFixed(2)+'T'; if (n>=1e9) return '$'+(n/1e9).toFixed(2)+'B'; if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; return '$'+n.toFixed(0); }
    function fmtVol(n) { if (!n || isNaN(n)) return '—'; if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return String(n); }
    function rawVal(obj) { if (obj !== null && typeof obj === 'object' && 'raw' in obj) return obj.raw; return obj ?? null; }

    // ── Ticker logo ──────────────────────────────────────────────────
    function tickerColor(ticker) {
      const palette = [['#01696f','#e8f5f5'],['#437a22','#eaf3e2'],['#006494','#e0f0f8'],['#7a39bb','#f0eaf8'],['#a13544','#fbeaec'],['#da7101','#fdf0e0'],['#d19900','#fdf6e0'],['#0c4e54','#e0f2f4'],['#2e5c10','#ecf5e5'],['#0b3751','#dceef8'],['#431673','#ede0f5'],['#4b2614','#f5ede8']];
      const clean = String(ticker||'').toUpperCase();
      let h = 0; for (let i = 0; i < clean.length; i++) h = (h*31 + clean.charCodeAt(i)) >>> 0;
      return palette[h % palette.length];
    }
    function makeLogoSVG(ticker) {
      const clean = String(ticker||'').replace(/[^A-Z0-9]/gi,'').toUpperCase();
      const label = clean.slice(0,4) || String(ticker||'').slice(0,4).toUpperCase();
      const [bg, fg] = tickerColor(label);
      const fs = label.length<=2?18:label.length===3?13:11;
      return `<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44"><rect width="44" height="44" rx="8" fill="${bg}"/><text x="22" y="22" dominant-baseline="central" text-anchor="middle" font-family="Inter,sans-serif" font-weight="700" font-size="${fs}" fill="${fg}" letter-spacing="-0.5">${esc(label)}</text></svg>`;
    }

    // ── data.json ────────────────────────────────────────────────────
    let _dataJson = null;
    async function loadDataJson() {
      try {
        const r = await fetch('data.json');
        if (r.ok) _dataJson = await r.json();
      } catch {}
    }

    // ── Sparkline (inline SVG from data.json history.1D) ────────────
    function makeSVGSparkline(history1D, up) {
      if (!Array.isArray(history1D) || history1D.length < 2) return '';
      const vals = history1D.map(p => p.v).filter(v => v != null && !isNaN(v));
      if (vals.length < 2) return '';
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min || 1;
      const W = 80, H = 32, P = 2;
      const pts = vals.map((v, i) => {
        const x = (P + (i / (vals.length - 1)) * (W - P * 2)).toFixed(1);
        const y = (P + (1 - (v - min) / range) * (H - P * 2)).toFixed(1);
        return `${x},${y}`;
      }).join(' ');
      const color = up ? 'var(--color-success)' : 'var(--color-notification)';
      return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    // ── Multi-watchlist storage ──────────────────────────────────────
    const WL_KEY = 'fundscope_watchlists';
    const WL_ACTIVE_KEY = 'fundscope_active_wl';

    function genId() { return 'wl_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

    function getWatchlists() {
      try {
        const d = JSON.parse(localStorage.getItem(WL_KEY) || 'null');
        if (Array.isArray(d) && d.length) return d;
      } catch {}
      // Migrate from old fs_watchlist key
      let tickers = [];
      try { const old = JSON.parse(localStorage.getItem('fs_watchlist') || '[]'); if (Array.isArray(old)) tickers = old.map(t => String(t).trim().toUpperCase()).filter(Boolean); } catch {}
      const wls = [{ id: genId(), name: 'Principal', tickers }];
      saveWatchlists(wls);
      return wls;
    }

    function saveWatchlists(wls) { localStorage.setItem(WL_KEY, JSON.stringify(wls)); }

    function getActiveId() {
      const id = localStorage.getItem(WL_ACTIVE_KEY);
      const wls = getWatchlists();
      return wls.find(w => w.id === id) ? id : wls[0]?.id;
    }

    function setActiveId(id) { localStorage.setItem(WL_ACTIVE_KEY, id); }

    function getActiveWL() {
      const wls = getWatchlists();
      const id = getActiveId();
      return wls.find(w => w.id === id) || wls[0];
    }

    function addTickerToActive(ticker) {
      const t = ticker.trim().toUpperCase();
      if (!t) return false;
      const wls = getWatchlists();
      const active = wls.find(w => w.id === getActiveId());
      if (!active || active.tickers.includes(t)) return false;
      active.tickers.push(t);
      saveWatchlists(wls);
      return true;
    }

    function removeTickerFromActive(ticker) {
      const t = ticker.toUpperCase();
      const wls = getWatchlists();
      const active = wls.find(w => w.id === getActiveId());
      if (!active) return;
      active.tickers = active.tickers.filter(x => x !== t);
      saveWatchlists(wls);
    }

    function createWatchlist(name) {
      const wls = getWatchlists();
      const id = genId();
      wls.push({ id, name: name.trim(), tickers: [] });
      saveWatchlists(wls);
      return id;
    }

    function renameWatchlist(id, name) {
      const wls = getWatchlists();
      const wl = wls.find(w => w.id === id);
      if (wl) { wl.name = name.trim(); saveWatchlists(wls); }
    }

    function deleteWatchlist(id) {
      let wls = getWatchlists();
      if (wls.length <= 1) return;
      wls = wls.filter(w => w.id !== id);
      saveWatchlists(wls);
      if (getActiveId() === id) setActiveId(wls[0].id);
    }

    // ── Export / Import ──────────────────────────────────────────────
    function exportWatchlists() {
      const data = getWatchlists();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'fundscope_watchlists.json'; a.click();
      URL.revokeObjectURL(url);
    }

    function importWatchlists(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data) || !data.every(w => typeof w.id === 'string' && typeof w.name === 'string' && Array.isArray(w.tickers)))
            throw new Error('Formato inválido — esperado array de {id, name, tickers[]}');
          saveWatchlists(data);
          location.reload();
        } catch(err) {
          showError('Erro ao importar: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    document.getElementById('btnExport').addEventListener('click', exportWatchlists);
    document.getElementById('importFile').addEventListener('change', e => { if (e.target.files[0]) importWatchlists(e.target.files[0]); e.target.value = ''; });

    // ── Error helper ─────────────────────────────────────────────────
    function showError(msg) {
      const b = document.getElementById('errorBanner');
      b.textContent = msg; b.style.display = 'block';
      setTimeout(() => { b.style.display = 'none'; }, 5000);
    }

    // ── Outer tabs rendering ─────────────────────────────────────────
    function renderOuterTabs() {
      const wls = getWatchlists();
      const activeId = getActiveId();
      document.getElementById('wlTabsOuter').innerHTML = wls.map(wl => {
        const isActive = wl.id === activeId;
        return `<button class="wl-tab-btn${isActive ? ' active' : ''}" onclick="switchWL('${wl.id}')">
          <span>${esc(wl.name)}</span>
          ${isActive ? `<span class="wl-tab-icon" title="Renomear" onclick="event.stopPropagation();renameWL('${wl.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>` : ''}
          ${wls.length > 1 ? `<span class="wl-tab-icon" title="Apagar lista" onclick="event.stopPropagation();deleteWL('${wl.id}')"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>` : ''}
        </button>`;
      }).join('');
    }

    window.switchWL = function(id) { setActiveId(id); renderPage(); };
    window.renameWL = function(id) {
      const wl = getWatchlists().find(w => w.id === id);
      if (!wl) return;
      const name = prompt('Novo nome:', wl.name);
      if (name && name.trim()) { renameWatchlist(id, name); renderOuterTabs(); }
    };
    window.deleteWL = function(id) {
      if (getWatchlists().length <= 1) return;
      if (!confirm('Apagar esta watchlist e todos os seus tickers?')) return;
      deleteWatchlist(id); renderPage();
    };

    document.getElementById('btnNewWL').addEventListener('click', () => {
      const name = prompt('Nome da nova watchlist:');
      if (name && name.trim()) { const id = createWatchlist(name); setActiveId(id); renderPage(); }
    });

    // ── KPIs from data.json ──────────────────────────────────────────
    const ICON_STAR = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
    const ICON_UP   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`;
    const ICON_TROP = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>`;
    const ICON_DOWN = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>`;

    function renderKPIs(tickers) {
      const prices = tickers.map(t => {
        const d = _dataJson?.stocks?.[t];
        if (!d || d.price == null) return null;
        return { ticker: t, price: d.price, changePct: d.changePct ?? 0 };
      }).filter(Boolean);

      const total  = tickers.length;
      const inAlta = prices.filter(x => x.changePct > 0).length;
      const best   = prices.length ? prices.reduce((a,b) => a.changePct > b.changePct ? a : b) : null;
      const worst  = prices.length ? prices.reduce((a,b) => a.changePct < b.changePct ? a : b) : null;
      const sign = v => v >= 0 ? '+' : '';

      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card"><div class="kpi-icon total">${ICON_STAR}</div><div class="kpi-label">Em Vigilância</div><div class="kpi-val">${total}</div><div class="kpi-sub">ativo${total !== 1 ? 's' : ''} na lista</div></div>
        <div class="kpi-card"><div class="kpi-icon bull">${ICON_UP}</div><div class="kpi-label">Em Alta Hoje</div><div class="kpi-val">${inAlta} <span style="font-size:var(--text-sm);color:var(--color-text-faint)">/ ${total}</span></div><div class="kpi-sub">${total ? Math.round(inAlta/total*100) : 0}% com ganhos</div></div>
        <div class="kpi-card"><div class="kpi-icon best">${ICON_TROP}</div><div class="kpi-label">Melhor do Dia</div><div class="kpi-val">${best ? esc(best.ticker) : '—'}</div><div class="kpi-sub" style="color:${best ? (best.changePct>=0?'var(--color-success)':'var(--color-notification)') : 'var(--color-text-faint)'};">${best ? sign(best.changePct)+best.changePct.toFixed(2)+'%' : '—'}</div></div>
        <div class="kpi-card"><div class="kpi-icon worst">${ICON_DOWN}</div><div class="kpi-label">Pior do Dia</div><div class="kpi-val">${worst ? esc(worst.ticker) : '—'}</div><div class="kpi-sub" style="color:${worst ? (worst.changePct>=0?'var(--color-success)':'var(--color-notification)') : 'var(--color-text-faint)'};">${worst ? sign(worst.changePct)+worst.changePct.toFixed(2)+'%' : '—'}</div></div>`;
    }

    // ── Card building ────────────────────────────────────────────────
    function buildCard(ticker) {
      const d = _dataJson?.stocks?.[ticker];

      const changePct = d?.changePct;

      const changeClass = changePct != null ? (up ? 'up' : 'down') : '';
      const changeStyle = changePct == null ? 'style="background:var(--color-surface-offset);color:var(--color-text-faint);"' : '';

      const div = document.createElement('div');
      div.className = 'wl-card'; div.id = 'card-' + ticker;
      div.innerHTML = `
        <div class="wl-card-header" onclick="toggleCard('${ticker}')">
          <div class="wl-logo" id="logo-${ticker}">${makeLogoSVG(ticker)}</div>
          <div class="wl-identity">
            <div class="wl-ticker">${esc(ticker)}</div>
            <div class="wl-name" id="name-${ticker}"></div>
          </div>
          <div class="sparkline-wrap" id="spark-${ticker}">${sparkHTML}</div>
          <div class="wl-price-block">
            <div class="wl-price" id="price-${ticker}">${priceStr}</div>
            <div class="wl-change ${changeClass}" id="change-${ticker}" ${changeStyle}>${changeStr}</div>
          </div>
          <div class="wl-actions" onclick="event.stopPropagation()">
            <a href="stock.html?ticker=${encodeURIComponent(ticker)}&from=watchlist" class="btn-action" title="Ver página completa" style="display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:var(--radius-md);color:var(--color-text-muted);transition:all var(--transition);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
            <button class="btn-action remove" title="Remover da watchlist" onclick="removeCard('${ticker}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <button class="btn-expand" id="expand-btn-${ticker}" title="Expandir" onclick="toggleCard('${ticker}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>
        </div>
        <div class="wl-expand" id="expand-${ticker}">
          <div class="mini-chart-wrap" id="minichart-wrap-${ticker}"></div>
          <div class="wl-tabs">
            <div class="wl-tab active" data-tab="stats" onclick="switchTab('${ticker}','stats')">Dados</div>
            <div class="wl-tab" data-tab="news" onclick="switchTab('${ticker}','news')">Notícias</div>
            <div class="wl-tab" data-tab="targets" onclick="switchTab('${ticker}','targets')">Analistas</div>
            <div class="wl-tab" data-tab="ai" onclick="switchTab('${ticker}','ai')">🤖 Earnings AI</div>
          </div>
          <div class="wl-tab-panel active" id="panel-stats-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar dados…</div></div>
          <div class="wl-tab-panel" id="panel-news-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar notícias…</div></div>
          <div class="wl-tab-panel" id="panel-targets-${ticker}"><div class="ai-loading"><div class="spinner"></div>A carregar analistas…</div></div>
          <div class="wl-tab-panel" id="panel-ai-${ticker}"><div class="ai-loading"><div class="spinner"></div>A analisar earnings com IA…</div></div>
        </div>`;
      return div;
    }

    // ── renderPage ───────────────────────────────────────────────────
    function renderPage() {
      // Destroy existing charts
      Object.keys(_charts).forEach(k => { try { _charts[k].destroy(); } catch {} delete _charts[k]; });
      Object.keys(_loaded).forEach(k => delete _loaded[k]);

      renderOuterTabs();

      const wl = getActiveWL();
      const tickers = wl?.tickers || [];
      const list = document.getElementById('wlList');
      list.innerHTML = '';

      document.getElementById('sectionCount').textContent = tickers.length ? `${tickers.length} ativo${tickers.length !== 1 ? 's' : ''}` : '';

      if (!tickers.length) {
        renderEmpty();
        return;
      }

      tickers.forEach(t => list.appendChild(buildCard(t)));
      renderKPIs(tickers);

      const badge = document.getElementById('liveBadge');
      badge.innerHTML = `<span class="live-dot"></span> ${tickers.length} ativo${tickers.length !== 1 ? 's' : ''}`;
      badge.style.color = 'var(--color-success)';

      // Async: load logos + names
      tickers.forEach(t => {
        tryParqetLogo(t, 'logo-'+t);
        fetchProfile(t).then(profile => tryLoadClearbitLogo(t, profile, 'logo-'+t));
        fetchQuote(t).then(data => {
          if (!data) return;
          _priceData[t] = data;
          const p = data.price || {};
          const name = rawVal(p.longName) || rawVal(p.shortName) || '';
          const nameEl = document.getElementById('name-'+t);
          if (nameEl) nameEl.textContent = name;
        });
      });
    }

          <h2>Watchlist vazia</h2>
          <p>Escreve um ticker no campo acima ou pesquisa uma ação e clica no ★.</p>
          <a href="search.html" class="empty-cta">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Ir para a Pesquisa
          </a>
        </div>`;
      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card"><div class="kpi-icon total">${ICON_STAR}</div><div class="kpi-label">Em Vigilância</div><div class="kpi-val">0</div><div class="kpi-sub">lista vazia</div></div>
        <div class="kpi-card"><div class="kpi-icon bull">${ICON_UP}</div><div class="kpi-label">Em Alta Hoje</div><div class="kpi-val">—</div><div class="kpi-sub">sem dados</div></div>
        <div class="kpi-card"><div class="kpi-icon best">${ICON_TROP}</div><div class="kpi-label">Melhor do Dia</div><div class="kpi-val">—</div><div class="kpi-sub">sem dados</div></div>
        <div class="kpi-card"><div class="kpi-icon worst">${ICON_DOWN}</div><div class="kpi-label">Pior do Dia</div><div class="kpi-val">—</div><div class="kpi-sub">sem dados</div></div>`;
      const badge = document.getElementById('liveBadge');
      badge.innerHTML = `<span class="live-dot" style="background:var(--color-text-faint)"></span> Lista vazia`;
      badge.style.color = 'var(--color-text-faint)';
    }

    // ── Add ticker handlers ──────────────────────────────────────────
    function doAddTicker() {
      const input = document.getElementById('tickerInput');
      const ticker = input.value.trim().toUpperCase();
      if (!ticker) return;
      if (addTickerToActive(ticker)) {
        input.value = '';
        renderPage();
      } else {
        // already in list — highlight the existing card
        const card = document.getElementById('card-' + ticker);
        if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.style.outline = '2px solid var(--color-primary)'; setTimeout(() => card.style.outline = '', 1500); }
        input.select();
      }
    }
    document.getElementById('btnAddTicker').addEventListener('click', doAddTicker);
    document.getElementById('tickerInput').addEventListener('keydown', e => { if (e.key === 'Enter') doAddTicker(); });

    // ── Card interactions ────────────────────────────────────────────
    const _charts = {}, _loaded = {}, _priceData = {};

    window.toggleCard = function(ticker) {
      const expand = document.getElementById('expand-'+ticker);
      const btn = document.getElementById('expand-btn-'+ticker);
      const isOpen = expand.classList.contains('open');
      expand.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
      if (!isOpen) {
        lazyLoadTabs(ticker);
        fetchChart(ticker).then(pts => renderMiniChart('minichart-wrap-'+ticker, pts));
      }
    };

    window.removeCard = function(ticker) {
      removeTickerFromActive(ticker);
      const k = 'minichart-wrap-'+ticker;
      if (_charts[k]) { try { _charts[k].destroy(); } catch {} delete _charts[k]; }
      const el = document.getElementById('card-'+ticker); if (el) el.remove();
      renderOuterTabs();
      const tickers = getActiveWL()?.tickers || [];
      document.getElementById('sectionCount').textContent = tickers.length ? `${tickers.length} ativo${tickers.length !== 1 ? 's' : ''}` : '';
      if (!tickers.length) renderEmpty();
      else renderKPIs(tickers);
    };

    window.switchTab = function(ticker, tab) {
      const card = document.getElementById('card-'+ticker); if (!card) return;
      card.querySelectorAll('.wl-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      card.querySelectorAll('.wl-tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}-${ticker}`));
    };

    function lazyLoadTabs(ticker) {
      if (_loaded[ticker]) return;
      _loaded[ticker] = true;
      const base = _priceData[ticker];
      let price = _dataJson?.stocks?.[ticker]?.price;
      fetchStats(ticker).then(ext   => { const el = document.getElementById('panel-stats-'+ticker);   if (el) el.innerHTML = buildStatsHTML(base, ext); });
      fetchNews(ticker).then(news   => { const el = document.getElementById('panel-news-'+ticker);    if (el) el.innerHTML = buildNewsHTML(news); });
      fetchAnalysts(ticker).then(d  => { const el = document.getElementById('panel-targets-'+ticker); if (el) el.innerHTML = buildTargetsHTML(d, price); });
      fetchEarningsAI(ticker).then(d => { const el = document.getElementById('panel-ai-'+ticker);    if (el) el.innerHTML = buildAIHTML(d); });
    }

    // ── Mini chart (expand panel) ────────────────────────────────────
    function renderMiniChart(wrapperId, pts) {
      const wrap = document.getElementById(wrapperId);
      if (!wrap || pts.length < 2) return;
      if (_charts[wrapperId]) { try { _charts[wrapperId].destroy(); } catch {} delete _charts[wrapperId]; }
      wrap.innerHTML = '';
      const cvs = document.createElement('canvas');
      wrap.appendChild(cvs);
      const first = pts[0].v, last = pts[pts.length-1].v, up = last >= first;
      const color = up ? '#437a22' : '#a13544';
      cvs.width = wrap.offsetWidth || 600; cvs.height = wrap.offsetHeight || 68;
      _charts[wrapperId] = new Chart(cvs, { type:'line', data:{ labels:pts.map(()=>''), datasets:[{ data:pts.map(p=>p.v), borderColor:color, borderWidth:1.5, pointRadius:0, tension:.3, fill:false }] }, options:{ responsive:false, animation:false, plugins:{ legend:{display:false}, tooltip:{enabled:false} }, scales:{ x:{display:false}, y:{display:false} } } });
    }

    // ── Refresh ──────────────────────────────────────────────────────
    async function refreshData() {
      const btn = document.getElementById('btnRefresh');
      btn.classList.add('spinning');
      try {
        await loadDataJson();
        const tickers = getActiveWL()?.tickers || [];
        tickers.forEach(t => {
          const d = _dataJson?.stocks?.[t];
          if (!d) return;
          const up = (d.changePct ?? 0) >= 0;
          const sym = d.symbol || '$';
          const priceEl = document.getElementById('price-'+t);
          const changeEl = document.getElementById('change-'+t);
          const sparkEl = document.getElementById('spark-'+t);
          if (priceEl && d.price != null) priceEl.textContent = sym + d.price.toFixed(2);
          if (changeEl && d.changePct != null) {
            changeEl.removeAttribute('style');
            changeEl.className = 'wl-change ' + (up ? 'up' : 'down');
            changeEl.innerHTML = `${up ? '▲' : '▼'} ${up ? '+' : ''}${d.changePct.toFixed(2)}%`;
          }
          if (sparkEl && d.history?.['1D']) sparkEl.innerHTML = makeSVGSparkline(d.history['1D'], up);
        });
        renderKPIs(tickers);
        document.getElementById('updatedLabel').textContent = 'Atualizado às ' + new Date().toLocaleTimeString('pt', {hour:'2-digit', minute:'2-digit'});
      } catch(err) {
        showError('Erro ao atualizar: ' + err.message);
      } finally {
        btn.classList.remove('spinning');
      }
    }

    document.getElementById('btnRefresh').addEventListener('click', refreshData);

    // ── API helpers (for expand panel) ───────────────────────────────
    async function fetchWithTimeout(url, ms = 12000) {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, {signal: ctrl.signal}).finally(() => clearTimeout(tid));
    }
    async function fetchQuote(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=price`,12000); if (!r.ok) return null; const j = await r.json(); if (j?.quoteSummary?.error) return null; return j?.quoteSummary?.result?.[0]||null; } catch { return null; }
    }
    async function fetchStats(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=summaryDetail,defaultKeyStatistics`,10000); if (!r.ok) return null; const j = await r.json(); if (j?.quoteSummary?.error) return null; return j?.quoteSummary?.result?.[0]||null; } catch { return null; }
    }
    async function fetchProfile(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=summaryProfile`,8000); if (!r.ok) return null; const j = await r.json(); if (j?.quoteSummary?.error) return null; return j?.quoteSummary?.result?.[0]?.summaryProfile||null; } catch { return null; }
    }
    async function fetchAnalysts(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&modules=financialData,recommendationTrend`,12000); if (r.ok) { const j = await r.json(); if (!j?.quoteSummary?.error) { const res = j?.quoteSummary?.result?.[0]||{}; const fd = res.financialData; if (fd?.targetMeanPrice||fd?.targetHighPrice) return {financialData:fd,recommendationTrend:res.recommendationTrend||null}; } } } catch {}
      try { const r = await fetchWithTimeout('data/beta/watchlist.json',6000); if (!r.ok) return null; const j = await r.json(); const c = (j?.candidates||[]).find(x=>x.ticker===ticker); if (!c) return null; return {financialData:{targetMeanPrice:c.target_mean,targetMedianPrice:c.target_median,targetHighPrice:c.target_high,targetLowPrice:c.target_low,recommendationKey:'',numberOfAnalystOpinions:null},fromCache:true}; } catch { return null; }
    }
    async function fetchChart(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&range=5d&interval=1h`); if (!r.ok) return []; const j = await r.json(); const result = j?.chart?.result?.[0]; if (!result) return []; const ts = result.timestamp||[], cl = result.indicators?.quote?.[0]?.close||[], pts = []; for (let i = 0; i < ts.length; i++) { const v = cl[i]; if (v!=null&&!isNaN(v)) pts.push({t:ts[i],v:parseFloat(v.toFixed(4))}); } return pts; } catch { return []; }
    }
    async function fetchNews(ticker) {
      try {
        const r = await fetchWithTimeout('news.json', 6000); if (!r.ok) return [];
        const j = await r.json();
        const articles = Array.isArray(j?.articles) ? j.articles : [];
        const t = String(ticker||'').toUpperCase();
        const regex = new RegExp(`\\b${t}\\b`, 'i');
        const withImpact = articles.filter(a => { const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : []; return tickers.includes(t); });
        const textMatches = articles.filter(a => { if (!a) return false; const tickers = Array.isArray(a?.impact?.tickers) ? a.impact.tickers.map(x=>String(x).toUpperCase()) : []; if (tickers.includes(t)) return false; return regex.test(String(a.title||'').toUpperCase())||regex.test(String(a.summary||'').toUpperCase())||regex.test(String(a.content||'').toUpperCase()); });
        const merged = [...withImpact,...textMatches];
        merged.sort((a,b) => new Date(b.publishedAt||0) - new Date(a.publishedAt||0));
        return merged.slice(0,6).map(a => ({headline:a.title||'Sem título',source:a.source||'Fonte',datetime:Math.floor(new Date(a.publishedAt||Date.now()).getTime()/1000),url:a.url||'#'}));
      } catch { return []; }
    }
    async function fetchEarningsAI(ticker) {
      try { const r = await fetchWithTimeout(`${WORKER}?ticker=${encodeURIComponent(ticker)}&action=earnings-ai`,15000); if (r.ok) { const j = await r.json(); const a = j?.analysis||j; if (a?.resumo||Array.isArray(a?.correu_bem)) return j; } } catch {}
      try { const r = await fetchWithTimeout('data/beta/earnings_ai.json',6000); if (!r.ok) return null; const j = await r.json(); return j?.[ticker]||null; } catch { return null; }
    }

    // ── Logo helpers ─────────────────────────────────────────────────
    function _setLogoImg(wrapId, url, alt) { const w = document.getElementById(wrapId); if (w) w.innerHTML = `<img src="${url}" alt="${alt}" style="width:100%;height:100%;object-fit:contain;">`; }
    function tryParqetLogo(ticker, wrapId) { const base = String(ticker||'').split('.')[0].toUpperCase(); const img = new Image(); img.onload = () => _setLogoImg(wrapId,`https://assets.parqet.com/logos/symbol/${base}`,base); img.src = `https://assets.parqet.com/logos/symbol/${base}`; }
    function tryLoadClearbitLogo(ticker, profile, wrapId) { if (profile?.website) { try { const domain = new URL(profile.website).hostname.replace(/^www\./,''); const img = new Image(); img.onload = () => _setLogoImg(wrapId,`https://logo.clearbit.com/${domain}`,ticker); img.onerror = () => tryParqetLogo(ticker, wrapId); img.src = `https://logo.clearbit.com/${domain}`; return; } catch(e) {} } tryParqetLogo(ticker, wrapId); }

    // ── Panel builders (expand panel) ────────────────────────────────
    function buildStatsHTML(base, ext) {
      const p=base?.price||{}, s=ext?.summaryDetail||{}, k=ext?.defaultKeyStatistics||{};
      const pe=rawVal(s.trailingPE)??rawVal(k.trailingPE)??rawVal(p.trailingPE);
      const eps=rawVal(k.trailingEps), beta=rawVal(k.beta)??rawVal(s.beta)??rawVal(p.beta);
      const mktCap=rawVal(p.marketCap), w52h=rawVal(s.fiftyTwoWeekHigh)??rawVal(p.fiftyTwoWeekHigh), w52l=rawVal(s.fiftyTwoWeekLow)??rawVal(p.fiftyTwoWeekLow);
      const divRate=rawVal(s.dividendRate), divYield=rawVal(s.dividendYield);
      let divStr='—'; if(divRate&&divRate>0){const pct=divYield?(divYield<1?divYield*100:divYield):null; divStr='$'+divRate.toFixed(2)+(pct?' ('+pct.toFixed(2)+'%)':'');}
      return `<div class="stat-row">
        <div class="stat-item"><span class="stat-label">Cap. Mercado</span><span class="stat-value">${fmtLarge(mktCap)}</span></div>
        <div class="stat-item"><span class="stat-label">P/E (trailing)</span><span class="stat-value">${pe!=null?parseFloat(Number(pe).toFixed(1)):'—'}</span></div>
        <div class="stat-item"><span class="stat-label">EPS (trailing)</span><span class="stat-value">${eps!=null?'$'+parseFloat(Number(eps).toFixed(2)):'—'}</span></div>
        <div class="stat-item"><span class="stat-label">Beta</span><span class="stat-value">${beta!=null?parseFloat(Number(beta).toFixed(2)):'—'}</span></div>
        <div class="stat-item"><span class="stat-label">Dividendo</span><span class="stat-value">${divStr}</span></div>
        <div class="stat-item"><span class="stat-label">Máx 52s</span><span class="stat-value">${w52h?'$'+fmtNum(w52h):'—'}</span></div>
        <div class="stat-item"><span class="stat-label">Mín 52s</span><span class="stat-value">${w52l?'$'+fmtNum(w52l):'—'}</span></div>
        <div class="stat-item"><span class="stat-label">Volume médio</span><span class="stat-value">${fmtVol(rawVal(s.averageVolume))}</span></div>
      </div>`;
    }

    function buildNewsHTML(news) {
      if (!news || !news.length) return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem notícias recentes.</p>';
      return '<div class="news-list-inline">' + news.map(n => {
        const date = new Date(n.datetime*1000).toLocaleDateString('pt',{day:'2-digit',month:'short'});
        return `<a class="news-item-inline" href="${esc(n.url)}" target="_blank" rel="noopener noreferrer"><span class="news-headline">${esc(n.headline)}</span><span class="news-meta">${esc(n.source)} · ${date}</span></a>`;
      }).join('') + '</div>';
    }

    function buildTargetsHTML(analystData, currentPrice) {
      if (!analystData?.financialData) return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados de analistas.</p>';
      const fd = analystData.financialData;
      const targetMean=rawVal(fd.targetMeanPrice), targetMedian=rawVal(fd.targetMedianPrice)??rawVal(fd.targetMeanPrice), targetHigh=rawVal(fd.targetHighPrice), targetLow=rawVal(fd.targetLowPrice), recKey=fd.recommendationKey||'', numAnal=rawVal(fd.numberOfAnalystOpinions);
      if (targetMean==null&&targetMedian==null&&targetHigh==null&&targetLow==null&&!recKey) return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados disponíveis.</p>';
      const recLabels={'strong_buy':'Compra Forte','buy':'Comprar','hold':'Manter','sell':'Vender','strong_sell':'Venda Forte','':'—'};
      const recColors={'strong_buy':'var(--color-success)','buy':'#8ab74a','hold':'var(--color-text-muted)','sell':'#dd8a6a','strong_sell':'var(--color-notification)','':'var(--color-text-faint)'};
      const upside = (targetMean!=null&&currentPrice) ? ((targetMean-currentPrice)/currentPrice*100) : null;
      const upsideStr = upside!=null ? `<div style="font-size:var(--text-xs);color:${upside>=0?'var(--color-success)':'var(--color-notification)'};margin-top:4px;">${upside>=0?'+':''}${upside.toFixed(1)}% vs atual</div>` : '';
      let h = `<div class="target-block">
        <div class="target-item"><div class="target-label">Alvo Médio</div><div class="target-value">${targetMean!=null?'$'+Number(targetMean).toFixed(2):'—'}</div>${upsideStr}</div>
        <div class="target-item"><div class="target-label">Alvo Mediano</div><div class="target-value">${targetMedian!=null?'$'+Number(targetMedian).toFixed(2):'—'}</div></div>
        <div class="target-item"><div class="target-label">Alvo Máximo</div><div class="target-value bull">${targetHigh!=null?'$'+Number(targetHigh).toFixed(2):'—'}</div></div>
        <div class="target-item"><div class="target-label">Alvo Mínimo</div><div class="target-value bear">${targetLow!=null?'$'+Number(targetLow).toFixed(2):'—'}</div></div>
      </div>`;
      h += `<div class="stat-row" style="margin-bottom:var(--space-4);">
        <div class="stat-item"><span class="stat-label">Consenso</span><span class="stat-value" style="color:${recColors[recKey]??'var(--color-text-faint)'}">${recLabels[recKey]??recKey}</span></div>
        <div class="stat-item"><span class="stat-label">N.º analistas</span><span class="stat-value">${numAnal??'—'}</span></div>
      </div>`;
      if (targetLow!=null&&targetHigh!=null&&targetHigh>targetLow) {
        const ref=targetMean??targetMedian??((targetLow+targetHigh)/2);
        const pct=Math.min(100,Math.max(0,Math.round((ref-targetLow)/(targetHigh-targetLow)*100)));
        h += `<div class="range-bar-wrap"><div class="range-labels"><span>Mín: $${Number(targetLow).toFixed(2)}</span><span>Máx: $${Number(targetHigh).toFixed(2)}</span></div><div class="range-track"><div class="range-fill"></div><div class="range-thumb" style="left:${pct}%;"></div></div></div>`;
      }
      return h;
    }

    function buildAIHTML(data) {
      const a = data?.analysis || data;
      if (!a || (!a.resumo && !Array.isArray(a.correu_bem) && !Array.isArray(a.correu_mal) && !Array.isArray(a.vigiar)))
        return '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">Sem dados de earnings disponíveis.</p>';
      let h = '';
      if (a.resumo) h += `<div class="ai-resumo">"${esc(a.resumo)}" &mdash; ${esc(a.periodo||'')}</div>`;
      if (a.correu_bem?.length) h += `<div class="ai-section"><div class="ai-section-title good"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>O que correu bem</div><div class="ai-points">${a.correu_bem.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
      if (a.correu_mal?.length) h += `<div class="ai-section"><div class="ai-section-title bad"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>O que correu mal</div><div class="ai-points">${a.correu_mal.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
      if (a.vigiar?.length) h += `<div class="ai-section"><div class="ai-section-title watch"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Vigiar no próximo earnings</div><div class="ai-points">${a.vigiar.map(p=>`<div class="ai-point">${esc(p)}</div>`).join('')}</div></div>`;
      return h;
    }

    // ── Init ─────────────────────────────────────────────────────────
    async function init() {
      await loadDataJson();
      renderPage();
      document.getElementById('updatedLabel').textContent = _dataJson?.updated
        ? 'Dados de ' + new Date(_dataJson.updated).toLocaleTimeString('pt', {hour:'2-digit', minute:'2-digit'})
        : '';
    }

    init();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); });
    }
  </script>
</body>
</html>
